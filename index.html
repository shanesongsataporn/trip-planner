    var fetchingPhotos = {};
    function fetchKanbanPhoto(activity, item, photoId) {
      var photoKey = photoId.replace('kp-', '');
      if (fetchingPhotos[photoKey]) { return; }
      fetchingPhotos[photoKey] = true;
      var service = new google.maps.places.PlacesService(map);
      service.findPlaceFromQuery({ query: activity + ' ' + item.city.split('>').pop().trim() + ' ' + getTripDestination(), fields: ['place_id'] }, function(results, status) {
        if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) {
          service.getDetails({ placeId: results[0].place_id, fields: ['photos'] }, function(details, detailStatus) {
            delete fetchingPhotos[photoKey];
            if (detailStatus === google.maps.places.PlacesServiceStatus.OK && details.photos && details.photos.length > 0) {
              var url = details.photos[0].getUrl({ maxWidth: 270, maxHeight: 120 });
              cardPhotos[photoKey] = url;
              var el = document.getElementById(photoId);
              if (el) { el.outerHTML = '<img class="kanban-card-photo" src="' + url + '">'; }
              else {
                var allPlaceholders = document.querySelectorAll('[id="' + photoId + '"]');
                allPlaceholders.forEach(function(p) { p.outerHTML = '<img class="kanban-card-photo" src="' + url + '">'; });
              }
            }
          });
        } else {
          delete fetchingPhotos[photoKey];
        }
      });
    }

    function triggerPhotoUpload(photoKey, dayIndex, actIndex, type) {
      var input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('Please choose an image under 5MB.'); return; }
        uploadImageToFirebase(file, photoKey, dayIndex, actIndex, type);
      };
      input.click();
    }

      var item = currentTrip.days[dayIndex];
      if (!item) return;
      if (!item.foodNotes) { item.foodNotes = {}; }
      var current = item.foodNotes[String(foodIndex)] || '';
      showModal('Note for ' + item.food[foodIndex],
        '<div class="modal-field"><label>Note</label><input type="text" id="food-note-input" value="' + current.replace(/"/g, '&quot;') + '" placeholder="e.g. Make a reservation"></div>',
        function() {
          item.foodNotes[String(foodIndex)] = document.getElementById('food-note-input').value.trim();
          saveToStorage();
          renderKanban();
        }
      );
    }

    function uploadImageToFirebase(file, photoKey, dayIndex, actIndex, type) {
      var fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.]/g, '_');
      var ref = storage.ref('images/' + fileName);

      var placeholderId = 'kp-' + photoKey;
      var placeholder = document.getElementById(placeholderId);
      if (placeholder) {
        placeholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80px;background:var(--sand);"><div style="width:20px;height:20px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;"></div></div>';
      }

      var uploadTask = ref.put(file);
      uploadTask.on('state_changed',
        null,
        function(error) {
          console.error('Upload error:', error);
          if (placeholder) { placeholder.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--danger);">Upload failed</div>'; }
        },
        function() {
          uploadTask.snapshot.ref.getDownloadURL().then(function(url) {
            cardPhotos[photoKey] = url;
            saveCardPhotos();
            renderKanban();
          });
        }
      );
    }

    function saveCardPhotos() {
      try {
        var urlsOnly = {};
        Object.keys(cardPhotos).forEach(function(key) {
          if (cardPhotos[key] && cardPhotos[key].startsWith('https://')) {
            urlsOnly[key] = cardPhotos[key];
          }
        });
        localStorage.setItem('card_photos', JSON.stringify(urlsOnly));
        db.collection('trips').doc(currentTripKey).set({
          cardPhotos: JSON.stringify(urlsOnly)
        }, { merge: true }).catch(function(e) { console.warn('Firestore photo save failed:', e); });
      } catch(e) {
        console.warn('localStorage save failed:', e);
      }
    }

    function loadCardPhotos() {
      var saved = localStorage.getItem('card_photos');
      if (saved) { cardPhotos = JSON.parse(saved); }
    }

    function loadCardPhotosFromFirestore(callback) {
      db.collection('trips').doc(currentTripKey).get().then(function(doc) {
        if (doc.exists && doc.data().cardPhotos) {
          var remote = JSON.parse(doc.data().cardPhotos);
          Object.keys(remote).forEach(function(key) { cardPhotos[key] = remote[key]; });
          try { localStorage.setItem('card_photos', JSON.stringify(cardPhotos)); } catch(e) {}
          if (currentView === 'cards') { renderKanban(); }
          else { var mobCards = document.getElementById('mob-cards-view'); if (mobCards && mobCards.classList.contains('active')) { renderMobCards(); } }
        }
        if (callback) { callback(); }
      }).catch(function(e) {
        console.warn('Firestore photo load failed:', e);
        if (callback) { callback(); }
      });
    }

    // ===== SPLIT VIEW =====
    function renderSplit() {
      document.getElementById('split-list').innerHTML = currentTrip.days.map(function(item, index) {
        normaliseAccom(item); normaliseDayTransport(item);
        var now = new Date();
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var todayStr = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
        var isToday = item.date && item.date === todayStr;
        return '<div class="split-day-item" id="split-item-' + index + '" onclick="selectSplitDay(' + index + ')">' +
          '<div class="split-day-num" style="display:flex;align-items:center;gap:6px;">Day ' + item.day + ' | ' + item.date +
            (isToday ? '<span style="background:var(--accent);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:999px;letter-spacing:0.05em;">TODAY</span>' : '') +
          '</div>' +
          '<div class="split-day-city">' + item.city + '</div>' +

        '</div>' +
        '<div id="split-detail-' + index + '" style="display:none;border-bottom:2px solid var(--sand-dark);"></div>';

      } else { google.maps.event.trigger(splitMap, 'resize'); }
      setTimeout(function() {
        var todayIdx = 0;
        var now = new Date();
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var todayStr = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();

          if (d.date && d.date === todayStr) { todayIdx = i; }

    function showSplitFloatCard(name, photoUrl, note, mapsUrl, position, itemContext) {
      splitFloatCardItem = itemContext || null;
      var card = document.getElementById('split-float-card');
      var img = document.getElementById('split-float-card-img');
      var nameEl = document.getElementById('split-float-card-name');
      var noteEl = document.getElementById('split-float-card-note');
      var linkEl = document.getElementById('split-float-card-link');
      if (!card || !nameEl) { console.warn('Split float card elements not found'); return; }
      nameEl.textContent = name;
      noteEl.innerHTML = note
        ? '<span style="font-style:italic;">' + note + '</span> <span onclick="openSplitNoteModal()" style="font-size:10px;color:var(--ink-muted);cursor:pointer;margin-left:4px;">📝 Edit</span>'
        : '<span onclick="openSplitNoteModal()" style="font-size:11px;color:var(--ink-muted);cursor:pointer;">📝 Add note</span>';
      noteEl.style.display = 'block';
      linkEl.href = mapsUrl;
      if (photoUrl) { img.src = photoUrl; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
      card.classList.remove('open');
      void card.offsetWidth;
      card.classList.add('open');
      if (position && splitMap) { splitMap.panTo(position); }
    }

    var splitFloatCardItem = null;

      var itemCtx = (dayIndex >= 0 && actIndex >= 0) ? { item: currentTrip.days[dayIndex], actIndex: actIndex } : null;
      showSplitFloatCard(name, photo, note, mapsUrl, null, itemCtx);

    function openSplitPin(index, type) {
      var found = false;
      splitActivityMarkers.forEach(function(obj) {
        if (obj.index === index && obj.type === type) {
          found = true;
          splitMap.panTo(obj.marker.position);
          splitMap.setZoom(15);

      var isOpen = panel.style.display !== 'none';

    var searchTimers = {};

          results.slice(0, 5).forEach(function(place) {
            var div = document.createElement('div');

            div.addEventListener('click', function() { addFromSearch(type, place); resultsEl.classList.remove('open'); document.getElementById('search-input-' + type).value = ''; document.getElementById('search-box-' + type).classList.remove('open'); });

    function fetchExchangeRates(callback) {
      if (!currentTrip) { if (callback) callback(); return; }
      if (!currentTrip.baseCurrency) { currentTrip.baseCurrency = 'AUD'; currentTrip.baseCurrencySymbol = '$'; }
      var now = Date.now();
      var oneDay = 24 * 60 * 60 * 1000;
      if (currentTrip.exchangeRates && currentTrip.ratesLastFetched && (now - currentTrip.ratesLastFetched) < oneDay) {
        if (callback) callback();
        return;
      }
      fetch('https://v6.exchangerate-api.com/v6/' + EXCHANGE_RATE_API_KEY + '/latest/' + currentTrip.baseCurrency)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.result === 'success') {
            currentTrip.exchangeRates = data.conversion_rates;
            currentTrip.ratesLastFetched = now;
            saveToStorage();
          }
          if (callback) callback();
        })
        .catch(function(e) {
          console.warn('Exchange rate fetch failed:', e);
          if (callback) callback();
        });
    }

    function convertToBase(amount, fromCurrency) {
      if (!currentTrip || !currentTrip.exchangeRates) return amount;
      if (!fromCurrency || fromCurrency === currentTrip.baseCurrency) return amount;
      var rate = currentTrip.exchangeRates[fromCurrency];
      if (!rate || rate === 0) return amount;
      return amount / rate;
    }

    // ===== CITY MARKERS =====
    function buildCityMarkerEl(name) {
      var s = citySettings[name] || { emoji: "\uD83D\uDCCD", color: "#2D9E75" };
      var el = document.createElement('div');
      el.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:pointer;';
      el.innerHTML = '<div style="background:' + s.color + ';border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #fff;">' + s.emoji + '</div>' +
        '<div style="background:rgba(0,0,0,0.75);color:#fff;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:600;margin-top:4px;box-shadow:0 1px 4px rgba(0,0,0,0.2);white-space:nowrap;">' + name + '</div>';
      return el;
    }

    function addCityMarkers() {
      cityMarkerObjs.forEach(function(obj) { obj.marker.map = null; });
      cityMarkerObjs = [];
      var seen = {}, cities = [];
      currentTrip.days.forEach(function(day) {
        var baseName = day.city.split('>').pop().trim();
        if (!seen[baseName] && citySettings[baseName] && !citySettings[baseName].noMarker) { seen[baseName] = true; cities.push({ name: baseName, lat: day.lat, lng: day.lng }); }
      });
      cities.forEach(function(city) {
          var el = buildCityMarkerEl(city.name);
          var marker = new google.maps.marker.AdvancedMarkerElement({ position: { lat: city.lat, lng: city.lng }, map: map, title: city.name, content: el });
          cityMarkerObjs.push({ marker: marker, city: city });
          marker.addListener('gmp-click', function() {
            var cards = document.querySelectorAll('.day-card');
            cards.forEach(function(c) { c.classList.remove('active'); });
            clearActivityMarkers();
            cityMarkerObjs.forEach(function(obj) { obj.marker.map = null; });
            var cityDays = [];
            currentTrip.days.forEach(function(day, index) {
              var baseCity = day.city.split('>').pop().trim();
              if (baseCity === city.name) {
                if (cards[index]) { cards[index].classList.add('active'); cards[index].scrollIntoView({ behavior: 'smooth', inline: 'center' }); }
                cityDays.push(day);
              }
            });
            var totalDays = cityDays.length, loadedDays = 0;
            cityDays.forEach(function(day) {
              addActivityMarkers(day, function() {
                loadedDays++;
                if (loadedDays === totalDays) {
                  if (activityMarkers.length > 0) {
                    var bounds = new google.maps.LatLngBounds();
                    activityMarkers.forEach(function(obj) { bounds.extend(obj.marker.position); });
                    map.fitBounds(bounds, { padding: 80 });
                  }
                }
              });
            });
          });
        });
    }

    function saveCityFromModal(oldName) {
      var newName = document.getElementById('city-edit-name').value.trim();

      var color = document.getElementById('city-edit-color').value;
      var noMarker = document.getElementById('city-edit-nomarker').checked;
      if (!newName) return;
      if (oldName !== newName) { delete citySettings[oldName]; }
      citySettings[newName] = { emoji: emoji, color: color, code: code };
      if (noMarker) { citySettings[newName].noMarker = true; }
      saveToStorage();
      addCityMarkers();
      var list = document.getElementById('city-settings-list');
      if (list) { list.innerHTML = renderCitySettingsList(); }
      var form = document.getElementById('city-edit-form-' + oldName.replace(/ /g,'-'));

    // ===== ACTIVITY MARKERS =====
    function addSplitActivityMarkers(item, callback) {
      normaliseAccom(item);
      var tasks = [];
      if (!item.activityCategories || item.activityCategories.length !== item.activities.length) {
        item.activityCategories = item.activities.map(function() { return 'default'; });
      }
      item.activities.forEach(function(activity, index) { tasks.push({ type: 'activity', name: activity, cat: item.activityCategories[index] || 'default', index: index, catIndex: index }); });
      item.food.forEach(function(f, index) { tasks.push({ type: 'food', name: typeof f === 'string' ? f : f.name, index: index, catIndex: index }); });
      item.accommodation.forEach(function(a, index) { if (a.name) { tasks.push({ type: 'accommodation', name: a.name, index: index, catIndex: index }); } });
      var total = tasks.length, completed = 0;
      if (total === 0) { if (callback) { callback(); } return; }
      tasks.forEach(function(task) {
        var service = new google.maps.places.PlacesService(splitMap);
        var rawName = task.name.split(' - ')[0].split(' for ')[0].split(' at ')[0].trim();
        var query = rawName + ' ' + item.city.split('>').pop().trim() + ' ' + getTripDestination();
        var pinColor, pinEmoji, pinSize;
        if (task.type === 'food') { pinColor = '#E74C3C'; pinEmoji = '\uD83C\uDF7D\uFE0F'; pinSize = 28; }
        else if (task.type === 'accommodation') { pinColor = '#2980B9'; pinEmoji = '\uD83C\uDFE8'; pinSize = 28; }
        else { var catDef = activityCategories[task.cat] || activityCategories['default']; pinColor = catDef.color; pinEmoji = catDef.emoji; pinSize = 32; }
        service.findPlaceFromQuery({ query: query, fields: ['name', 'geometry', 'place_id'] }, function(results, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) {
            var place = results[0];
            service.getDetails({ placeId: place.place_id, fields: ['name', 'rating', 'user_ratings_total', 'formatted_address', 'opening_hours', 'photos', 'url'] }, function(details, detailStatus) {
              var el = document.createElement('div');
              el.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:pointer;';
              el.innerHTML = '<div style="background:' + pinColor + ';border-radius:50%;width:' + pinSize + 'px;height:' + pinSize + 'px;display:flex;align-items:center;justify-content:center;font-size:' + (pinSize*0.5) + 'px;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid #fff;">' + pinEmoji + '</div>';
              var marker = new google.maps.marker.AdvancedMarkerElement({ position: place.geometry.location, map: splitMap, title: task.name, content: el });
              var cardContent = '<div style="width:240px;font-family:system-ui,sans-serif;">';
              var photoUrl = (details && detailStatus === google.maps.places.PlacesServiceStatus.OK && details.photos && details.photos.length > 0)
                ? details.photos[0].getUrl({ maxWidth: 240, maxHeight: 120 }) : '';
              var mapsUrl = (details && details.url) ? details.url : 'https://www.google.com/maps/search/' + encodeURIComponent(task.name);
              var displayName = (details && details.name) ? details.name : task.name;

              // check for user-uploaded photo
              if (task.type === 'activity') {
                var dayItem = item;
                var pk = 'day' + dayItem.day + '_act' + task.index;
                if (cardPhotos[pk]) { photoUrl = cardPhotos[pk]; }
              }

              // check for user note
              var userNote = '';
              if (task.type === 'activity' && item.cardNotes && item.cardNotes[String(task.index)]) {
                userNote = item.cardNotes[String(task.index)];
              }

              var itemContext = (task.type === 'activity') ? { item: item, actIndex: task.index } : null;
              marker.addListener('gmp-click', function() {
                showSplitFloatCard(displayName, photoUrl, userNote, mapsUrl, place.geometry.location, itemContext);
              });
              splitActivityMarkers.push({ marker: marker, index: task.index, type: task.type, name: displayName, photo: photoUrl, note: userNote, mapsUrl: mapsUrl, itemContext: itemContext });
              completed++;
              if (completed === total && callback) { callback(); }
            });
          } else { completed++; if (completed === total && callback) { callback(); } }
        });
      });
    }

    function addActivityMarkers(item, callback) {
      normaliseAccom(item);
      var tasks = [];
      if (!item.activityCategories || item.activityCategories.length !== item.activities.length) {
        item.activityCategories = item.activities.map(function() { return 'default'; });

      item.accommodation.forEach(function(a, index) { if (a.name) { tasks.push({ type: 'accommodation', name: a.name, index: index, catIndex: index }); } });
      var total = tasks.length, completed = 0;
      if (total === 0) { map.panTo({ lat: item.lat, lng: item.lng }); map.setZoom(13); return; }
      tasks.forEach(function(task) { geocodeActivity(task, item, function() { completed++; if (completed === total && callback) { callback(); } }); });

    function geocodeActivity(task, item, callback) {
      var service = new google.maps.places.PlacesService(map);
      var rawName = task.name.split(' - ')[0].split(' for ')[0].split(' at ')[0].trim();
      var query = rawName + ' ' + item.city.split('>').pop().trim() + ' ' + getTripDestination();
      var pinColor, pinEmoji, pinSize;
      if (task.type === 'food') { pinColor = '#E74C3C'; pinEmoji = '\uD83C\uDF7D\uFE0F'; pinSize = 28; }

    function getRouteStops(item) {
      normaliseAccom(item); normaliseFood(item);
      var stops = [];
      item.activities.forEach(function(a, i) {
        var cat = (item.activityCategories && item.activityCategories[i]) || 'default';
        stops.push({ name: a, type: 'activity', cat: cat, index: i });

      return stops;
    }

    function getRouteStartLocation(item) {
      normaliseAccom(item);
      if (item.accommodation && item.accommodation.length && item.accommodation[0].name) {
        return item.accommodation[0].name + ' ' + item.city.split('>').pop().trim();
      }
      var stops = getRouteStops(item);
      if (stops.length) { return stops[0].name + ' ' + item.city.split('>').pop().trim(); }
      return item.city.split('>').pop().trim();
    }

    function recommendMode(distanceMeters) {
      if (distanceMeters < 400) { return 'walking'; }

      return 'driving';

      var defaultMode = item.routeDefaultMode || 'driving';

      if (!stops.length) {
        document.getElementById('tab-route').innerHTML =
          '<div style="padding:20px 0;text-align:center;">' +
            '<div style="font-size:32px;margin-bottom:12px;">🗺️</div>' +
            '<div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;">No stops yet</div>' +
            '<div style="font-size:12px;color:var(--ink-muted);">Add activities or food to this day to use the route optimiser.</div>' +
          '</div>';
        return;
      }

      var modeHtml = routeModes.map(function(m) {
        return '<button onclick="setRouteDefaultMode(\'' + m + '\')" id="route-mode-' + m + '" style="font-family:inherit;font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--sand-dark);background:' + (m === defaultMode ? 'var(--accent)' : 'var(--sand)') + ';color:' + (m === defaultMode ? '#fff' : 'var(--ink-muted)') + ';cursor:pointer;transition:all 0.15s;">' + routeModeLabels[m] + '</button>';
      }).join('');

      var hasResult = item.routeOrder && item.routeOrder.length && item.routeLegs && item.routeLegs.length && currentRouteResult;

      var setupHtml =
        '<div style="background:var(--sand);border-radius:var(--radius-sm);padding:14px;border:1px solid var(--sand-dark);margin-bottom:14px;">' +
          '<div style="margin-bottom:12px;">' +
            '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">Start location</div>' +
            '<input id="route-start-input" type="text" value="' + startLoc.replace(/"/g,'&quot;') + '" style="width:100%;font-family:inherit;font-size:12px;padding:7px 10px;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);background:var(--white);color:var(--ink);outline:none;">' +
          '</div>' +
          '<div style="margin-bottom:12px;">' +
            '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">Return to start?</div>' +
            '<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-light);cursor:pointer;">' +
              '<input type="checkbox" id="route-return-start" ' + (item.routeReturnToStart !== false ? 'checked' : '') + ' style="width:15px;height:15px;accent-color:var(--accent);"> Yes, end route at start location' +
            '</label>' +
          '</div>' +
          '<div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:12px;">' +
            '<div style="flex:1;">' +
              '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">Start time</div>' +
              '<input type="time" id="route-start-time" value="' + startTime + '" style="width:100%;font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);background:var(--white);color:var(--ink);outline:none;">' +
            '</div>' +
          '</div>' +
          '<div style="margin-bottom:14px;">' +
            '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">Default transport mode</div>' +
            '<div style="display:flex;gap:6px;">' + modeHtml + '</div>' +
          '</div>' +
          '<button onclick="suggestRoute(currentDayItem)" style="width:100%;font-family:inherit;font-size:13px;font-weight:700;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;">✨ Suggest Route</button>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--ink-muted);text-align:center;line-height:1.5;">We\'ll organise your day to minimise travel time between stops using Google Maps.</div>';

      document.getElementById('tab-route').innerHTML = setupHtml +
        (hasResult ? '<div id="route-results">' + buildRouteResultsHtml(item) + '</div>' : '<div id="route-results"></div>');
    }

    function buildRouteResultsHtml(item) {
      if (!currentRouteResult || !item.routeOrder) { return ''; }
      var stops = getRouteStops(item);
      var legs = item.routeLegs || [];
      var startTime = item.routeStartTime || '09:00';
      var parts = startTime.split(':');
      var currentMinutes = parseInt(parts[0]) * 60 + parseInt(parts[1]);
      var totalTravelMins = 0, totalDwellMins = 0;

      var stopsHtml = item.routeOrder.map(function(stopIndex, pos) {
        var stop = stops[stopIndex];
        if (!stop) { return ''; }
        var leg = legs[pos] || {};
        var travelMins = leg.durationMins || 0;
        var dwell = dwellTimes[stop.cat] || dwellTimes['default'];
        var arrivalMins = currentMinutes + (pos > 0 ? travelMins : 0);
        if (pos > 0) { totalTravelMins += travelMins; currentMinutes += travelMins; }
        totalDwellMins += dwell;
        // if this stop has a locked time, snap currentMinutes to it
        if (leg.locked && leg.lockedTime) {
          var lt = leg.lockedTime.split(':');
          var lockedMins = parseInt(lt[0]) * 60 + parseInt(lt[1]);
          if (lockedMins > currentMinutes) { currentMinutes = lockedMins; arrivalMins = lockedMins; }
        }
        var arrH = Math.floor(arrivalMins / 60) % 24;
        var arrM = arrivalMins % 60;
        var arrLabel = arrH + ':' + (arrM < 10 ? '0' : '') + arrM;
        var leaveH = Math.floor((arrivalMins + dwell) / 60) % 24;
        var leaveM = (arrivalMins + dwell) % 60;
        var leaveLabel = leaveH + ':' + (leaveM < 10 ? '0' : '') + leaveM;
        currentMinutes = arrivalMins + dwell;

        var legHtml = '';
        if (pos > 0) {
          var modeKey = leg.mode || item.routeDefaultMode || 'driving';
          var legModeHtml = routeModes.map(function(m) {
            return '<button onclick="updateLegMode(' + pos + ',\'' + m + '\')" style="font-family:inherit;font-size:11px;padding:3px 7px;border-radius:var(--radius-sm);border:1px solid var(--sand-dark);background:' + (m === modeKey ? 'var(--accent)' : 'var(--sand)') + ';color:' + (m === modeKey ? '#fff' : 'var(--ink-muted)') + ';cursor:pointer;">' + routeModeLabels[m] + '</button>';
          }).join('');
          legHtml = '<div style="display:flex;align-items:center;gap:8px;padding:6px 0 6px 16px;border-left:2px dashed var(--sand-dark);margin-left:12px;">' +
            '<span style="font-size:11px;color:var(--ink-muted);">' + routeModeLabels[modeKey] + ' ' + travelMins + ' min</span>' +
            '<div style="display:flex;gap:4px;">' + legModeHtml + '</div>' +
          '</div>';
        }

        var catDef = activityCategories[stop.cat] || activityCategories['default'];
        var leg = legs[pos] || {};
        var isLocked = leg.locked || false;
        var lockedTime = leg.lockedTime || '';

        // calculate free time gap if locked with a time
        var freeTimeHtml = '';
        if (isLocked && lockedTime) {
          var ltParts = lockedTime.split(':');
          var lockedMins = parseInt(ltParts[0]) * 60 + parseInt(ltParts[1]);
          var gap = lockedMins - arrivalMins;
          if (gap > 5) {
            var gapH = Math.floor(gap / 60);
            var gapM = gap % 60;
            var gapLabel = gapH > 0 ? gapH + 'h ' + gapM + 'm' : gapM + 'm';
            freeTimeHtml = '<div style="margin:0 0 4px 34px;font-size:11px;color:var(--ink-muted);font-style:italic;padding:6px 10px;background:var(--sand);border-radius:var(--radius-sm);border-left:3px solid var(--sand-dark);">🕐 ' + gapLabel + ' free before this</div>';
          }
          // snap arrival to locked time regardless of gap direction
          arrivalMins = lockedMins;
          arrH = Math.floor(arrivalMins / 60) % 24;
          arrM = arrivalMins % 60;
          arrLabel = arrH + ':' + (arrM < 10 ? '0' : '') + arrM;
          leaveH = Math.floor((arrivalMins + dwell) / 60) % 24;
          leaveM = (arrivalMins + dwell) % 60;
          leaveLabel = leaveH + ':' + (leaveM < 10 ? '0' : '') + leaveM;
          // everything after flows from locked time + dwell
          currentMinutes = arrivalMins + dwell;
        }

        return legHtml + freeTimeHtml +
          '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;">' +
            '<div style="width:24px;height:24px;border-radius:50%;background:' + (isLocked ? 'var(--warn)' : 'var(--accent)') + ';color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">' + (isLocked ? '🔒' : (pos + 1)) + '</div>' +
            '<div style="flex:1;">' +
              '<div style="font-size:13px;font-weight:700;color:var(--ink);">' + stop.name + '</div>' +
              '<div style="font-size:11px;color:var(--ink-muted);">' + catDef.emoji + ' ' + arrLabel + ' → ' + leaveLabel + ' (' + dwell + ' min)</div>' +
              (isLocked ? '<div style="margin-top:6px;display:flex;align-items:center;gap:8px;">' +
                '<span style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);">Locked time</span>' +
                '<input type="time" value="' + lockedTime + '" onchange="updateStopLockedTime(' + pos + ',this.value)" style="font-family:inherit;font-size:12px;padding:3px 8px;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);background:var(--sand);color:var(--ink);outline:none;">' +
              '</div>' : '') +
            '</div>' +
            '<button onclick="toggleStopLock(' + pos + ')" style="font-family:inherit;font-size:13px;padding:4px 8px;border-radius:var(--radius-sm);border:1px solid ' + (isLocked ? 'var(--warn)' : 'var(--sand-dark)') + ';background:none;color:' + (isLocked ? 'var(--warn)' : 'var(--ink-muted)') + ';cursor:pointer;flex-shrink:0;" title="' + (isLocked ? 'Unlock stop' : 'Lock stop') + '">' + (isLocked ? '🔒' : '🔓') + '</button>' +
          '</div>';
      }).join('');

      var totalMins = totalTravelMins + totalDwellMins;
      var totalH = Math.floor(totalMins / 60);
      var totalM = totalMins % 60;
      var travelPct = totalMins > 0 ? Math.round((totalTravelMins / totalMins) * 100) : 0;
      var verdict, verdictColor;
      if (totalMins < 480) { verdict = '✅ Looks good'; verdictColor = 'var(--accent)'; }
      else if (totalMins < 600) { verdict = '⚠️ Tight day'; verdictColor = 'var(--warn)'; }
      else { verdict = '🔴 Too packed'; verdictColor = 'var(--danger)'; }

      var travelWarning = travelPct > 45
        ? '<div style="font-size:11px;color:var(--warn);margin-top:4px;">⚠️ Over 45% of your day is travel time</div>'
        : '';

      var mapsUrl = buildGoogleMapsUrl(item);

      return '<div style="border-top:1px solid var(--sand-dark);padding-top:14px;margin-top:4px;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
          '<div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);">Suggested order</div>' +
          '<button onclick="suggestRoute(currentDayItem)" style="font-family:inherit;font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:none;color:var(--accent);cursor:pointer;">🔄 Re-optimise</button>' +
        '</div>' +
        stopsHtml +
        '<div style="background:var(--sand);border-radius:var(--radius-sm);padding:12px 14px;margin-top:10px;border:1px solid var(--sand-dark);">' +
          '<div style="font-size:14px;font-weight:800;color:' + verdictColor + ';margin-bottom:6px;">' + verdict + ' · ' + totalH + 'h ' + totalM + 'm total</div>' +
          '<div style="font-size:11px;color:var(--ink-muted);">🚗 Travel: ' + Math.floor(totalTravelMins/60) + 'h ' + (totalTravelMins%60) + 'm (' + travelPct + '%) · 📍 Stops: ' + Math.floor(totalDwellMins/60) + 'h ' + (totalDwellMins%60) + 'm</div>' +
          travelWarning +
        '</div>' +
        '<div style="display:flex;gap:8px;margin-top:12px;">' +
          '<a href="' + mapsUrl + '" target="_blank" style="flex:1;text-decoration:none;"><button style="width:100%;font-family:inherit;font-size:12px;font-weight:700;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;">📍 Open in Google Maps</button></a>' +
          '<button onclick="clearRoute(currentDayItem)" style="font-family:inherit;font-size:12px;font-weight:600;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--sand-dark);background:none;color:var(--ink-muted);cursor:pointer;">Clear</button>' +
        '</div>' +
        '<div id="claude-route-review" style="margin-top:4px;">' +
          '<div style="background:var(--sand);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--sand-dark);margin-top:12px;display:flex;align-items:center;gap:10px;">' +
            '<div style="width:18px;height:18px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;"></div>' +
            '<div style="font-size:12px;color:var(--ink-muted);">🤖 Claude is reviewing your route...</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function setRouteDefaultMode(mode) {
      if (!currentDayItem) { return; }
      currentDayItem.routeDefaultMode = mode;
      saveToStorage();
      renderRouteTab(currentDayItem);
    }

    function updateLegMode(legPos, mode) {
      if (!currentDayItem || !currentDayItem.routeLegs) { return; }
      currentDayItem.routeLegs[legPos] = currentDayItem.routeLegs[legPos] || {};
      currentDayItem.routeLegs[legPos].mode = mode;
      recalcRouteTimes(currentDayItem);
      saveToStorage();
      var resultsEl = document.getElementById('route-results');
      if (resultsEl) { resultsEl.innerHTML = buildRouteResultsHtml(currentDayItem); }
    }

    function runSegmentRoute(segments, segIndex, results, item, stops, travelMode, onComplete) {
      if (segIndex >= segments.length) { onComplete(results); return; }
      var seg = segments[segIndex];
      if (!seg.stops.length) {
        results.push({ order: [], legs: [], seg: seg });
        runSegmentRoute(segments, segIndex + 1, results, item, stops, travelMode, onComplete);
        return;
      }
      var city = item.city.split('>').pop().trim() + ' ' + getTripDestination();
      var waypoints = seg.stops.map(function(s) {
        return { location: s.name + ' ' + city, stopover: true };
      });
      var directionsService = new google.maps.DirectionsService();
      directionsService.route({
        origin: seg.origin,
        destination: seg.destination,
        waypoints: waypoints,
        optimizeWaypoints: true,
        travelMode: travelMode
      }, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK) {
          results.push({ order: result.routes[0].waypoint_order, legs: result.routes[0].legs, seg: seg });
        } else {
          results.push({ order: seg.stops.map(function(s,i){return i;}), legs: [], seg: seg });
        }
        runSegmentRoute(segments, segIndex + 1, results, item, stops, travelMode, onComplete);
      });
    }

    function toggleStopLock(pos) {
      if (!currentDayItem || !currentDayItem.routeLegs) { return; }
      var leg = currentDayItem.routeLegs[pos] || {};
      leg.locked = !leg.locked;
      if (!leg.locked) { leg.lockedTime = ''; }
      currentDayItem.routeLegs[pos] = leg;
      saveToStorage();
      var resultsEl = document.getElementById('route-results');
      if (resultsEl) { resultsEl.innerHTML = buildRouteResultsHtml(currentDayItem); }
    }

    function updateStopLockedTime(pos, time) {
      if (!currentDayItem || !currentDayItem.routeLegs) { return; }
      var leg = currentDayItem.routeLegs[pos] || {};
      leg.lockedTime = time;
      currentDayItem.routeLegs[pos] = leg;
      saveToStorage();
      var resultsEl = document.getElementById('route-results');
      if (resultsEl) { resultsEl.innerHTML = buildRouteResultsHtml(currentDayItem); }
    }

    function suggestRoute(item) {
      if (!item) { return; }
      var startInput = document.getElementById('route-start-input');
      var startTimeInput = document.getElementById('route-start-time');
      var returnStart = document.getElementById('route-return-start');
      var startLoc = startInput ? startInput.value.trim() : getRouteStartLocation(item);
      var startTime = startTimeInput ? startTimeInput.value : (item.routeStartTime || '09:00');
      var returnToStart = returnStart ? returnStart.checked : true;
      item.routeStartTime = startTime;
      item.routeReturnToStart = returnToStart;

      var stops = getRouteStops(item);
      if (!stops.length) { return; }
      var city = item.city.split('>').pop().trim() + ' ' + getTripDestination();

      var resultsEl = document.getElementById('route-results');
      if (resultsEl) {
        resultsEl.innerHTML = '<div style="padding:20px;text-align:center;"><div style="width:24px;height:24px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px;"></div><div style="font-size:12px;color:var(--ink-muted);">Calculating best route...</div></div>';
      }

      var defaultMode = item.routeDefaultMode || 'driving';
      var travelMode = google.maps.TravelMode.DRIVING;
      if (defaultMode === 'walking') { travelMode = google.maps.TravelMode.WALKING; }
      if (defaultMode === 'transit') { travelMode = google.maps.TravelMode.TRANSIT; }

      // get existing legs to preserve lock data
      var existingLegs = item.routeLegs || [];
      var existingOrder = item.routeOrder || [];

      // build locked stop map keyed by stopIndex
      var lockedByStopIndex = {};
      existingOrder.forEach(function(stopIndex, pos) {
        var leg = existingLegs[pos] || {};
        if (leg.locked) { lockedByStopIndex[stopIndex] = leg; }
      });

      // sort locked stops with times by their locked time
      var lockedTimedStops = Object.keys(lockedByStopIndex)
        .filter(function(si) { return lockedByStopIndex[si].lockedTime; })
        .map(function(si) {
          var leg = lockedByStopIndex[si];
          var t = leg.lockedTime.split(':');
          return { stopIndex: parseInt(si), leg: leg, mins: parseInt(t[0]) * 60 + parseInt(t[1]) };
        })
        .sort(function(a, b) { return a.mins - b.mins; });

      // locked stops without times — just locked in position (no time constraint)
      var lockedNoTimeSI = Object.keys(lockedByStopIndex)
        .filter(function(si) { return !lockedByStopIndex[si].lockedTime; })
        .map(function(si) { return parseInt(si); });

      // unlocked stop indices (not locked at all)
      var unlockedStopIndices = stops.map(function(s, i) { return i; })
        .filter(function(i) { return !lockedByStopIndex[i]; });

      // build segments between locked-timed anchors
      // each segment has: origin, destination, array of stop indices to optimise, endTimeMins
      var segments = [];
      var segOrigin = startLoc;
      var prevTimeMins = null;

      for (var li = 0; li <= lockedTimedStops.length; li++) {
        var anchor = lockedTimedStops[li] || null;
        var segDest = anchor
          ? (stops[anchor.stopIndex].name + ' ' + city)
          : (returnToStart ? startLoc : (stops[stops.length - 1].name + ' ' + city));

        // calculate this segment's time window
        var segStartMins = li === 0
          ? (function() { var t = (item.routeStartTime || '09:00').split(':'); return parseInt(t[0]) * 60 + parseInt(t[1]); })()
          : (function() {
              var prev = lockedTimedStops[li - 1];
              var pt = prev.leg.lockedTime.split(':');
              return parseInt(pt[0]) * 60 + parseInt(pt[1]) + (dwellTimes[stops[prev.stopIndex].cat] || dwellTimes['default']);
            })();
        var segEndMins = anchor ? anchor.mins : 24 * 60;
        var segDurationMins = segEndMins - segStartMins;
        var totalSegs = lockedTimedStops.length + 1;

        // calculate how many stops can realistically fit in this time window
        // use average dwell of 60min + 20min travel per stop as rough estimate
        var avgStopMins = 80;
        var maxStopsInSeg = Math.max(0, Math.floor(segDurationMins / avgStopMins));

        var segStopIndices = [];
        var remaining = unlockedStopIndices.slice();

        if (totalSegs === 1) {
          // no locked timed stops — all unlocked stops go here
          segStopIndices = remaining.slice();
        } else if (li === 0) {
          // before first locked stop — only take stops that fit in the window
          var taken = 0;
          remaining.forEach(function(si) {
            if (taken < maxStopsInSeg) {
              segStopIndices.push(si);
              taken++;
            }
          });
        } else if (li === totalSegs - 1) {
          // after last locked stop — take all remaining
          segStopIndices = remaining.slice();
        } else {
          // middle segment — take as many as fit
          var taken = 0;
          remaining.forEach(function(si) {
            if (taken < maxStopsInSeg) {
              segStopIndices.push(si);
              taken++;
            }
          });
        }

        // remove assigned stops so they don't appear in later segments
        segStopIndices.forEach(function(si) {
          var idx = unlockedStopIndices.indexOf(si);
          if (idx !== -1) { unlockedStopIndices.splice(idx, 1); }
        });

        // last segment gets any remaining unassigned stops
        if (li === totalSegs - 1 && unlockedStopIndices.length) {
          unlockedStopIndices.forEach(function(si) { segStopIndices.push(si); });
          unlockedStopIndices.length = 0;
        }

        segments.push({
          origin: segOrigin,
          destination: segDest,
          stopIndices: segStopIndices,
          stops: segStopIndices.map(function(si) { return stops[si]; }),
          anchor: anchor,
          startTimeMins: prevTimeMins
        });

        if (anchor) {
          var t = anchor.leg.lockedTime.split(':');
          prevTimeMins = parseInt(t[0]) * 60 + parseInt(t[1]) + (dwellTimes[stops[anchor.stopIndex].cat] || dwellTimes['default']);
          segOrigin = stops[anchor.stopIndex].name + ' ' + city;
        }
      }

      // run segments sequentially
      runSegmentRoute(segments, 0, [], item, stops, travelMode, function(results) {
        currentRouteResult = results;

        // assemble finalOrder and finalLegs from all segment results
        var finalOrder = [];
        var finalLegs = [];

        results.forEach(function(res, ri) {
          var seg = res.seg;

          // add optimised unlocked stops for this segment
          var orderedSegStops = res.order.map(function(oi) { return seg.stopIndices[oi]; });
          orderedSegStops.forEach(function(si, pos) {
            var leg = res.legs[pos] || {};
            var distM = leg.distance ? leg.distance.value : 0;
            var durMins = leg.duration ? Math.ceil(leg.duration.value / 60) : 0;
            finalOrder.push(si);
            finalLegs.push({
              from: finalOrder.length > 1 ? finalOrder[finalOrder.length - 2] : 'start',
              to: si,
              mode: recommendMode(distM),
              durationMins: durMins,
              distanceM: distM,
              locked: false,
              lockedTime: ''
            });
          });

          // add the locked anchor stop after this segment's unlocked stops
          if (seg.anchor) {
            var anchorLeg = res.legs[res.order.length] || {};
            var distM = anchorLeg.distance ? anchorLeg.distance.value : 0;
            var durMins = anchorLeg.duration ? Math.ceil(anchorLeg.duration.value / 60) : 0;
            finalOrder.push(seg.anchor.stopIndex);
            finalLegs.push({
              from: finalOrder.length > 1 ? finalOrder[finalOrder.length - 2] : 'start',
              to: seg.anchor.stopIndex,
              mode: seg.anchor.leg.mode || recommendMode(distM),
              durationMins: durMins,
              distanceM: distM,
              locked: true,
              lockedTime: seg.anchor.leg.lockedTime
            });
          }
        });

        // insert locked-no-time stops back at their previous positions
        lockedNoTimeSI.forEach(function(si) {
          var prevPos = existingOrder.indexOf(si);
          if (prevPos !== -1 && prevPos <= finalOrder.length) {
            finalOrder.splice(prevPos, 0, si);
            var leg = lockedByStopIndex[si];
            finalLegs.splice(prevPos, 0, {
              from: prevPos > 0 ? finalOrder[prevPos - 1] : 'start',
              to: si,
              mode: leg.mode || 'driving',
              durationMins: leg.durationMins || 0,
              distanceM: leg.distanceM || 0,
              locked: true,
              lockedTime: ''
            });
          } else {
            finalOrder.push(si);
            finalLegs.push({
              from: finalOrder.length > 1 ? finalOrder[finalOrder.length - 2] : 'start',
              to: si, mode: 'driving', durationMins: 0, distanceM: 0, locked: true, lockedTime: ''
            });
          }
        });

        item.routeOrder = finalOrder;
        item.routeLegs = finalLegs;
        saveToStorage();

    function recalcRouteTimes(item) {
      if (!item || !item.routeOrder || !item.routeLegs) { return; }

    function callClaudeRouteReview(item, finalOrder, finalLegs) {
      var stops = getRouteStops(item);
      var city = item.city.split('>').pop().trim();
      var destination = getTripDestination();
      var startTime = item.routeStartTime || '09:00';
      var dateStr = item.date || '';
      var returnToStart = item.routeReturnToStart !== false;

      // build coordinate map from activityMarkers if available
      var coordMap = {};
      activityMarkers.forEach(function(obj) {
        if (obj.position) {
          var key = obj.type + '_' + obj.index;
          coordMap[key] = obj.position;
        }
      });

      function getCoords(stop) {
        var key = stop.type + '_' + stop.index;
        var pos = coordMap[key];
        if (pos) {
          var lat = typeof pos.lat === 'function' ? pos.lat() : pos.lat;
          var lng = typeof pos.lng === 'function' ? pos.lng() : pos.lng;
          return lat.toFixed(4) + ', ' + lng.toFixed(4);
        }
        return item.lat.toFixed(4) + ', ' + item.lng.toFixed(4) + ' (approx)';
      }

      function distanceKm(c1, c2) {
        var R = 6371;
        var dLat = (c2[0]-c1[0]) * Math.PI/180;
        var dLng = (c2[1]-c1[1]) * Math.PI/180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(c1[0]*Math.PI/180)*Math.cos(c2[0]*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      var stopCoords = finalOrder.map(function(si) {
        var stop = stops[si];
        if (!stop) { return null; }
        var key = stop.type + '_' + stop.index;
        var pos = coordMap[key];
        if (pos) {
          var lat = typeof pos.lat === 'function' ? pos.lat() : pos.lat;
          var lng = typeof pos.lng === 'function' ? pos.lng() : pos.lng;
          return [lat, lng];
        }
        return [item.lat, item.lng];
      });

      var clusterLines = [];
      finalOrder.forEach(function(si, i) {
        var stop = stops[si];
        if (!stop || !stopCoords[i]) { return; }
        var nearby = [];
        finalOrder.forEach(function(sj, j) {
          if (i === j) { return; }
          var stopJ = stops[sj];
          if (!stopJ || !stopCoords[j]) { return; }
          if (distanceKm(stopCoords[i], stopCoords[j]) < 1.5) { nearby.push(stopJ.name); }
        });
        if (nearby.length) { clusterLines.push(stop.name + ' is close to: ' + nearby.join(', ')); }
      });
      var uniqueClusters = clusterLines.filter(function(c, i) { return clusterLines.indexOf(c) === i; });

      var monthSeasons = { Jan:'cool/dry', Feb:'cool/dry', Mar:'hot/dry', Apr:'hot/dry', May:'hot/humid - afternoon rain possible', Jun:'rainy season', Jul:'rainy season', Aug:'rainy season', Sep:'rainy season', Oct:'rainy season ending', Nov:'cool/dry starting', Dec:'cool/dry' };
      var dateParts = dateStr.replace(/^[A-Za-z]+\s/, '').split(' ');
      var monthName = dateParts[0] || 'May';
      var season = monthSeasons[monthName] || 'check local weather';
      var dowMatch = dateStr.match(/^([A-Za-z]+)/);
      var dayOfWeek = dowMatch ? dowMatch[1] : '';

      var stopsText = finalOrder.map(function(si, pos) {
        var stop = stops[si];
        if (!stop) { return ''; }
        var leg = finalLegs[pos] || {};
        var dwell = dwellTimes[stop.cat] || dwellTimes['default'];
        var isLocked = leg.locked && leg.lockedTime;
        var coords = getCoords(stop);
        var travelText = pos > 0
          ? '\n   Travel: ' + (routeModeLabels[leg.mode]||'🚗') + ' ~' + (leg.durationMins||'?') + 'min (' + (leg.distanceM ? (leg.distanceM/1000).toFixed(1)+'km' : '?') + ')'
          : '\n   Departs start at: ' + startTime;
        return (pos+1) + '. ' + (isLocked ? '🔒 LOCKED '+leg.lockedTime+' — ' : '') + stop.name +
          '\n   Type: ' + stop.cat + ' | Dwell: ' + dwell + 'min' +
          '\n   Coords: ' + coords + travelText;
      }).filter(Boolean).join('\n\n');

      var lockedIndices = finalOrder.filter(function(si, pos) {
        var leg = finalLegs[pos] || {};
        return leg.locked && leg.lockedTime;
      });

      var prompt =
        'You are an expert travel day planner with deep knowledge of ' + destination + ' and international travel.\n\n' +
        '=== TRIP CONTEXT ===\n' +
        'Destination: ' + destination + '\n' +
        'City: ' + city + '\n' +
        'Date: ' + dateStr + (dayOfWeek ? ' ('+dayOfWeek+')' : '') + '\n' +
        'Season: ' + season + '\n' +
        'Start: ' + getRouteStartLocation(item) + ' at ' + startTime + '\n' +
        'Return to start: ' + (returnToStart ? 'Yes' : 'No') + '\n\n' +
        '=== GOOGLE SUGGESTED ORDER ===\n' + stopsText + '\n\n' +
        '=== GEOGRAPHIC CLUSTERS (stops within 1.5km) ===\n' +
        (uniqueClusters.length ? uniqueClusters.join('\n') : 'No nearby clusters detected') + '\n\n' +
        '=== MEAL TIMING RULES ===\n' +
        '- Breakfast: 7:00-9:30am\n' +
        '- Lunch: 11:30am-2:00pm\n' +
        '- Dinner: 6:00pm-9:00pm\n' +
        '- Never place two food stops back to back\n' +
        '- Flag food stops outside their meal window\n' +
        '- Cafes are flexible on timing\n\n' +
        '=== WEATHER & ENERGY ===\n' +
        '- Season: ' + season + '\n' +
        '- Outdoor temples/markets: best before 11am or after 4pm\n' +
        '- Indoor stops ideal for 11am-3pm\n' +
        '- Allow buffer time — couples travel slower in afternoons\n\n' +
        '=== OPENING HOURS ===\n' +
        '- Temples: 8am-5pm typically\n' +
        '- Chatuchak Market: SATURDAY AND SUNDAY ONLY\n' +
        '- Floating markets: close by 11am\n' +
        '- Night markets/rooftop bars: open from 5-6pm\n' +
        '- Malls: 10am-10pm\n' +
        '- Beaches: all day, best before 10am and after 4pm\n\n' +
        '=== YOUR TASK ===\n' +
        '1. Review the order critically\n' +
        '2. Check for: backtracking, meal timing issues, heat exposure, opening hour conflicts, day-of-week issues\n' +
        '3. Group geographically close stops together\n' +
        '4. LOCKED stops cannot move under any circumstances\n' +
        '5. suggestedOrder must contain EXACTLY these indices: ' + JSON.stringify(finalOrder) + '\n' +
        '6. Locked indices that must not move: ' + JSON.stringify(lockedIndices) + '\n\n' +
        'Return ONLY valid JSON, no markdown:\n' +
        '{\n' +
        '  "verdict": "good" or "suggestion" or "warning",\n' +
        '  "message": "1-2 sentence honest summary",\n' +
        '  "issues": ["specific issue 1", "specific issue 2"],\n' +
        '  "suggestedOrder": null or [array of ALL stop indices in recommended order]\n' +
        '}';

      fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': anthropicApiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var text = data.content && data.content[0] && data.content[0].text ? data.content[0].text : '';
        var clean = text.replace(/```json|```/g, '').trim();
        var parsed;
        try { parsed = JSON.parse(clean); } catch(e) {
          parsed = { verdict: 'warning', message: 'AI review could not be parsed. Try re-optimising.', issues: [], suggestedOrder: null };
        }
        renderClaudeReview(parsed, item, finalOrder, finalLegs);
      })
      .catch(function() {
        renderClaudeReview({ verdict: 'warning', message: 'AI review unavailable. Check your connection.', issues: [], suggestedOrder: null }, item, finalOrder, finalLegs);
      });
    }

      function renderClaudeReview(parsed, item, finalOrder, finalLegs) {
      var reviewEl = document.getElementById('claude-route-review');
      if (!reviewEl) { return; }
      var verdictEmoji = parsed.verdict === 'good' ? '✅' : parsed.verdict === 'warning' ? '⚠️' : '💡';
      var verdictColor = parsed.verdict === 'good' ? 'var(--accent)' : parsed.verdict === 'warning' ? 'var(--warn)' : '#5B9BD5';
      var issuesHtml = parsed.issues && parsed.issues.length
        ? '<ul style="margin:6px 0 0 0;padding-left:16px;">' + parsed.issues.map(function(iss) { return '<li style="font-size:11px;color:var(--ink-muted);margin-bottom:3px;">' + iss + '</li>'; }).join('') + '</ul>'
        : '';

      var hasDifferentOrder = parsed.suggestedOrder && JSON.stringify(parsed.suggestedOrder) !== JSON.stringify(finalOrder);
      var stops = getRouteStops(item);
      var suggestedHtml = '';
      if (hasDifferentOrder) {
        suggestedHtml = '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--sand-dark);">' +

          parsed.suggestedOrder.map(function(si, pos) {
            var stop = stops[si];

            var leg = finalLegs[pos] || {};
            var isLocked = leg.locked && leg.lockedTime;
            return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--sand-dark);">' +
              '<div style="width:20px;height:20px;border-radius:50%;background:' + (isLocked ? 'var(--warn)' : verdictColor) + ';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (isLocked ? '🔒' : (pos+1)) + '</div>' +
              '<div style="font-size:12px;color:var(--ink);">' + stop.name + '</div>' +
            '</div>';
          }).filter(Boolean).join('') +
          '<button onclick="applyClaudeOrder(' + JSON.stringify(parsed.suggestedOrder) + ')" style="width:100%;margin-top:10px;font-family:inherit;font-size:12px;font-weight:700;padding:9px;border-radius:var(--radius-sm);border:none;background:' + verdictColor + ';color:#fff;cursor:pointer;">✨ Apply Claude\'s order</button>' +
        '</div>';

      reviewEl.innerHTML =
        '<div style="background:var(--sand);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--sand-dark);margin-top:12px;">' +
          '<div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">🤖 Claude Review</div>' +
          '<div style="font-size:13px;font-weight:700;color:' + verdictColor + ';margin-bottom:4px;">' + verdictEmoji + ' ' + parsed.message + '</div>' +
          issuesHtml +
          suggestedHtml +
        '</div>';
    }

    function applyClaudeOrder(newOrder) {
      if (!currentDayItem) { return; }
      var oldLegs = currentDayItem.routeLegs || [];
      var oldOrder = currentDayItem.routeOrder || [];

      // rebuild legs preserving lock data for each stop
      var legByStopIndex = {};
      oldOrder.forEach(function(si, pos) { legByStopIndex[si] = oldLegs[pos] || {}; });

      currentDayItem.routeOrder = newOrder;
      currentDayItem.routeLegs = newOrder.map(function(si, pos) {
        var existing = legByStopIndex[si] || {};
        return {
          from: pos === 0 ? 'start' : newOrder[pos - 1],
          to: si,
          mode: existing.mode || 'driving',
          durationMins: existing.durationMins || 0,
          distanceM: existing.distanceM || 0,
          locked: existing.locked || false,
          lockedTime: existing.lockedTime || ''
        };
      });

      currentRouteResult = { applied: true };
      saveToStorage();
      var resultsEl = document.getElementById('route-results');
      if (resultsEl) { resultsEl.innerHTML = buildRouteResultsHtml(currentDayItem); }
    }

      var destination = item.routeReturnToStart !== false
        ? encodeURIComponent(startLoc)
        : encodeURIComponent(ordered[ordered.length - 1].name + ' ' + city);
      var waypointStops = item.routeReturnToStart !== false
        ? ordered
        : ordered.slice(0, ordered.length - 1);
      var waypoints = encodeURIComponent(waypointStops.map(function(s) { return s.name + ' ' + city; }).join('|'));
      var modeMap = { 'driving': 'driving', 'walking': 'walking', 'two-wheeler': 'driving', 'transit': 'transit' };
      var travelMode = modeMap[item.routeDefaultMode || 'driving'] || 'driving';
      return 'https://www.google.com/maps/dir/?api=1&origin=' + origin + '&destination=' + destination + '&waypoints=' + waypoints + '&travelmode=' + travelMode;
    }

          el.style.cssText = 'width:26px;height:26px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;';
          el.textContent = (idx + 1) + '';
          el.style.fontSize = '10px';
          el.style.fontWeight = '700';
          el.style.color = '#fff';
          var marker = new google.maps.marker.AdvancedMarkerElement({ position: place.geometry.location, map: discMap, content: el });
          marker.addListener('gmp-click', function() { scrollToDiscResult(idx); });
          discMarkers.push(marker);
          bounds.extend(place.geometry.location);
          return '<div class="disc-result-card" id="disc-result-' + idx + '" onclick="selectDiscResult(' + idx + ')">' +
            '<div class="disc-result-card-body">' +
              '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
                '<div style="width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (idx+1) + '</div>' +
                '<div class="disc-result-name">' + place.name + '</div>' +
              '</div>' +
              closestHtml +
              '<div class="disc-result-address">' + (place.formatted_address || '') + '</div>' +
              '<div class="disc-result-meta">' + ratingHtml + '</div>' +
              '</div>' +
              '<div class="disc-result-actions">'
                '<button class="kbtn" style="border-color:var(--accent);color:var(--accent);font-weight:700;" onclick="event.stopPropagation();showAddToTripSheet(' + idx + ')">+ Add to Trip</button>' +
                '<button class="kbtn" onclick="event.stopPropagation();saveDiscResultToWishlist(' + idx + ')">⭐ Wishlist</button>' +
                '<a href="https://www.google.com/maps/place/?q=place_id:' + place.place_id + '" target="_blank" onclick="event.stopPropagation();" style="text-decoration:none;"><button class="kbtn">📍 Maps</button></a>' +
              '</div>' +
            '</div>' +
          '</div>';
        });
        discMap.fitBounds(bounds, { padding: 40 });
        body.innerHTML = '<div style="font-size:11px;color:var(--ink-muted);margin-bottom:10px;">' + results.length + ' results for "' + query + '"</div>' + cards.join('');
        window._discResults = results.slice(0, 8);
      });
    }

    function findClosestDay(latLng) {
      var best = null, bestDist = Infinity;
      currentTrip.days.forEach(function(day) {
        if (!day.lat || !day.lng) return;
        var R = 6371;
        var dLat = (latLng.lat() - day.lat) * Math.PI / 180;
        var dLng = (latLng.lng() - day.lng) * Math.PI / 180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(day.lat*Math.PI/180)*Math.cos(latLng.lat()*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
        var dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        if (dist < bestDist) { bestDist = dist; best = day; }
      });
      return best;
    }

    function scrollToDiscResult(idx) {

        '</div>';

      document.getElementById('disc-add-sheet-body').innerHTML =

        '<div style="font-size:11px;color:var(--ink-muted);margin-bottom:16px;">' + (place.formatted_address || place.address || '') + '</div>' +
        '<span class="disc-step-label">1. What type?</span>' +
        '<div class="disc-cat-grid">' +
          '<button class="disc-cat-btn" id="disc-cat-stay" onclick="selectDiscCat(\'stay\')">🏨<br><span style="font-size:10px;">Stay</span></button>' +

        '</div>' +
        '<div id="disc-subcat-section" style="display:none;">' +
          '<span class="disc-step-label">2. Activity type?</span>' +
          '<div class="disc-subcat-grid">' + subcatHtml + '</div>' +
        '</div>' +
        '<span class="disc-step-label" id="disc-day-step-label">2. Which day?</span>' +

        '<button class="disc-save-btn" id="disc-save-btn" onclick="confirmAddToTrip()" disabled>Save to Trip</button>';

      document.getElementById('disc-add-sheet').classList.add('open');

    function selectDiscCat(cat) {
      _discSelectedCat = cat;
      _discSelectedSubcat = null;
      document.querySelectorAll('.disc-cat-btn[id^="disc-cat-"]').forEach(function(b) { b.classList.remove('selected'); });

    function updateDiscSaveBtn() {

      btn.disabled = !(catOk && subcatOk && dayOk);

    function confirmAddToTrip() {
      var place = _discAddSource === 'wishlist' ? discWishlist[_discAddIdx] : (window._discResults && window._discResults[_discAddIdx]);
      if (!place || _discSelectedDay === null || !_discSelectedCat) return;
      var day = currentTrip.days[_discSelectedDay];
      var name = place.name;
      var linkInput = _discAddSource === 'wishlist'
        ? null
        : (_discAddIdx === 0
            ? document.getElementById('disc-link-input')
            : document.getElementById('disc-link-input-' + _discAddIdx));
      var link = (linkInput ? linkInput.value.trim() : '') || (place.link || '');
      if (_discSelectedCat === 'stay') {
        normaliseAccom(day);
        day.accommodation.push({ name: name, notes: place.formatted_address || place.address || '', price: '', link: link });
      } else if (_discSelectedCat === 'food') {
        normaliseFood(day);
        day.food.push({ name: name, link: link, bookingUrl: '', reservationRequired: false, reservationBooked: false, notes: place.formatted_address || place.address || '', mustOrder: '' });
      } else if (_discSelectedCat === 'activity') {
        day.activities.push(name);
        if (!day.activityCategories) { day.activityCategories = []; }
        day.activityCategories.push(_discSelectedSubcat || 'default');
        if (!day.activityLinks) { day.activityLinks = []; }
        day.activityLinks.push(link);
      }
      saveToStorage();
      closeAddToTripSheet();
      var toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:20px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.3);animation:fadeInUp 0.2s ease;white-space:nowrap;';
      toast.textContent = '✅ Added to Day ' + day.day + ' · ' + day.city;
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 2500);
    }

    function saveDiscResultToWishlist(idx) {
      var results = window._discResults;

      if (already) { return; }
      var linkInput = idx === 0
        ? document.getElementById('disc-link-input')
        : document.getElementById('disc-link-input-' + idx);
      var savedLink = linkInput ? linkInput.value.trim() : '';
      discWishlist.push({ name: place.name, address: place.formatted_address || '', rating: place.rating || 0, place_id: place.place_id, lat: place.geometry.location.lat(), lng: place.geometry.location.lng(), link: savedLink });
      saveDiscWishlist();
      renderDiscWishlistPill();
      var btn = document.querySelectorAll('.disc-result-card')[idx];
      var wbtn = btn ? btn.querySelector('button:nth-child(2)') : null;
      if (wbtn) { wbtn.textContent = '⭐ Saved!'; wbtn.style.color = 'var(--accent)'; wbtn.style.borderColor = 'var(--accent)'; }
    }

    function removeFromWishlist(idx) {
      discWishlist.splice(idx, 1);
      saveDiscWishlist();
      renderDiscWishlistPill();
      openWishlistDrawer();
    }

      showAddToTripSheet(idx, true);

    function openWishlistDrawer() {
      var existing = document.getElementById('disc-wishlist-drawer');
      if (existing) { existing.remove(); }
      var overlay = document.createElement('div');
      overlay.id = 'disc-wishlist-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:5400;';
      overlay.onclick = closeWishlistDrawer;

      drawer.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:5500;background:var(--white);border-radius:20px 20px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,0.3);border-top:1px solid var(--sand-dark);max-height:75vh;display:flex;flex-direction:column;animation:fadeInUp 0.25s ease;';
      var bodyHtml;

      } else {
        bodyHtml = discWishlist.map(function(item, idx) {

            '<div class="disc-wishlist-icon">📍</div>' +
            '<div class="disc-wishlist-info">' +
              '<div class="disc-wishlist-name">' + item.name + '</div>' +
              '<div class="disc-wishlist-address">' + (item.address || '') + '</div>' +
              (item.rating ? '<div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:6px;">★ ' + item.rating + '</div>' : '') +
              '<div class="disc-wishlist-actions">' +
                '<button class="kbtn" onclick="closeWishlistDrawer();setTimeout(function(){showAddToTripSheet(' + idx + ',true);},200);" style="border-color:var(--accent);color:var(--accent);font-weight:700;">+ Add to Trip</button>' +
                '<button class="kbtn" onclick="showWishlistOnMap(' + idx + ');closeWishlistDrawer();">📍 Map</button>' +
                (item.link
                  ? '<a href="' + item.link + '" target="_blank" style="text-decoration:none;"><button class="kbtn">🔗 Link</button></a>'
                  : '<button class="kbtn" onclick="addWishlistLink(' + idx + ')">🔗 Add link</button>') +
                '<button class="kbtn" onclick="removeFromWishlist(' + idx + ')" style="border-color:var(--danger);color:var(--danger);">✕</button>' +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('');

      drawer.innerHTML =
        '<div style="width:36px;height:4px;background:var(--sand-dark);border-radius:2px;margin:12px auto 0;flex-shrink:0;"></div>' +
        '<div style="padding:14px 20px 10px;border-bottom:1px solid var(--sand-dark);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">' +
          '<div style="font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;">⭐ Wishlist <span style="font-size:12px;font-weight:600;color:var(--ink-muted);">(' + discWishlist.length + ')</span></div>' +
          '<button onclick="closeWishlistDrawer()" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--sand-dark);background:var(--sand);cursor:pointer;font-size:12px;color:var(--ink-muted);">×</button>' +
        '</div>' +
        '<div style="overflow-y:auto;flex:1;">' + bodyHtml + '</div>';
      document.body.appendChild(drawer);

    function addWishlistLink(idx) {
      showModal('Add link',
        '<div class="modal-field"><label>Instagram, TikTok, website...</label><input type="text" id="wishlist-link-input" placeholder="https://..." value="' + (discWishlist[idx].link || '') + '" autofocus></div>',
        function() {
          var val = document.getElementById('wishlist-link-input').value.trim();
          discWishlist[idx].link = val;
          saveDiscWishlist();
          closeWishlistDrawer();
          openWishlistDrawer();
        }
      );
    }

    function saveDiscWishlist() {
      try { localStorage.setItem('disc_wishlist', JSON.stringify(discWishlist)); } catch(e) {}
      db.collection('trips').doc(currentTripKey).update({ wishlist: JSON.stringify(discWishlist) })
        .then(function() { console.log('Wishlist saved to Firestore', discWishlist.length, 'items'); })
        .catch(function(e) { console.warn('Wishlist Firestore save failed:', e); });
    }

    function loadDiscWishlist() {
      try { var s = localStorage.getItem('disc_wishlist'); if (s) { discWishlist = JSON.parse(s); } } catch(e) {}
      db.collection('trips').doc(currentTripKey).get().then(function(doc) {
        if (doc.exists && doc.data().wishlist) {
          discWishlist = JSON.parse(doc.data().wishlist);
          try { localStorage.setItem('disc_wishlist', JSON.stringify(discWishlist)); } catch(e) {}
        }
      }).catch(function(e) { console.warn('Could not load wishlist:', e); });
    }

    // ===== STORAGE =====
    function saveToStorage() {
      // IMPORTANT: always use { merge: true } here.
      // cardPhotos and wishlist are saved separately by saveCardPhotos() and saveDiscWishlist().
      // Without merge:true, .set() overwrites the whole Firestore doc and wipes those fields.
      db.collection('trips').doc(currentTripKey).set({
        data: JSON.stringify(trips[currentTripKey]),
        citySettings: JSON.stringify(citySettings),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true }).catch(function(e) { console.warn('Firestore save failed:', e); });
      localStorage.setItem('current_trip_key', currentTripKey);
    }

    function loadFromStorage(callback) {
      var savedKey = localStorage.getItem('current_trip_key');
      if (savedKey && trips[savedKey]) { currentTripKey = savedKey; }
      db.collection('trips').doc(currentTripKey).get().then(function(doc) {
        if (doc.exists) {
          var data = doc.data();
          if (data.data) {
            var parsed = JSON.parse(data.data);
            trips[currentTripKey] = parsed;
          }
          if (data.citySettings) {
            var pc = JSON.parse(data.citySettings);
            Object.keys(pc).forEach(function(key) { citySettings[key] = pc[key]; });
          }
          if (data.cardPhotos) {
            var remote = JSON.parse(data.cardPhotos);
            Object.keys(remote).forEach(function(key) { cardPhotos[key] = remote[key]; });
            try { localStorage.setItem('card_photos', JSON.stringify(cardPhotos)); } catch(e) {}
          }
        }
        if (callback) { callback(); }
      }).catch(function(e) {
        console.warn('Firestore load failed, using defaults:', e);
        if (callback) { callback(); }
      });
    }

    function setupRealtimeSync() {
      db.collection('trips').doc(currentTripKey).onSnapshot(function(doc) {
        if (doc.exists) {
          var data = doc.data();
          if (data && data.data) {
            var parsed = JSON.parse(data.data);
            trips[currentTripKey] = parsed;
            currentTrip = trips[currentTripKey];
            if (data.cardPhotos) {
              var remote = JSON.parse(data.cardPhotos);
              Object.keys(remote).forEach(function(key) { cardPhotos[key] = remote[key]; });
              try { localStorage.setItem('card_photos', JSON.stringify(cardPhotos)); } catch(e) {}
            }
            if (data.wishlist) {
              discWishlist = JSON.parse(data.wishlist);
              try { localStorage.setItem('disc_wishlist', JSON.stringify(discWishlist)); } catch(e) {}
            }
            rebuildTimeline();
            rebuildMobStrip();
            if (cityMarkerObjs.length === 0) {
              (function retryMarkers(n) {
                addCityMarkers();
                if (cityMarkerObjs.length === 0 && n > 0) { setTimeout(function() { retryMarkers(n - 1); }, 500); }
              })(10);
            }
            if (isMobile() && currentView === 'map') {
              var pill = document.getElementById('mob-day-pill');
              var panelOpen = document.getElementById('panel').classList.contains('open');
              if (pill && !panelOpen) { pill.classList.add('active'); }
            }
            if (currentView === 'home') { renderHome(); }
            if (currentView === 'itinerary') { renderItinerary(); restoreActiveItinEdit(); }
            if (currentView === 'cards') { renderKanban(); }
            if (currentView === 'split') { renderSplit(); }
            if (currentView === 'budget') { renderBudget(); }
            if (currentView === 'food') { renderFood(); }
            if (currentView === 'calendar') { renderCalendar(); }
          }
        }
      });
    }
  </script>

      <div id="mob-pin-sheet-name"></div>
      <div id="mob-pin-sheet-note"></div>
      <div id="mob-pin-sheet-actions">
        <a id="mob-pin-sheet-maps" href="" target="_blank" class="mob-pin-action primary">📍 Open in Maps</a>
        <button id="mob-pin-sheet-done" class="mob-pin-action" style="display:none;align-items:center;gap:4px;border-radius:20px;font-weight:600;transition:background 0.2s,color 0.2s;">Mark done</button>
        <button class="mob-pin-action" onclick="closeMobPinSheet()">✕ Close</button>
      </div>
    </div>
  </div>

  <div id="map-float-card">
    <button id="map-float-card-close" onclick="closeMapFloatCard()">×</button>
    <img id="map-float-card-img" src="" style="display:none;">
    <div id="map-float-card-body">
      <div id="map-float-card-name"></div>
      <div id="map-float-card-note"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <a id="map-float-card-link" href="" target="_blank" style="flex:1;">📍 Open in Maps</a>
        <button id="map-float-card-done" style="display:none;align-items:center;font-family:inherit;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:none;cursor:pointer;white-space:nowrap;transition:background 0.2s,color 0.2s;">Mark done</button>
        <button id="map-float-card-edit" onclick="openFloatCardEdit()" style="font-family:inherit;font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:none;color:var(--accent);cursor:pointer;white-space:nowrap;display:none;">✏️ Edit</button>
      </div>
    </div>
  </div>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXFs5TVkOdKJciflCTQmX2vH9FwWTqfz8&callback=initMap&loading=async&libraries=places,marker" async defer></script>
</body>
</html>
