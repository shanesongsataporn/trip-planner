<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shane &amp; Cheryl&#39;s Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #1C2A24; --sand-dark: #24332B; --ink: #E8F0EB; --ink-light: #B0C4B8;
      --ink-muted: #6B8A78; --white: #111A15; --accent: #2D9E75; --accent-light: #1A3D2E;
      --warn: #E67E22; --danger: #E05555;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.35);
      --card-shadow-hover: 0 6px 24px rgba(0,0,0,0.5);
      --radius: 14px; --radius-sm: 8px;
      --accent-h: 158; --accent-s: 56%; --accent-l: 40%;
    }
    body.theme-light {
      --sand: #F0EDE8; --sand-dark: #E0DDD6; --ink: #1A1A18; --ink-light: #4A4A45;
      --ink-muted: #9A9A92; --white: #FAFAF8; --accent: #2D9E75; --accent-light: #E1F5EE;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --card-shadow-hover: 0 6px 24px rgba(0,0,0,0.14);
    }
    body.theme-travel {
      --sand: #2A1F1A; --sand-dark: #352820; --ink: #F5EDE6; --ink-light: #D4B8A8;
      --ink-muted: #8A6A58; --white: #1A1210; --accent: #E07040; --accent-light: #3D2010;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.4);
      --card-shadow-hover: 0 6px 24px rgba(0,0,0,0.55);
    }

    html, body { height: 100%; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: var(--ink); overflow: hidden; background: var(--white); }

    /* ===== DESKTOP HEADER ===== */
    #hdr {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 3000;
      background: var(--white); border-bottom: 1px solid var(--sand-dark);
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
      backdrop-filter: blur(12px);
    }
    .brand { font-size: 14px; font-weight: 800; color: var(--ink); white-space: nowrap; flex-shrink: 0; letter-spacing: -0.02em; }
    .brand span { color: var(--accent); }
    .hdr-sep { width: 1px; height: 18px; background: var(--sand-dark); flex-shrink: 0; opacity: 0.6; }
    .trip-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .trip-wrap label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); white-space: nowrap; font-weight: 600; }
    #tripSel { font-family: inherit; font-size: 12px; font-weight: 600; border: 1px solid var(--sand-dark); background: var(--sand); border-radius: var(--radius-sm); padding: 5px 10px; color: var(--ink); cursor: pointer; outline: none; max-width: 160px; transition: border-color 0.15s; }
    #tripSel:focus { border-color: var(--accent); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .view-switcher { display: flex; align-items: center; gap: 2px; background: var(--sand); border: 1px solid var(--sand-dark); border-radius: 10px; padding: 3px; }
    .view-btn { font-family: inherit; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 7px; border: none; background: none; color: var(--ink-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; letter-spacing: -0.01em; }
    .view-btn:hover { color: var(--ink); background: var(--sand-dark); }
    .view-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .theme-switcher { display: flex; align-items: center; gap: 2px; background: var(--sand); border: 1px solid var(--sand-dark); border-radius: 10px; padding: 3px; }
    .theme-btn { font-family: inherit; font-size: 11px; font-weight: 600; padding: 5px 8px; border-radius: 7px; border: none; background: none; cursor: pointer; transition: all 0.2s; color: var(--ink-muted); }
    .theme-btn:hover { color: var(--ink); }
    .theme-btn.active { background: var(--white); box-shadow: 0 2px 6px rgba(0,0,0,0.15); color: var(--ink); }
    .hamburger-btn { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--sand-dark); background: var(--sand); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0; transition: all 0.15s; }
    .hamburger-btn span { display: block; width: 14px; height: 1.5px; background: var(--ink-muted); border-radius: 2px; transition: background 0.15s; }
    .hamburger-btn:hover { background: var(--sand-dark); }
    .hamburger-btn:hover span { background: var(--ink); }

    /* ===== CUSTOM THEME SLIDERS ===== */
    #custom-theme-panel {
      display: none; position: fixed; top: 62px; right: 14px; z-index: 4500;
      background: var(--white); border: 1px solid var(--sand-dark);
      border-radius: var(--radius); padding: 16px; width: 240px;
      box-shadow: var(--card-shadow-hover);
    }
    #custom-theme-panel.open { display: block; }
    .slider-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; display: block; }
    .slider-wrap { margin-bottom: 16px; }
    .slider-wrap:last-child { margin-bottom: 0; }
    .theme-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
    #slider-base { background: linear-gradient(to right, #FAFAF8, #111A15); }
    #slider-accent { background: linear-gradient(to right, #e74c3c, #e67e22, #f1c40f, #2ecc71, #1abc9c, #3498db, #9b59b6, #e74c3c); }
    .theme-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--white); border: 2px solid var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; }
    .theme-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--white); border: 2px solid var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; border: none; }
    .slider-preview { width: 100%; height: 28px; border-radius: var(--radius-sm); margin-top: 8px; border: 1px solid var(--sand-dark); }

    /* ===== MOBILE HEADER ===== */
    #mob-hdr {
      display: none; position: fixed; top: 0; left: 0; right: 0; height: 54px; z-index: 3000;
      background: var(--white); border-bottom: 1px solid var(--sand-dark);
      align-items: center; padding: 0 14px; gap: 10px;
      backdrop-filter: blur(12px);
    }
    .mob-brand { font-size: 13px; font-weight: 800; color: var(--ink); flex: 1; letter-spacing: -0.02em; white-space: nowrap; }
    .mob-brand span { color: var(--accent); }
    .mob-grid-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--sand-dark); background: var(--sand); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.15s; }
    .mob-grid-btn:hover { background: var(--sand-dark); }
    .mob-hamburger-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--sand-dark); background: var(--sand); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0; }
    .mob-hamburger-btn span { display: block; width: 14px; height: 1.5px; background: var(--ink-muted); border-radius: 2px; }

    /* ===== DROPDOWN MENUS ===== */
    #hamburger-menu, #mob-view-menu, #mob-hamburger-menu {
      display: none; position: fixed; z-index: 4000; background: var(--white);
      border: 1px solid var(--sand-dark); border-radius: var(--radius);
      box-shadow: var(--card-shadow-hover); min-width: 210px; overflow: hidden;
    }
    #hamburger-menu { top: 62px; right: 14px; }
    #mob-view-menu { top: 60px; right: 58px; min-width: 170px; }
    #mob-hamburger-menu { top: 60px; right: 14px; }
    #hamburger-menu.open, #mob-view-menu.open, #mob-hamburger-menu.open { display: block; animation: menuFadeIn 0.15s ease; }
    @keyframes menuFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .menu-section { padding: 6px 0; border-bottom: 1px solid var(--sand-dark); }
    .menu-section:last-child { border-bottom: none; }
    .menu-section-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); padding: 8px 14px 4px; font-weight: 700; }
    .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; transition: background 0.12s; border: none; background: none; width: 100%; font-family: inherit; text-align: left; }
    .menu-item:hover { background: var(--sand); }
    .menu-item.active { color: var(--accent); font-weight: 700; }
    .menu-item.danger { color: var(--danger); }

    /* ===== DESKTOP LAYOUT ===== */
    #map { display: none; position: fixed; top: 56px; left: 0; right: 0; bottom: 100px; z-index: 1; height: calc(100vh - 56px - 100px); }
    #tl {
      position: fixed; bottom: 0; left: 0; right: 0; height: 100px; z-index: 3000;
      background: var(--white); border-top: 1px solid var(--sand-dark);
      overflow-x: auto; overflow-y: hidden; display: flex; align-items: stretch;
      scrollbar-width: thin; cursor: grab;
    }
    #tl.dragging { cursor: grabbing; }
    #tl::-webkit-scrollbar { height: 3px; }
    #tl::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; opacity: 0.4; }
    #tl-inner { display: flex; align-items: stretch; min-width: max-content; padding: 0; }
    .day-card {
      display: flex; flex-direction: column; justify-content: center;
      padding: 10px 16px; cursor: pointer; position: relative;
      border-right: 1px solid var(--sand-dark); width: 170px;
      transition: background 0.15s; user-select: none; flex-shrink: 0;
      background: var(--white);
    }
    .day-card:last-child { border-right: none; }
    .day-card:hover { background: var(--sand); }
    .day-card.active { background: var(--sand); }
    .day-card.active::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); border-radius: 0 0 2px 2px; }
    .day-card.is-today { border-top: 2px solid var(--accent); box-shadow: inset 0 2px 0 0 var(--accent), 0 0 0 1px var(--accent); }
    .day-card.is-today .dc-num::before { content: 'TODAY · '; color: var(--accent); }
    .dc-num { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 3px; font-weight: 700; }
    .dc-city { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 3px; letter-spacing: -0.01em; }
    .dc-note { font-size: 10px; color: var(--ink-muted); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ===== PANEL ===== */
    #panel {
      position: fixed; top: 56px; right: 0; width: 370px; bottom: 100px;
      background: var(--white); border-left: 1px solid var(--sand-dark);
      z-index: 2000; transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #panel.open { transform: translateX(0); }
    #panel-head { padding: 16px 16px 0; position: relative; flex-shrink: 0; }
    #panel-close {
      position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
      border-radius: 50%; border: 1px solid var(--sand-dark); background: var(--sand);
      cursor: pointer; font-size: 12px; color: var(--ink-muted);
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    #panel-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    #panel-body { overflow-y: auto; flex: 1; scrollbar-width: thin; }
    #panel-body::-webkit-scrollbar { width: 3px; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
    .panel-day-num { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; font-weight: 700; }
    .panel-city { font-size: 22px; font-weight: 800; color: var(--ink); margin-bottom: 2px; letter-spacing: -0.02em; }
    .panel-note { font-size: 13px; color: var(--ink-light); line-height: 1.6; }
    .panel-tabs { display: flex; border-bottom: 1px solid var(--sand-dark); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; margin-top: 12px; }
    .panel-tabs::-webkit-scrollbar { display: none; }
    .panel-tab { flex-shrink: 0; padding: 10px 12px; font-size: 11px; font-weight: 700; text-align: center; cursor: pointer; color: var(--ink-muted); border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; white-space: nowrap; letter-spacing: 0.01em; }
    .panel-tab:hover { color: var(--ink); }
    .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .panel-content { display: none; padding: 16px; }
    .panel-content.active { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ===== SPLIT FLOAT CARD ===== */
    #split-float-card {
      display: none; position: absolute; z-index: 2000;
      bottom: 20px; left: 16px; width: 230px;
      background: var(--white); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--card-shadow-hover); border: 1px solid var(--sand-dark);
      animation: fadeInUp 0.2s ease; pointer-events: all;
    }
    #split-float-card.open { display: block; }
    #split-float-card img { width:100%; height:120px; object-fit:cover; display:block; }
    #split-float-card-body { padding: 12px 14px; }
    #split-float-card-name { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.3; letter-spacing: -0.01em; }
    #split-float-card-note { font-size: 11px; color: var(--ink-muted); font-style: italic; margin-bottom: 8px; }
    #split-float-card-link { font-size: 11px; color: var(--accent); text-decoration: none; font-weight: 600; }
    #split-float-card-close { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.45); border: none; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ===== MAP FLOAT CARD ===== */
    #map-float-card {
      display: none; position: fixed; z-index: 2000;
      bottom: 110px; left: 16px; width: 240px;
      background: var(--white); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--card-shadow-hover); border: 1px solid var(--sand-dark);
      animation: fadeInUp 0.2s ease;
    }
    @media (max-width: 640px) {
      #map-float-card { bottom: 82px; left: 50%; transform: translateX(-50%); width: 280px; z-index: 2600; }
    }
    #map-float-card.open { display: block; }
    #map-float-card img { width:100%; height:120px; object-fit:cover; display:block; }
    #map-float-card-body { padding: 12px 14px; }
    #map-float-card-name { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.3; letter-spacing: -0.01em; }
    #map-float-card-note { font-size: 11px; color: var(--ink-muted); font-style: italic; margin-bottom: 8px; }
    #map-float-card-link { font-size: 11px; color: var(--accent); text-decoration: none; font-weight: 600; }
    #map-float-card-close { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.45); border: none; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1; }
    @media (min-width: 641px) {
      #map-float-card { bottom: 120px; width: 260px; }
    }

    /* ===== INLINE EDIT ===== */
    .inline-edit { border: none; background: transparent; font-family: inherit; color: inherit; outline: none; width: 100%; cursor: text; padding: 2px 6px; border-radius: var(--radius-sm); transition: background 0.15s; }
    .inline-edit:hover { background: var(--sand); }
    .inline-edit:focus { background: var(--sand); outline: 1px solid var(--accent); }

    /* ===== FORMS & BUTTONS ===== */
    .marker-edit-form { background: var(--sand); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; border: 1px solid var(--sand-dark); }
    .marker-edit-form label { display: block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; margin-top: 10px; font-weight: 700; }
    .marker-edit-form label:first-child { margin-top: 0; }
    .marker-edit-form input[type="text"] { width: 100%; font-family: inherit; font-size: 20px; padding: 8px 10px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--white); color: var(--ink); outline: none; text-align: center; }
    .marker-edit-form input[type="color"] { width: 100%; height: 38px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); cursor: pointer; padding: 2px; background: var(--white); }
    .save-marker-btn { width: 100%; margin-top: 12px; font-family: inherit; font-size: 12px; font-weight: 700; padding: 9px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s; }
    .save-marker-btn:hover { opacity: 0.85; }
    .edit-marker-toggle { font-family: inherit; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--sand-dark); background: var(--sand); color: var(--ink-muted); cursor: pointer; margin-top: 8px; display: inline-block; transition: all 0.15s; }
    .edit-marker-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .add-btn { display: flex; align-items: center; gap: 6px; font-family: inherit; font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px dashed var(--sand-dark); background: none; color: var(--ink-muted); cursor: pointer; width: 100%; margin-top: 10px; transition: all 0.15s; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* ===== SEARCH ===== */
    .search-box { display: none; margin-top: 10px; }
    .search-box.open { display: block; }
    .search-input { width: 100%; font-family: inherit; font-size: 13px; padding: 9px 12px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.15s; }
    .search-input:focus { border-color: var(--accent); background: var(--white); }
    .search-results { margin-top: 6px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); overflow: hidden; display: none; box-shadow: var(--card-shadow); }
    .search-results.open { display: block; }
    .search-result-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--sand-dark); background: var(--white); transition: background 0.12s; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--sand); }
    .search-result-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .search-result-address { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

    /* ===== TRANSPORT TAB ===== */
    .transport-card { background: var(--sand); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; border: 1px solid var(--sand-dark); position: relative; transition: box-shadow 0.15s; }
    .transport-card:hover { box-shadow: var(--card-shadow); }
    .transport-card-type { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
    .transport-card-route { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; }
    .transport-card-detail { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
    .transport-form { background: var(--sand); border-radius: var(--radius-sm); padding: 14px; border: 1px solid var(--sand-dark); margin-top: 10px; }
    .transport-form label { display: block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 3px; margin-top: 10px; font-weight: 700; }
    .transport-form label:first-child { margin-top: 0; }
    .transport-form input, .transport-form select { width: 100%; font-family: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--white); color: var(--ink); outline: none; transition: border-color 0.15s; }
    .transport-form input:focus, .transport-form select:focus { border-color: var(--accent); }
    .transport-row { display: flex; gap: 8px; }
    .transport-row > div { flex: 1; }

    /* ===== MODAL ===== */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 6000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    #modal-overlay.open { display: flex; animation: menuFadeIn 0.15s ease; }
    #modal { background: var(--white); border-radius: var(--radius); padding: 24px; width: 420px; max-width: 92vw; border: 1px solid var(--sand-dark); box-shadow: var(--card-shadow-hover); }
    #modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 16px; color: var(--ink); letter-spacing: -0.02em; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 5px; font-weight: 700; }
    .modal-field input { width: 100%; font-family: inherit; font-size: 13px; padding: 9px 12px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.15s; }

    // ===== KANBAN MOBILE =====
    function getInitialCardDay() {
      if (!currentTrip || !currentTrip.days) { return 0; }
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var months = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };
      var tripDates = currentTrip.days.map(function(day) {
        var parts = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var month = months[parts[0]]; var date = parseInt(parts[1]);
        var d = new Date(2026, month, date); d.setHours(0,0,0,0); return d;
      });
      var lastDate = tripDates[tripDates.length - 1];
      var twoDaysAfter = new Date(lastDate); twoDaysAfter.setDate(twoDaysAfter.getDate() + 2);
      if (today > twoDaysAfter) { return 0; }
      for (var i = 0; i < tripDates.length; i++) {
        if (tripDates[i].getTime() === today.getTime()) { return i; }
      }
      if (today < tripDates[0]) { return 0; }
      return 0;
    }

    var mobCardsCurrentIndex = 0;

    function renderKanban() {

          var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(activity + ' ' + item.city.split('>').pop().trim() + ' ' + getTripDestination());
var mobPhotoId = 'kp-' + photoKey;
          var photoHtml = savedPhoto
            ? '<img style="width:100%;height:290px;object-fit:cover;display:block;" src="' + savedPhoto + '">'
            : '<div id="' + mobPhotoId + '" style="width:100%;height:120px;background:var(--sand-dark);display:flex;align-items:center;justify-content:center;font-size:32px;">' + catStyle.emoji + '</div>';          return '<div style="background:var(--white);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--sand-dark);box-shadow:var(--card-shadow);">' +
            photoHtml +
            '<div style="padding:12px 14px;">' +
              '<div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;font-weight:700;">' + cat + '</div>' +

              '<button class="kbtn" onclick="triggerPhotoUpload(\'' + photoKey + '\',' + dayIndex + ',' + actIndex + ')">📷</button>' +
              '<button class="kbtn" onclick="editItinDay(' + dayIndex + ')">Edit</button>' +
            '</div>' +
          '</div>';
}).join('') : '<div style="padding:20px;text-align:center;color:var(--ink-muted);font-style:italic;font-size:13px;">No activities for this day</div>';
        // fetch photos for activities that don't have one yet
        item.activities.forEach(function(activity, actIndex) {
          var cat = (item.activityCategories && item.activityCategories[actIndex]) || 'default';
          var photoKey = 'day' + item.day + '_act' + actIndex;
          if (!cardPhotos[photoKey] && cat !== 'default') {
            fetchKanbanPhoto(activity, item, 'kp-' + photoKey);
          }
        });
        var foodCardsHtml = item.food.length ? '<div style="margin-top:6px;"><div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;font-weight:700;padding:0 2px;">Food & Drinks</div>' + item.food.map(function(f, fi) {
          normaliseFood(item);
          var fname = f.name;
          var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(fname.split(' for ')[0].trim() + ' ' + item.city.split('>').pop().trim() + ' ' + getTripDestination());
          var foodPhotoKey = 'day' + item.day + '_food' + fi;
          var savedFoodPhoto = cardPhotos[foodPhotoKey];
          var foodNote = f.notes || '';
          var foodPhotoHtml = savedFoodPhoto
            ? '<img style="width:100%;height:290px;object-fit:cover;display:block;" src="' + savedFoodPhoto + '">'
            : '<div style="width:100%;height:120px;background:var(--sand-dark);display:flex;align-items:center;justify-content:center;font-size:32px;">\uD83C\uDF7D\uFE0F</div>';
          var reservationBadge = f.reservationRequired
            ? '<div style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:6px;' + (f.reservationBooked ? 'background:#1A3D2E;color:#2D9E75;' : 'background:#3D1A1A;color:#E05555;') + '">' + (f.reservationBooked ? '✅ Reservation booked' : '⚠️ Reservation needed') + '</div>'
            : '';
          var linkBtn = f.link ? '<a href="' + f.link + '" target="_blank" style="text-decoration:none;"><button class="kbtn">🔗 Link</button></a>' : '';
          return '<div style="background:var(--white);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--sand-dark);box-shadow:var(--card-shadow);">' +

            '<div style="padding:12px 14px;">' +

        dotsEl.appendChild(dot);
      });

      mobCardsGoTo(mobCardsCurrentIndex, false);

      initMobDotsSwipe();

    function mobCardsGoTo(index, animate) {
      var track = document.getElementById('mob-cards-track');
      if (!track) return;
      if (animate === false) {
        track.style.transition = 'none';
      } else {
        var currentIndex = mobCardsCurrentIndex;
        var distance = Math.abs(index - currentIndex);
        var duration = Math.min(150 + distance * 80, 480);
        track.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.25,0.46,0.45,0.94)';
      }
      track.style.transform = 'translateX(-' + (index * 100) + '%)';
      mobCardsCurrentIndex = index;
      var indicator = document.getElementById('mob-cards-indicator-text');
      var dateEl = document.getElementById('mob-cards-indicator-date');
      var day = currentTrip.days[index];
      if (indicator) { indicator.textContent = 'Day ' + day.day + ' of ' + currentTrip.days.length; }
      if (dateEl) { dateEl.textContent = day.date + ' · ' + day.city.split('>').pop().trim(); }
      document.querySelectorAll('.mob-cards-dot').forEach(function(dot, i) {
        dot.classList.toggle('active', i === index);
      });
    }

    function initMobDotsSwipe() {
      var dotsEl = document.getElementById('mob-cards-dots');
      if (!dotsEl) return;
      var startX, isDragging = false, lastIndex = -1;

      function getIndexFromTouch(clientX) {
        var rect = dotsEl.getBoundingClientRect();
        var total = currentTrip.days.length;
        var pct = (clientX - rect.left) / rect.width;
        var idx = Math.round(pct * (total - 1));
        return Math.max(0, Math.min(total - 1, idx));
      }

      dotsEl.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        isDragging = true;
        lastIndex = -1;
      }, { passive: true });

      dotsEl.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var idx = getIndexFromTouch(e.touches[0].clientX);
        if (idx !== lastIndex) {
          lastIndex = idx;
          mobCardsGoTo(idx, true);
        }
      }, { passive: true });

      dotsEl.addEventListener('touchend', function() {
        isDragging = false;
        lastIndex = -1;
      });

      dotsEl.addEventListener('click', function(e) {
        var idx = getIndexFromTouch(e.clientX);
        mobCardsGoTo(idx, true);
      });
    }

    var mobCardsSwipeInited = false;
    function initMobCardsSwipe() {
      var wrap = document.getElementById('mob-cards-track-wrap');
      if (!wrap) return;
      if (mobCardsSwipeInited) return;
      mobCardsSwipeInited = true;
      var startX, startY, isHorizontal = null;

      wrap.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isHorizontal = null;
      }, { passive: true });

      wrap.addEventListener('touchmove', function(e) {
        if (isHorizontal === null) {
          var dx = Math.abs(e.touches[0].clientX - startX);
          var dy = Math.abs(e.touches[0].clientY - startY);
          isHorizontal = dx > dy;
        }
        if (isHorizontal) { e.preventDefault(); }
      }, { passive: false });

      wrap.addEventListener('touchend', function(e) {
        if (!isHorizontal) return;
        var diffX = e.changedTouches[0].clientX - startX;
        var total = currentTrip.days.length;
        var threshold = 50;
        var delta = 0;
        if (diffX < -threshold) { delta = 1; }
        else if (diffX > threshold) { delta = -1; }
        if (delta !== 0) {
          var target = Math.max(0, Math.min(total - 1, mobCardsCurrentIndex + delta));
          mobCardsGoTo(target, true);
        }
      });
    }

    document.addEventListener('click', function(e) {
      var triggers = ['hamburger-btn','mob-grid-btn','mob-ham-btn'];
      var menus = ['hamburger-menu','mob-view-menu','mob-hamburger-menu'];
      var clickedTrigger = triggers.some(function(id) {

      });
      var clickedMenu = menus.some(function(id) {
        var el = document.getElementById(id);
        return el && el.contains(e.target);
      });
      if (!clickedTrigger && !clickedMenu) {
        menus.forEach(function(id) { document.getElementById(id).classList.remove('open'); });
      }
    });

          trips[key] = {
            name: name,
            baseCurrency: selCurrency.code,
            baseCurrencySymbol: selCurrency.symbol,
            exchangeRates: {},
            ratesLastFetched: 0,
            days: [{ day: 1, date: date || 'Day 1', city: 'City', lat: 13.7563, lng: 100.5018, note: '', accommodation: [], activities: [], activityCategories: [], food: [], transport: [], currency: selCurrency.code, currencySymbol: selCurrency.symbol }]
          };
          saveToStorage(); populateTripSelector(); switchTrip(key);
        }
      );

    function buildCurrencySelect(id, selectedCode) {
      return '<select id="' + id + '" style="width:100%;font-family:inherit;font-size:13px;padding:8px;border:1px solid var(--sand-dark);border-radius:6px;background:var(--sand);color:var(--ink);">' +

    // ===== HOME VIEW =====
    var homeWeatherCache = null;

    function fetchHomeWeather(lat, lng, callback) {
      if (homeWeatherCache && homeWeatherCache.lat === lat && homeWeatherCache.lng === lng) {
        callback(homeWeatherCache); return;
      }
      var today = new Date();
      var dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng + '&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&start_date=' + dateStr + '&end_date=' + dateStr;
      fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        var code = data.daily && data.daily.weathercode ? data.daily.weathercode[0] : 0;
        var max = data.daily && data.daily.temperature_2m_max ? Math.round(data.daily.temperature_2m_max[0]) : '--';
        var min = data.daily && data.daily.temperature_2m_min ? Math.round(data.daily.temperature_2m_min[0]) : '--';
        var emoji = code <= 1 ? '☀️' : code <= 3 ? '⛅' : code <= 51 ? '🌥️' : code <= 67 ? '🌧️' : code <= 77 ? '❄️' : code <= 82 ? '🌦️' : '⛈️';
        var result = { lat: lat, lng: lng, emoji: emoji, max: max, min: min, code: code };
        homeWeatherCache = result;
        callback(result);
      }).catch(function() { callback(null); });
    }

    function getNextTripCity() {
      var today = new Date(); today.setHours(0,0,0,0);
      var months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
      var yr = currentTrip.year || new Date().getFullYear();
      for (var i = 0; i < currentTrip.days.length; i++) {
        var day = currentTrip.days[i];
        var p = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var d = new Date(yr, months[p[0]], parseInt(p[1])); d.setHours(0,0,0,0);
        if (d >= today) { return { day: day, index: i }; }
      }
      return { day: currentTrip.days[0], index: 0 };
    }

    function getNextFlight() {
      var today = new Date(); today.setHours(0,0,0,0);
      var months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
      var yr = currentTrip.year || new Date().getFullYear();
      for (var i = 0; i < currentTrip.days.length; i++) {
        var day = currentTrip.days[i];
        var p = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var d = new Date(yr, months[p[0]], parseInt(p[1])); d.setHours(0,0,0,0);
        if (d >= today && day.transport) {
          var flights = day.transport.filter(function(t) { return t.type === 'Flight'; });
          if (flights.length) { return { flight: flights[0], day: day }; }
        }
      }
      return null;
    }

    function getVisaStatus() {
      if (!currentTrip.visaInfo || !currentTrip.visaInfo.travellers || !currentTrip.visaInfo.travellers.length) {
        return { overall: 'none', travellers: [] };
      }
      var travellers = currentTrip.visaInfo.travellers;
      var statusRank = { approved: 0, applied: 1, not_started: 2 };
      var worstRank = 0;
      travellers.forEach(function(t) { var r = statusRank[t.visaStatus] || 0; if (r > worstRank) { worstRank = r; } });
      var overall = worstRank === 2 ? 'not_started' : worstRank === 1 ? 'applied' : 'approved';
      return { overall: overall, travellers: travellers };
    }

    function visaStatusDot(status) {
      return status === 'approved' ? '#2D9E75' : status === 'applied' ? '#E67E22' : '#E05555';
    }

    function visaStatusLabel(status) {
      return status === 'approved' ? '🟢' : status === 'applied' ? '🟡' : '🔴';
    }

    function getBudgetTotal() {
      var baseCurrency = currentTrip.baseCurrency || 'AUD';
      var baseSym = currentTrip.baseCurrencySymbol || '$';
      var tot = 0;
      currentTrip.days.forEach(function(day) {
        normaliseDayCurrency(day);
        if (!day.costs) return;
        var dayCur = day.currency || baseCurrency;
        Object.keys(day.costs).forEach(function(k) {
          if (k.indexOf('_est') !== -1) { tot += convertToBase(parseFloat(day.costs[k]) || 0, dayCur); }
        });
      });
      return { total: tot, sym: baseSym };
    }

    function getStayHealth() {
      var booked = 0, missing = 0;
      currentTrip.days.forEach(function(day) {
        normaliseAccom(day);
        var base = day.city.split('>').pop().trim();
        var s = citySettings[base];
        if (s && s.noMarker) return; // skip home city
        if (day.accommodation.length && day.accommodation[0].name) { booked++; } else { missing++; }
      });
      return { booked: booked, missing: missing };
    }

    function getFoodBookings() {
      var booked = 0, unbooked = 0;
      currentTrip.days.forEach(function(day) {
        normaliseFood(day);
        day.food.forEach(function(f) {
          if (f.reservationRequired) { if (f.reservationBooked) { booked++; } else { unbooked++; } }
        });
      });
      return { booked: booked, unbooked: unbooked };
    }

    function showVisaSheet() {
      if (!currentTrip.visaInfo) { currentTrip.visaInfo = { travellers: [] }; }
      var travellers = currentTrip.visaInfo.travellers;
      function renderSheet() {
        var tHtml = travellers.length ? travellers.map(function(t, i) {
          var dot = visaStatusDot(t.visaStatus);
          var monthsToTrip = (function() {
            if (!t.passportExpiry) return null;
            var months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
            var yr = currentTrip.year || new Date().getFullYear();
            var firstDay = currentTrip.days[0];
            var p = firstDay.date.replace(/^[A-Za-z]+\s/, '').split(' ');
            var tripStart = new Date(yr, months[p[0]], parseInt(p[1]));
            var exp = new Date(t.passportExpiry);
            var diff = (exp - tripStart) / (1000 * 60 * 60 * 24 * 30);
            return diff;
          })();

      var tilesHtml = editBtnHtml + '<div class="home-tiles">' + row1Html + sortableHtml + trayHtml + '</div>';

      // ---- Long-press on grid to enter edit mode ----
      setTimeout(function() {
        var grid = document.getElementById('home-sortable-grid');

        var pressTimer;

        function cancelPress(x, y) {
          if (x !== undefined && startX !== undefined) {
            var dx = Math.abs(x - startX);

          clearTimeout(pressTimer);
        }
        grid.style.userSelect = 'none';
        grid.style.webkitUserSelect = 'none';

    function enterHomeTileEdit() {
      var grid = document.getElementById('home-sortable-grid');
      var tray = document.getElementById('home-tile-tray');
      var trayGrid = document.getElementById('home-tile-tray-grid');
      var btn = document.getElementById('home-edit-btn');
      if (!grid) return;

      grid.classList.add('is-editing');
      if (btn) { btn.textContent = '✓ Done'; btn.classList.add('active'); }

      // Add wiggle + remove badge to each visible tile
      grid.querySelectorAll('.home-tile').forEach(function(tile) {
        tile.classList.add('home-tile-editing');
        if (!tile.querySelector('.home-tile-remove-btn')) {
          var id = tile.getAttribute('data-tile-id');
          var rmBtn = document.createElement('a');
          rmBtn.className = 'home-tile-remove-btn';
          rmBtn.setAttribute('data-tile-id', id);
          rmBtn.setAttribute('href', '#');
          rmBtn.textContent = '−';
          rmBtn.onclick = function(e) { e.stopPropagation(); e.preventDefault(); hideHomeTile(id); return false; };
          rmBtn.addEventListener('touchend', function(e) { e.stopPropagation(); e.preventDefault(); hideHomeTile(id); }, { passive: false });
          tile.appendChild(rmBtn);
        }
      });

      // Render tray
      var cfg = loadHomeTileConfig();
      renderHomeTileTray(cfg.hidden);
      if (tray) { tray.style.display = cfg.hidden.length ? 'block' : 'none'; }

      // Init Sortable
      if (homeTileSortable) { homeTileSortable.destroy(); homeTileSortable = null; }
      homeTileSortable = Sortable.create(grid, {
        animation: 0,
        ghostClass: 'home-sortable-ghost',
        dragClass: 'home-sortable-drag',
        delay: 200,
        delayOnTouchOnly: true,
        touchStartThreshold: 8,
        filter: '.home-tile-remove-btn',
        preventOnFilter: false,
        onEnd: function() {
          var newOrder = [];
          grid.querySelectorAll('.home-tile[data-tile-id]').forEach(function(t) {
            newOrder.push(t.getAttribute('data-tile-id'));
          });
          var cfg = loadHomeTileConfig();
          cfg.hidden.forEach(function(id) { if (newOrder.indexOf(id) === -1) newOrder.push(id); });
          saveHomeTileConfig(newOrder, cfg.hidden);
        }
      });

      // Fix delete tap on mobile — use touchend directly on badges
      grid.querySelectorAll('.home-tile-remove-btn').forEach(function(btn) {
        btn.addEventListener('touchend', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var id = btn.getAttribute('data-tile-id');
          if (id) { hideHomeTile(id); }
        }, { passive: false });
      });
    }

    function getTripStatus() {
      var today = new Date(); today.setHours(0,0,0,0);
      var months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
      var yr = currentTrip.year || new Date().getFullYear();
      var firstDay = currentTrip.days[0];
      var lastDay = currentTrip.days[currentTrip.days.length - 1];
      function parseDate(d) {
        var p = d.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var dt = new Date(yr, months[p[0]], parseInt(p[1])); dt.setHours(0,0,0,0); return dt;
      }
      var start = parseDate(firstDay);
      var end = parseDate(lastDay);
      var totalDays = currentTrip.days.length;
      if (today < start) {
        var diff = Math.round((start - today) / (1000 * 60 * 60 * 24));
        return { mode: 'pre', text: diff + ' days until ' + getTripDestination() + ' 🛫', sub: firstDay.date + ' – ' + lastDay.date + ' · ' + totalDays + ' days' };
      }
      if (today > end) {
        return { mode: 'post', text: 'Trip complete 🎉', sub: 'Hope it was amazing!' };
      }
      for (var i = 0; i < currentTrip.days.length; i++) {
        var d = parseDate(currentTrip.days[i]);
        if (d.getTime() === today.getTime()) {
          return { mode: 'during', dayIndex: i, text: 'DAY ' + currentTrip.days[i].day + ' of ' + totalDays, sub: currentTrip.days[i].city + ' · ' + currentTrip.days[i].date };
        }
      }
      return { mode: 'pre', text: 'Trip coming up 🛫', sub: firstDay.date + ' – ' + lastDay.date };
    }

    function getPlanningGaps() {
      var emptyDays = 0, noAccom = 0, unbooked = 0;
      currentTrip.days.forEach(function(day) {
        normaliseAccom(day); normaliseFood(day);
        if (!day.activities.length && !day.accommodation.length) { emptyDays++; }
        if (!day.accommodation.length) { noAccom++; }
        day.food.forEach(function(f) { if (f.reservationRequired && !f.reservationBooked) { unbooked++; } });
      });
      var gaps = [];
      if (emptyDays > 0) { gaps.push(emptyDays + ' day' + (emptyDays > 1 ? 's' : '') + ' with nothing planned'); }
      if (noAccom > 0) { gaps.push(noAccom + ' night' + (noAccom > 1 ? 's' : '') + ' without accommodation'); }
      if (unbooked > 0) { gaps.push(unbooked + ' restaurant' + (unbooked > 1 ? 's' : '') + ' needing a reservation'); }
      return gaps;
    }

    function applyCustomTheme(base, hue) {
      // base: 0=dark, 100=light
      var isDark = base < 50;
      var bgL = isDark ? (5 + base * 0.3) : (88 + base * 0.12);
      var sandL = isDark ? (8 + base * 0.35) : (85 + base * 0.12);
      var sandDarkL = isDark ? (12 + base * 0.4) : (80 + base * 0.12);
      var inkL = isDark ? (85 + base * 0.1) : (10 + base * 0.1);
      var inkLightL = isDark ? (65 + base * 0.1) : (25 + base * 0.15);
      var inkMutedL = isDark ? (45 + base * 0.1) : (45 + base * 0.15);
      var accentL = isDark ? 55 : 40;
      var accentLightL = isDark ? 18 : 88;

      var r = document.documentElement;
      r.style.setProperty('--white', 'hsl(' + hue + ',12%,' + bgL + '%)');
      r.style.setProperty('--sand', 'hsl(' + hue + ',14%,' + sandL + '%)');
      r.style.setProperty('--sand-dark', 'hsl(' + hue + ',14%,' + sandDarkL + '%)');
      r.style.setProperty('--ink', 'hsl(' + hue + ',8%,' + inkL + '%)');
      r.style.setProperty('--ink-light', 'hsl(' + hue + ',8%,' + inkLightL + '%)');
      r.style.setProperty('--ink-muted', 'hsl(' + hue + ',8%,' + inkMutedL + '%)');
      r.style.setProperty('--accent', 'hsl(' + hue + ',56%,' + accentL + '%)');
      r.style.setProperty('--accent-light', 'hsl(' + hue + ',40%,' + accentLightL + '%)');
      r.style.setProperty('--card-shadow', isDark ? '0 2px 12px rgba(0,0,0,0.35)' : '0 2px 12px rgba(0,0,0,0.08)');
      r.style.setProperty('--card-shadow-hover', isDark ? '0 6px 24px rgba(0,0,0,0.5)' : '0 6px 24px rgba(0,0,0,0.14)');

    function initCustomThemeSliders() {

      var sliderAccent = document.getElementById('slider-accent');
      if (!sliderBase || !sliderAccent) return;
      var savedBase = localStorage.getItem('custom-base');
      var savedHue = localStorage.getItem('custom-hue');
      if (savedBase !== null) { sliderBase.value = savedBase; }
      if (savedHue !== null) { sliderAccent.value = savedHue; }
      sliderBase.addEventListener('input', function() {

      });
      sliderAccent.addEventListener('input', function() {

              var makeCalItinItem = function(emoji, text, type, itemIndex) {
                var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(text + ' ' + sd.city.split('>').pop().trim() + ' ' + getTripDestination());

                        '<a href="' + mapsUrl + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--accent);text-decoration:none;">📍 Open in Maps</a>' +
                        '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(text + ' ' + sd.city.split('>').pop().trim()) + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--ink-muted);text-decoration:none;">🧭 Directions</a>' +
                        (type === 'act' ? '<span onclick="openItinNoteModal(' + dayIndex + ',' + itemIndex + ')" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--ink-muted);cursor:pointer;">📝 ' + (note ? 'Edit note' : 'Add note') + '</span>' : '') +

                : '<div style="font-size:12px;color:var(--ink-muted);font-style:italic;padding:6px 0;">None added</div>';

                : '<div style="font-size:12px;color:var(--ink-muted);font-style:italic;padding:6px 0;">None added</div>';

        if (!dayMap[key]) {

          var parts = key.split('-');
          var yr = parts[0], mi = parseInt(parts[1]), dy = parseInt(parts[2]);
          var monthNames2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          var dateObj = new Date(parseInt(yr), mi, dy);
          var dowNames2 = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          var dateStr = dowNames2[dateObj.getDay()] + ' ' + monthNames2[mi] + ' ' + dy;
          var lastCity = currentTrip.days.length ? currentTrip.days[currentTrip.days.length-1].city.split('>').pop().trim() : '';
          showModal('Add day on ' + dateStr,
            '<div class="modal-field"><label>City</label><input type="text" id="cal-new-city" placeholder="e.g. Bangkok" value="' + lastCity + '"></div>' +
            '<div class="modal-field"><label>Note</label><input type="text" id="cal-new-note" placeholder="Optional note..."></div>',
            function() {
              var city = document.getElementById('cal-new-city').value.trim() || 'City';
              var note = document.getElementById('cal-new-note').value.trim();
              var lastDay = currentTrip.days[currentTrip.days.length - 1];
              var base = currentTrip.baseCurrency || 'AUD';
              var baseSym = currentTrip.baseCurrencySymbol || '$';
              var newDay = {
                day: currentTrip.days.length + 1,
                date: dateStr,
                city: city,
                lat: lastDay ? lastDay.lat : 13.7563,
                lng: lastDay ? lastDay.lng : 100.5018,
                note: note,
                accommodation: [], activities: [], activityCategories: [],
                food: [], transport: [],
                currency: base, currencySymbol: baseSym
              };
              currentTrip.days.push(newDay);
              // sort days by date
              currentTrip.days.sort(function(a, b) {
                var parse = function(d) {
                  var p = d.date.replace(/^[A-Za-z]+\s/, '').split(' ');
                  var mo = months[p[0]]; var dy2 = parseInt(p[1]);
                  return new Date(tripYear, mo, dy2);

                return parse(a) - parse(b);
              });
              // renumber days
              currentTrip.days.forEach(function(d, i) { d.day = i + 1; });

              rebuildMobStrip();

                '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">' +
                  '<a href="' + mapsUrl + '" target="_blank" style="text-decoration:none;"><button class="kbtn">📍 Maps</button></a>' +
                  (f.reservationRequired && f.bookingUrl && !f.reservationBooked ? '<a href="' + f.bookingUrl + '" target="_blank" style="text-decoration:none;"><button class="kbtn" style="border-color:#E67E22;color:#E67E22;">🔖 Book now</button></a>' : '') +
                  (f.reservationRequired ? '<button class="kbtn" onclick="toggleFoodBooked(' + di + ',' + fi + ')" style="' + (f.reservationBooked ? 'border-color:var(--accent);color:var(--accent);' : '') + '">✅ ' + (f.reservationBooked ? 'Booked' : 'Booked?') + '</button>' : '') +
                  '<button class="kbtn" onclick="toggleFoodEditRow(\'' + editId + '\')">✏️ Edit</button>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div id="' + editId + '" style="display:none;padding:12px 18px 16px 48px;background:var(--sand);border-top:1px solid var(--sand-dark);">' +
              '<div style="margin-bottom:10px;">' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;">Name</div>' +
                '<input class="inline-edit" style="font-size:13px;color:var(--ink);width:100%;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);padding:6px 8px;background:var(--white);" value="' + f.name.replace(/"/g,'&quot;') + '" placeholder="Restaurant name" onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'name\',this.value);renderFood()" onblur="updateFoodFieldDirect(' + di + ',' + fi + ',\'name\',this.value);renderFood()">' +
              '</div>' +
              '<div style="margin-bottom:10px;">' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;">Socials</div>' +
                '<input class="inline-edit" style="font-size:12px;color:var(--ink);width:100%;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);padding:6px 8px;background:var(--white);" value="' + (f.link||'').replace(/"/g,'&quot;') + '" placeholder="Instagram, TikTok, website..." onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'link\',this.value)" onblur="updateFoodFieldDirect(' + di + ',' + fi + ',\'link\',this.value)">' +
              '</div>' +
              '<div style="margin-bottom:10px;">' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;">Booking URL</div>' +
                '<input class="inline-edit" style="font-size:12px;color:var(--ink);width:100%;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);padding:6px 8px;background:var(--white);" value="' + (f.bookingUrl||'').replace(/"/g,'&quot;') + '" placeholder="e.g. https://resy.com/..." onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'bookingUrl\',this.value)" onblur="updateFoodFieldDirect(' + di + ',' + fi + ',\'bookingUrl\',this.value)">' +
              '</div>' +
              '<div style="margin-bottom:10px;">' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">Reservation</div>' +
                '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">' +
                  '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-light);cursor:pointer;">' +
                    '<input type="checkbox" ' + (f.reservationRequired ? 'checked' : '') + ' onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'reservationRequired\',this.checked);renderFood()" style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer;"> Required' +
                  '</label>' +
                  '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-light);cursor:pointer;">' +
                    '<input type="checkbox" ' + (f.reservationBooked ? 'checked' : '') + ' onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'reservationBooked\',this.checked);renderFood()" style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer;"> Booked' +
                  '</label>' +
                '</div>' +
              '</div>' +
              '<div style="margin-bottom:10px;">' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;">Must Order</div>' +
                '<input class="inline-edit" style="font-size:12px;color:var(--ink);width:100%;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);padding:6px 8px;background:var(--white);" value="' + (f.mustOrder||'').replace(/"/g,'&quot;') + '" placeholder="e.g. Crab omelette" onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'mustOrder\',this.value)" onblur="updateFoodFieldDirect(' + di + ',' + fi + ',\'mustOrder\',this.value)">' +
              '</div>' +
              '<div style="margin-bottom:12px;">' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;">Notes</div>' +
                '<input class="inline-edit" style="font-size:12px;color:var(--ink);width:100%;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);padding:6px 8px;background:var(--white);" value="' + (f.notes||'').replace(/"/g,'&quot;') + '" placeholder="Any notes..." onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'notes\',this.value)" onblur="updateFoodFieldDirect(' + di + ',' + fi + ',\'notes\',this.value)">' +
              '</div>' +
              '<button onclick="deleteFoodDirect(' + di + ',' + fi + ')" style="font-family:inherit;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--danger);background:none;color:var(--danger);cursor:pointer;">🗑 Delete</button>' +
              '<button onclick="saveFoodAndKeepOpen(\'' + editId + '\')" style="margin-left:8px;font-family:inherit;font-size:11px;font-weight:700;padding:4px 14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;">✓ Save</button>' +
            '</div>' +
          '</div>';
        }).join('');

        var dayHasUnbooked = day.food.some(function(f) { return f.reservationRequired && !f.reservationBooked; });
        var dayHasBooked = day.food.some(function(f) { return f.reservationRequired && f.reservationBooked; });
        var dayBadge = dayHasUnbooked
          ? '<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#fff0f0;color:#C0392B;border:1px solid #E05555;white-space:nowrap;">⚠️ Book</span>'
          : dayHasBooked
            ? '<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);white-space:nowrap;">✅ Booked</span>'
            : '';
        return '<div style="background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:1px solid var(--sand-dark);box-shadow:var(--card-shadow);">' +
          '<div style="padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--sand-dark);" onclick="toggleFoodDay(\'' + dayId + '\')">' +
            '<span style="font-size:18px;">' + getCityEmoji(day.city) + '</span>' +
            '<div style="flex:1;">' +
              '<div style="font-size:13px;font-weight:700;color:var(--ink);">Day ' + day.day + ' · ' + day.city + '</div>' +
              '<div style="font-size:11px;color:var(--ink-muted);">' + day.date + ' · ' + day.food.length + ' place' + (day.food.length !== 1 ? 's' : '') + '</div>' +
            '</div>' +
            dayBadge +
            '<span style="font-size:12px;color:var(--ink-muted);margin-left:6px;">▾</span>' +
          '</div>' +
          '<div id="' + dayId + '" style="display:none;">' + foodRows + '</div>' +
        '</div>';
      }).filter(Boolean).join('');

      el.innerHTML = summaryHtml + alertHtml + (daysHtml || '<div style="text-align:center;padding:40px 20px;color:var(--ink-muted);font-style:italic;">No food added yet — open any day and add restaurants.</div>');
    }

    function toggleFoodDay(id) {
      var el = document.getElementById(id);
      if (el) { el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
    }

    function toggleFoodBooked(dayIndex, foodIndex) {
      normaliseFood(currentTrip.days[dayIndex]);
      var f = currentTrip.days[dayIndex].food[foodIndex];
      f.reservationBooked = !f.reservationBooked;
      saveToStorage();
      renderFood();
    }

    function updateFoodFieldDirect(dayIndex, foodIndex, field, value) {
      normaliseFood(currentTrip.days[dayIndex]);
      var f = currentTrip.days[dayIndex].food[foodIndex];
      f[field] = value;
      saveToStorage();
    }

    function deleteFoodDirect(dayIndex, foodIndex) {
      normaliseFood(currentTrip.days[dayIndex]);
      currentTrip.days[dayIndex].food.splice(foodIndex, 1);
      saveToStorage();
      renderFood();
    }

    function toggleFoodEditRow(id) {
      var el = document.getElementById(id);
      if (!el) return;
      var isOpen = el.style.display !== 'none';
      el.style.display = isOpen ? 'none' : 'block';
    }

    function saveFoodAndKeepOpen(editId) {
      renderFood();
      setTimeout(function() {
        var el = document.getElementById(editId);
        if (el) { el.style.display = 'block'; }
        // also make sure the day container is open
        var parts = editId.replace('food-edit-','').split('-');
        var dayId = 'food-day-' + parts[0];
        var dayEl = document.getElementById(dayId);
        if (dayEl) { dayEl.style.display = 'block'; }
      }, 50);
    }

    function renderBudget() {
      var el = document.getElementById('view-budget');
      var baseCurrency = currentTrip.baseCurrency || 'AUD';
      var baseSym = currentTrip.baseCurrencySymbol || '$';

      var totEst = 0, totAct = 0;
      var catEst = { accommodation: 0, activities: 0, food: 0, transport: 0 };
      var catAct = { accommodation: 0, activities: 0, food: 0, transport: 0 };

      currentTrip.days.forEach(function(day) {
        normaliseDayTransport(day);
        normaliseAccom(day);
        normaliseDayCurrency(day);
        if (!day.costs) { day.costs = {}; }
        var dayCur = day.currency || baseCurrency;
        (day.accommodation || []).forEach(function(a, i) {
          var key = 'accom_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.accommodation += est; catAct.accommodation += act;
        });
        (day.activities || []).forEach(function(a, i) {
          var key = 'act_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.activities += est; catAct.activities += act;
        });
        (day.food || []).forEach(function(f, i) {
          var key = 'food_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.food += est; catAct.food += act;
        });
        (day.transport || []).forEach(function(t, i) {
          var key = 'trans_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.transport += est; catAct.transport += act;
        });
      });

      var fmtBase = function(n) { return baseSym + n.toFixed(0); };
      var fmtLocal = function(n, sym) { return (sym || baseSym) + n.toFixed(0); };

      var daysHtml = currentTrip.days.map(function(day, di) {
        normaliseDayTransport(day);
        normaliseAccom(day);
        normaliseDayCurrency(day);
        if (!day.costs) { day.costs = {}; }

        var daySym = day.currencySymbol || baseSym;
        var dayCur = day.currency || baseCurrency;
        var dayEst = 0;
        var rows = '';

        var makeRow = function(label, emoji, key, est, act) {
          dayEst += est;
          return '<div class="budget-item-row">' +
            '<span style="font-size:14px;">' + emoji + '</span>' +
            '<div class="budget-item-name">' + label + '</div>' +
            '<div style="display:flex;align-items:center;gap:4px;">' +
              '<span class="budget-cost-label" style="font-size:9px;">Est</span>' +
              '<input class="budget-cost-input" type="number" placeholder="0" value="' + (est || '') + '" onchange="updateCost(' + di + ',\'' + key + '_est\',this.value)" oninput="updateCost(' + di + ',\'' + key + '_est\',this.value)">' +
              '<span class="budget-cost-label" style="font-size:9px;">Act</span>' +
              '<input class="budget-cost-input" type="number" placeholder="0" value="' + (act || '') + '" onchange="updateCost(' + di + ',\'' + key + '_act\',this.value)" oninput="updateCost(' + di + ',\'' + key + '_act\',this.value)">' +
            '</div>' +
          '</div>';
        };

        (day.accommodation || []).forEach(function(a, i) {
          var k = 'accom_' + i;
          rows += makeRow(a.name || 'Accommodation', '🏨', k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });
        (day.activities || []).forEach(function(a, i) {
          var cat = (day.activityCategories && day.activityCategories[i]) || 'default';
          var emoji = (activityCategories[cat] || activityCategories['default']).emoji;
          var k = 'act_' + i;
          rows += makeRow(a, emoji, k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });
        (day.food || []).forEach(function(f, i) {
          var k = 'food_' + i;
          var fname = typeof f === 'string' ? f : f.name;
          rows += makeRow(fname, '🍽️', k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });
        (day.transport || []).forEach(function(t, i) {
          var k = 'trans_' + i;
          var label = t.from && t.to ? t.from + ' → ' + t.to : (t.carrier || 'Transport');
          rows += makeRow(label, '✈️', k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });

        if (!rows) { rows = '<div style="padding:12px 16px;font-size:12px;color:var(--ink-muted);font-style:italic;">No items to track — add activities, food, or transport to this day.</div>'; }

        var dayEstBase = convertToBase(dayEst, dayCur);
        return '<div class="budget-day">' +
          '<div class="budget-day-header" onclick="toggleBudgetDay(' + di + ')">' +
            '<div><div class="budget-day-title">Day ' + day.day + ' · ' + day.city + '</div><div class="budget-day-sub">' + day.date + ' · ' + dayCur + '</div></div>' +
            '<div style="text-align:right;"><div class="budget-day-total">' + fmtLocal(dayEst, daySym) + '</div>' + (dayCur !== baseCurrency ? '<div style="font-size:10px;color:var(--ink-muted);">~' + fmtBase(dayEstBase) + ' ' + baseCurrency + '</div>' : '') + '</div>' +
          '</div>' +
          '<div class="budget-day-body" id="budget-day-' + di + '">' + rows + '</div>' +
        '</div>';
      }).join('');

      var ratesHtml = '';
      if (currentTrip.exchangeRates && currentTrip.ratesLastFetched) {
        var d = new Date(currentTrip.ratesLastFetched);
        var uniqueCurrencies = [];
        currentTrip.days.forEach(function(day) {
          normaliseDayCurrency(day);
          if (day.currency !== baseCurrency && uniqueCurrencies.indexOf(day.currency) === -1) {
            uniqueCurrencies.push(day.currency);
          }
        });
        if (uniqueCurrencies.length > 0) {
          ratesHtml = '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--sand-dark);">' +
            '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">Exchange Rates · ' + d.toLocaleDateString() + '</div>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">' +
            uniqueCurrencies.map(function(c) {
              var rate = currentTrip.exchangeRates[c];
              if (!rate) return '';
              return '<span style="font-size:11px;color:var(--ink-light);">1 ' + baseCurrency + ' = ' + rate.toFixed(2) + ' ' + c + '</span>';
            }).join('<span style="color:var(--sand-dark);">·</span>') +
            '<button onclick="currentTrip.ratesLastFetched=0;fetchExchangeRates(function(){renderBudget();})" style="font-family:inherit;font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:none;color:var(--accent);cursor:pointer;margin-left:4px;">🔄 Refresh</button>' +
            '</div>' +
          '</div>';
        }
      }

      el.innerHTML =
        '<div class="budget-summary">' +
          '<div class="budget-summary-title">Trip Total · ' + baseCurrency + '</div>' +
          '<div class="budget-totals">' +
            '<div class="budget-total-box"><div class="budget-total-label">Estimated</div><div class="budget-total-val">' + fmtBase(totEst) + '</div></div>' +
            '<div class="budget-total-box"><div class="budget-total-label">Actual</div><div class="budget-total-val actual">' + fmtBase(totAct) + '</div></div>' +
          '</div>' +
          '<div class="budget-cats">' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">🏨</div><div class="budget-cat-label">Stay</div><div class="budget-cat-val">' + fmtBase(catEst.accommodation) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">📍</div><div class="budget-cat-label">Activities</div><div class="budget-cat-val">' + fmtBase(catEst.activities) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">🍽️</div><div class="budget-cat-label">Food</div><div class="budget-cat-val">' + fmtBase(catEst.food) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">✈️</div><div class="budget-cat-label">Transport</div><div class="budget-cat-val">' + fmtBase(catEst.transport) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">💰</div><div class="budget-cat-label">Total Est</div><div class="budget-cat-val">' + fmtBase(totEst) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">✅</div><div class="budget-cat-label">Total Act</div><div class="budget-cat-val actual">' + fmtBase(totAct) + '</div></div>' +
          '</div>' +
          ratesHtml +
        '</div>' +
        daysHtml;
    }

    function toggleBudgetDay(di) {
      var el = document.getElementById('budget-day-' + di);
      if (el) { el.classList.toggle('open'); }
    }

    function updateCost(dayIndex, key, value) {
      var day = currentTrip.days[dayIndex];
      if (!day.costs) { day.costs = {}; }
      day.costs[key] = parseFloat(value) || 0;
      saveToStorage();
      // re-render summary totals only, not full budget (avoids losing focus)
      var el = document.getElementById('view-budget');
      if (el && currentView === 'budget') {
        var summaryEl = el.querySelector('.budget-summary');
        if (summaryEl) {
          var tempDiv = document.createElement('div');
          tempDiv.style.display = 'none';
          el.appendChild(tempDiv);
          renderBudget();
        }
      }
    }

    // ===== ITINERARY VIEW =====
    function renderItinerary() {
      var el = document.getElementById('view-itinerary');
      var toggleBar = '<div style="display:flex;justify-content:flex-end;padding:0 0 12px 0;">' +
        '<button id="itin-toggle-all" onclick="toggleAllItinDays()" style="font-family:inherit;font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--sand-dark);background:var(--sand);color:var(--ink-muted);cursor:pointer;transition:all 0.15s;">Expand All</button>' +
        '</div>';
      var daysHtml = currentTrip.days.map(function(item) {
        normaliseAccom(item); normaliseDayTransport(item);
        var cityEmoji = getCityEmoji(item.city);

        function makeItinItem(emoji, text, dayIndex, type, itemIndex) {
          var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(text + ' ' + item.city.split('>').pop().trim() + ' ' + getTripDestination());
          var detailId = 'itin-detail-' + item.day + '-' + type + '-' + itemIndex;
          var photoKey = 'day' + item.day + '_act' + itemIndex;
          var photo = (type === 'act') ? (cardPhotos[photoKey] || '') : '';
          var note = (type === 'act' && item.cardNotes && item.cardNotes[String(itemIndex)]) ? item.cardNotes[String(itemIndex)] : '';
          return '<div class="itin-item" style="flex-direction:column;align-items:flex-start;padding:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;width:100%;cursor:pointer;" onclick="toggleItinItem(\'' + detailId + '\')">' +
              '<span>' + emoji + '</span>' +
              '<span style="flex:1;">' + text + '</span>' +
              '<span style="font-size:10px;color:var(--ink-muted);">▾</span>' +
            '</div>' +
            '<div id="' + detailId + '" style="display:none;margin:0 0 8px 0;background:var(--sand);border-radius:8px;overflow:hidden;">' +
              (photo ? '<img src="' + photo + '" style="width:100%;height:140px;object-fit:cover;display:block;">' : '') +
              '<div style="padding:10px 12px;">' +

    function saveDatesTile() {
      var input = document.getElementById('dates-edit-input');
      if (!input || !input.value) return;
      var overlay = document.getElementById('dates-edit-overlay');
      if (overlay) overlay.remove();
      var months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
      var yr = currentTrip.year || new Date().getFullYear();
      var firstDay = currentTrip.days[0];
      var p = firstDay.date.replace(/^[A-Za-z]+\s/, '').split(' ');
      var currentStart = new Date(yr, months[p[0]], parseInt(p[1]));
      var newStart = new Date(input.value + 'T00:00:00');
      var diffDays = Math.round((newStart - currentStart) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) { renderHome(); return; }
      shiftTripDates(diffDays);
      saveToStorage();
      rebuildTimeline();
      rebuildMobStrip();
      renderHome();
    }

    function shiftTripDates(days) {
      var months2 = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
      var monthNames2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var dowNames2 = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var yr = currentTrip.year || new Date().getFullYear();
      currentTrip.days.forEach(function(day) {
        var p = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var mo = months2[p[0]]; var dy = parseInt(p[1]);
        if (isNaN(mo) || isNaN(dy)) return;
        var d = new Date(yr, mo, dy);
        d.setDate(d.getDate() + days);
        day.date = dowNames2[d.getDay()] + ' ' + monthNames2[d.getMonth()] + ' ' + d.getDate();
      });
    }

    function calMoveDay(dayIndex) {
      var item = currentTrip.days[dayIndex];
      if (!item) return;
      var months2 = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
      var monthNames2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var dowNames2 = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      showModal('Move Day ' + item.day + ' to new date',
        '<div class="modal-field"><label>New date</label><input type="date" id="cal-move-date" style="width:100%;font-family:inherit;font-size:13px;padding:9px 12px;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);background:var(--sand);color:var(--ink);outline:none;"></div>',
        function() {
          var val = document.getElementById('cal-move-date').value;
          if (!val) return;
          var d = new Date(val + 'T00:00:00');
          var dateStr = dowNames2[d.getDay()] + ' ' + monthNames2[d.getMonth()] + ' ' + d.getDate();
          item.date = dateStr;
          // re-sort and renumber
          currentTrip.days.sort(function(a, b) {
            var parse = function(day) {
              var p = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
              var mo = months2[p[0]]; var dy = parseInt(p[1]);
              return new Date(currentTrip.year || new Date().getFullYear(), mo, dy);
            };
            return parse(a) - parse(b);
          });
          currentTrip.days.forEach(function(d, i) { d.day = i + 1; });
          saveToStorage();
          rebuildTimeline();
          rebuildMobStrip();
          renderCalendar();
        }
      );
    }

    function initKanbanDragScroll() {
      var board = document.getElementById('view-cards');
      var isDown = false, startX, scrollLeft;
      board.addEventListener('mousedown', function(e) {
        if (e.target.closest('button') || e.target.closest('a') || e.target.closest('input')) return;
        isDown = true; startX = e.pageX - board.offsetLeft; scrollLeft = board.scrollLeft;
        board.style.cursor = 'grabbing'; e.preventDefault();
      });
      document.addEventListener('mouseup', function() { isDown = false; board.style.cursor = ''; });
      board.addEventListener('mouseleave', function() { isDown = false; board.style.cursor = ''; });
      board.addEventListener('mousemove', function(e) {
        if (!isDown) return; e.preventDefault();
        board.scrollLeft = scrollLeft - (e.pageX - board.offsetLeft - startX) * 1.5;
      });
    }

    function buildKanbanCard(item, dayIndex, activity, actIndex) {
      var card = document.createElement('div');
      card.className = 'kanban-card';
      var cat = (item.activityCategories && item.activityCategories[actIndex]) || 'default';
      var catStyle = activityCategories[cat] || activityCategories['default'];
      var photoKey = 'day' + item.day + '_act' + actIndex;
      var savedPhoto = cardPhotos[photoKey];
      var photoId = 'kp-' + photoKey;
      if (!item.cardNotes) { item.cardNotes = {}; }
      var userNote = item.cardNotes[actIndex] || '';

      var photoHtml = savedPhoto
        ? '<img class="kanban-card-photo" src="' + savedPhoto + '">'
        : '<div class="kanban-card-photo-placeholder" id="' + photoId + '">' + catStyle.emoji + '</div>';

      var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(activity + ' ' + item.city.split('>').pop().trim() + ' ' + getTripDestination());

      card.innerHTML = photoHtml +
        '<div class="kanban-card-body">' +
          '<div class="kanban-card-label">' + cat + '</div>' +
          '<div class="kanban-card-title">' + activity + '</div>' +
          '<div class="kanban-card-note">' + item.note + '</div>' +
          (userNote ? '<div class="kanban-card-user-note">' + userNote + '</div>' : '') +
        '</div>' +
        '<div class="kanban-card-footer">' +
          '<button class="kbtn" onclick="openKanbanNote(' + dayIndex + ',' + actIndex + ')">📝 Note</button>' +
          '<button class="kbtn" onclick="triggerPhotoUpload(\'' + photoKey + '\',' + dayIndex + ',' + actIndex + ')">📷</button>' +
          '<a href="' + mapsUrl + '" target="_blank" style="text-decoration:none;"><button class="kbtn">📍 Maps</button></a>' +
          '<button class="kbtn" onclick="editItinDay(' + dayIndex + ')">Edit</button>' +
        '</div>';

      if (!savedPhoto && cat !== 'default') { fetchKanbanPhoto(activity, item, photoId); }
      return card;
    }

      showModal('Add note',

        function() {
