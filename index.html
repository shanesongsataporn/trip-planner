                '<input class="inline-edit" style="font-size:12px;color:var(--ink);width:100%;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);padding:6px 8px;background:var(--white);" value="' + (f.mustOrder||'').replace(/"/g,'&quot;') + '" placeholder="e.g. Crab omelette" onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'mustOrder\',this.value)" onblur="updateFoodFieldDirect(' + di + ',' + fi + ',\'mustOrder\',this.value)">' +
              '</div>' +
              '<div style="margin-bottom:12px;">' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;">Notes</div>' +
                '<input class="inline-edit" style="font-size:12px;color:var(--ink);width:100%;border:1px solid var(--sand-dark);border-radius:var(--radius-sm);padding:6px 8px;background:var(--white);" value="' + (f.notes||'').replace(/"/g,'&quot;') + '" placeholder="Any notes..." onchange="updateFoodFieldDirect(' + di + ',' + fi + ',\'notes\',this.value)" onblur="updateFoodFieldDirect(' + di + ',' + fi + ',\'notes\',this.value)">' +
              '</div>' +
              '<button onclick="deleteFoodDirect(' + di + ',' + fi + ')" style="font-family:inherit;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--danger);background:none;color:var(--danger);cursor:pointer;">🗑 Delete</button>' +
              '<button onclick="saveFoodAndKeepOpen(\'' + editId + '\')" style="margin-left:8px;font-family:inherit;font-size:11px;font-weight:700;padding:4px 14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;">✓ Save</button>' +
            '</div>' +
          '</div>';
        }).join('');

        var dayHasUnbooked = day.food.some(function(f) { return f.reservationRequired && !f.reservationBooked; });
        var dayHasBooked = day.food.some(function(f) { return f.reservationRequired && f.reservationBooked; });
        var dayBadge = dayHasUnbooked
          ? '<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#fff0f0;color:#C0392B;border:1px solid #E05555;white-space:nowrap;">⚠️ Book</span>'
          : dayHasBooked
            ? '<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);white-space:nowrap;">✅ Booked</span>'
            : '';
        return '<div style="background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:1px solid var(--sand-dark);box-shadow:var(--card-shadow);">' +
          '<div style="padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--sand-dark);" onclick="toggleFoodDay(\'' + dayId + '\')">' +
            '<span style="font-size:18px;">' + getCityEmoji(day.city) + '</span>' +
            '<div style="flex:1;">' +
              '<div style="font-size:13px;font-weight:700;color:var(--ink);">Day ' + day.day + ' · ' + day.city + '</div>' +
              '<div style="font-size:11px;color:var(--ink-muted);">' + day.date + ' · ' + day.food.length + ' place' + (day.food.length !== 1 ? 's' : '') + '</div>' +
            '</div>' +
            dayBadge +
            '<span style="font-size:12px;color:var(--ink-muted);margin-left:6px;">▾</span>' +
          '</div>' +
          '<div id="' + dayId + '" style="display:none;">' + foodRows + '</div>' +
        '</div>';
      }).filter(Boolean).join('');

      el.innerHTML = summaryHtml + alertHtml + (daysHtml || '<div style="text-align:center;padding:40px 20px;color:var(--ink-muted);font-style:italic;">No food added yet — open any day and add restaurants.</div>');
    }

    function toggleFoodDay(id) {
      var el = document.getElementById(id);
      if (el) { el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
    }

    function toggleFoodBooked(dayIndex, foodIndex) {
      normaliseFood(currentTrip.days[dayIndex]);
      var f = currentTrip.days[dayIndex].food[foodIndex];
      f.reservationBooked = !f.reservationBooked;
      saveToStorage();
      renderFood();
    }

    function updateFoodFieldDirect(dayIndex, foodIndex, field, value) {
      normaliseFood(currentTrip.days[dayIndex]);
      var f = currentTrip.days[dayIndex].food[foodIndex];
      f[field] = value;
      saveToStorage();
    }

    function deleteFoodDirect(dayIndex, foodIndex) {
      normaliseFood(currentTrip.days[dayIndex]);
      currentTrip.days[dayIndex].food.splice(foodIndex, 1);
      saveToStorage();
      renderFood();
    }

    function toggleFoodEditRow(id) {
      var el = document.getElementById(id);
      if (!el) return;
      var isOpen = el.style.display !== 'none';
      el.style.display = isOpen ? 'none' : 'block';
    }

    function saveFoodAndKeepOpen(editId) {
      renderFood();
      setTimeout(function() {
        var el = document.getElementById(editId);
        if (el) { el.style.display = 'block'; }
        // also make sure the day container is open
        var parts = editId.replace('food-edit-','').split('-');
        var dayId = 'food-day-' + parts[0];
        var dayEl = document.getElementById(dayId);
        if (dayEl) { dayEl.style.display = 'block'; }
      }, 50);
    }

    function renderBudget() {
      var el = document.getElementById('view-budget');
      var baseCurrency = currentTrip.baseCurrency || 'AUD';
      var baseSym = currentTrip.baseCurrencySymbol || '$';

      var totEst = 0, totAct = 0;
      var catEst = { accommodation: 0, activities: 0, food: 0, transport: 0 };
      var catAct = { accommodation: 0, activities: 0, food: 0, transport: 0 };

      currentTrip.days.forEach(function(day) {
        normaliseDayTransport(day);
        normaliseAccom(day);
        normaliseDayCurrency(day);
        if (!day.costs) { day.costs = {}; }
        var dayCur = day.currency || baseCurrency;
        (day.accommodation || []).forEach(function(a, i) {
          var key = 'accom_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.accommodation += est; catAct.accommodation += act;
        });
        (day.activities || []).forEach(function(a, i) {
          var key = 'act_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.activities += est; catAct.activities += act;
        });
        (day.food || []).forEach(function(f, i) {
          var key = 'food_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.food += est; catAct.food += act;
        });
        (day.transport || []).forEach(function(t, i) {
          var key = 'trans_' + i;
          var est = convertToBase(parseFloat((day.costs[key + '_est']) || 0), dayCur);
          var act = convertToBase(parseFloat((day.costs[key + '_act']) || 0), dayCur);
          totEst += est; totAct += act; catEst.transport += est; catAct.transport += act;
        });
      });

      var fmtBase = function(n) { return baseSym + n.toFixed(0); };
      var fmtLocal = function(n, sym) { return (sym || baseSym) + n.toFixed(0); };

      var daysHtml = currentTrip.days.map(function(day, di) {
        normaliseDayTransport(day);
        normaliseAccom(day);
        normaliseDayCurrency(day);
        if (!day.costs) { day.costs = {}; }

        var daySym = day.currencySymbol || baseSym;
        var dayCur = day.currency || baseCurrency;
        var dayEst = 0;
        var rows = '';

        var makeRow = function(label, emoji, key, est, act) {
          dayEst += est;
          return '<div class="budget-item-row">' +
            '<span style="font-size:14px;">' + emoji + '</span>' +
            '<div class="budget-item-name">' + label + '</div>' +
            '<div style="display:flex;align-items:center;gap:4px;">' +
              '<span class="budget-cost-label" style="font-size:9px;">Est</span>' +
              '<input class="budget-cost-input" type="number" placeholder="0" value="' + (est || '') + '" onchange="updateCost(' + di + ',\'' + key + '_est\',this.value)" oninput="updateCost(' + di + ',\'' + key + '_est\',this.value)">' +
              '<span class="budget-cost-label" style="font-size:9px;">Act</span>' +
              '<input class="budget-cost-input" type="number" placeholder="0" value="' + (act || '') + '" onchange="updateCost(' + di + ',\'' + key + '_act\',this.value)" oninput="updateCost(' + di + ',\'' + key + '_act\',this.value)">' +
            '</div>' +
          '</div>';
        };

        (day.accommodation || []).forEach(function(a, i) {
          var k = 'accom_' + i;
          rows += makeRow(a.name || 'Accommodation', '🏨', k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });
        (day.activities || []).forEach(function(a, i) {
          var cat = (day.activityCategories && day.activityCategories[i]) || 'default';
          var emoji = (activityCategories[cat] || activityCategories['default']).emoji;
          var k = 'act_' + i;
          rows += makeRow(a, emoji, k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });
        (day.food || []).forEach(function(f, i) {
          var k = 'food_' + i;
          var fname = typeof f === 'string' ? f : f.name;
          rows += makeRow(fname, '🍽️', k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });
        (day.transport || []).forEach(function(t, i) {
          var k = 'trans_' + i;
          var label = t.from && t.to ? t.from + ' → ' + t.to : (t.carrier || 'Transport');
          rows += makeRow(label, '✈️', k, parseFloat(day.costs[k+'_est']||0), parseFloat(day.costs[k+'_act']||0));
        });

        if (!rows) { rows = '<div style="padding:12px 16px;font-size:12px;color:var(--ink-muted);font-style:italic;">No items to track — add activities, food, or transport to this day.</div>'; }

        var dayEstBase = convertToBase(dayEst, dayCur);
        return '<div class="budget-day">' +
          '<div class="budget-day-header" onclick="toggleBudgetDay(' + di + ')">' +
            '<div><div class="budget-day-title">Day ' + day.day + ' · ' + day.city + '</div><div class="budget-day-sub">' + day.date + ' · ' + dayCur + '</div></div>' +
            '<div style="text-align:right;"><div class="budget-day-total">' + fmtLocal(dayEst, daySym) + '</div>' + (dayCur !== baseCurrency ? '<div style="font-size:10px;color:var(--ink-muted);">~' + fmtBase(dayEstBase) + ' ' + baseCurrency + '</div>' : '') + '</div>' +
          '</div>' +
          '<div class="budget-day-body" id="budget-day-' + di + '">' + rows + '</div>' +
        '</div>';
      }).join('');

      var ratesHtml = '';
      if (currentTrip.exchangeRates && currentTrip.ratesLastFetched) {
        var d = new Date(currentTrip.ratesLastFetched);
        var uniqueCurrencies = [];
        currentTrip.days.forEach(function(day) {
          normaliseDayCurrency(day);
          if (day.currency !== baseCurrency && uniqueCurrencies.indexOf(day.currency) === -1) {
            uniqueCurrencies.push(day.currency);
          }
        });
        if (uniqueCurrencies.length > 0) {
          ratesHtml = '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--sand-dark);">' +
            '<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">Exchange Rates · ' + d.toLocaleDateString() + '</div>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">' +
            uniqueCurrencies.map(function(c) {
              var rate = currentTrip.exchangeRates[c];
              if (!rate) return '';
              var per1Base = (1 / rate).toFixed(2);
              return '<span style="font-size:11px;color:var(--ink-light);">1 ' + baseCurrency + ' = ' + per1Base + ' ' + c + '</span>';
            }).join('<span style="color:var(--sand-dark);">·</span>') +
            '<button onclick="currentTrip.ratesLastFetched=0;fetchExchangeRates(function(){renderBudget();})" style="font-family:inherit;font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:none;color:var(--accent);cursor:pointer;margin-left:4px;">🔄 Refresh</button>' +
            '</div>' +
          '</div>';
        }
      }

      el.innerHTML =
        '<div class="budget-summary">' +
          '<div class="budget-summary-title">Trip Total · ' + baseCurrency + '</div>' +
          '<div class="budget-totals">' +
            '<div class="budget-total-box"><div class="budget-total-label">Estimated</div><div class="budget-total-val">' + fmtBase(totEst) + '</div></div>' +
            '<div class="budget-total-box"><div class="budget-total-label">Actual</div><div class="budget-total-val actual">' + fmtBase(totAct) + '</div></div>' +
          '</div>' +
          '<div class="budget-cats">' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">🏨</div><div class="budget-cat-label">Stay</div><div class="budget-cat-val">' + fmtBase(catEst.accommodation) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">📍</div><div class="budget-cat-label">Activities</div><div class="budget-cat-val">' + fmtBase(catEst.activities) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">🍽️</div><div class="budget-cat-label">Food</div><div class="budget-cat-val">' + fmtBase(catEst.food) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">✈️</div><div class="budget-cat-label">Transport</div><div class="budget-cat-val">' + fmtBase(catEst.transport) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">💰</div><div class="budget-cat-label">Total Est</div><div class="budget-cat-val">' + fmtBase(totEst) + '</div></div>' +
            '<div class="budget-cat-box"><div class="budget-cat-emoji">✅</div><div class="budget-cat-label">Total Act</div><div class="budget-cat-val actual">' + fmtBase(totAct) + '</div></div>' +
          '</div>' +
          ratesHtml +
        '</div>' +
        daysHtml;
    }

    function toggleBudgetDay(di) {
      var el = document.getElementById('budget-day-' + di);
      if (el) { el.classList.toggle('open'); }
    }

    function updateCost(dayIndex, key, value) {
      var day = currentTrip.days[dayIndex];
      if (!day.costs) { day.costs = {}; }
      day.costs[key] = parseFloat(value) || 0;
      saveToStorage();
    }

    // ===== ITINERARY VIEW =====
    function renderItinerary() {
      var el = document.getElementById('view-itinerary');
      var toggleBar = '<div style="display:flex;justify-content:flex-end;padding:0 0 12px 0;">' +
        '<button id="itin-toggle-all" onclick="toggleAllItinDays()" style="font-family:inherit;font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--sand-dark);background:var(--sand);color:var(--ink-muted);cursor:pointer;transition:all 0.15s;">Expand All</button>' +
        '</div>';
      var daysHtml = currentTrip.days.map(function(item) {
        normaliseAccom(item); normaliseDayTransport(item);
        var cityEmoji = getCityEmoji(item.city);

        function makeItinItem(emoji, text, dayIndex, type, itemIndex) {
          var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(text + ' ' + item.city.split('>').pop().trim() + ' Thailand');
          var detailId = 'itin-detail-' + item.day + '-' + type + '-' + itemIndex;
          var photoKey = 'day' + item.day + '_act' + itemIndex;
          var photo = (type === 'act') ? (cardPhotos[photoKey] || '') : '';
          var note = (type === 'act' && item.cardNotes && item.cardNotes[String(itemIndex)]) ? item.cardNotes[String(itemIndex)] : '';
          return '<div class="itin-item" style="flex-direction:column;align-items:flex-start;padding:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;width:100%;cursor:pointer;" onclick="toggleItinItem(\'' + detailId + '\')">' +
              '<span>' + emoji + '</span>' +
              '<span style="flex:1;">' + text + '</span>' +
              '<span style="font-size:10px;color:var(--ink-muted);">▾</span>' +
            '</div>' +
            '<div id="' + detailId + '" style="display:none;margin:0 0 8px 0;background:var(--sand);border-radius:8px;overflow:hidden;">' +
              (photo ? '<img src="' + photo + '" style="width:100%;height:140px;object-fit:cover;display:block;">' : '') +
              '<div style="padding:10px 12px;">' +
                (note ? '<div style="font-size:12px;color:var(--ink-light);font-style:italic;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--sand-dark);">' + note + '</div>' : '') +
                '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">' +
                  '<a href="' + mapsUrl + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--accent);text-decoration:none;">📍 Open in Maps</a>' +
                  '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(text + ' ' + item.city.split('>').pop().trim()) + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--ink-muted);text-decoration:none;">🧭 Directions</a>' +
                  (type === 'act' ? '<span onclick="openItinNoteModal(' + (item.day-1) + ',' + itemIndex + ')" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--ink-muted);cursor:pointer;">📝 ' + (note ? 'Edit note' : 'Add note') + '</span>' : '') +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>';
        }

        var accomHtml = item.accommodation.length
          ? item.accommodation.map(function(a, i) { return makeItinItem('🏨', a.name, item.day-1, 'accom', i); }).join('')
          : '<div class="itin-placeholder">No accommodation — click Edit to add</div>';
        var actHtml = item.activities.length
          ? item.activities.map(function(a, i) {
              var cat = (item.activityCategories && item.activityCategories[i]) || 'default';
              return makeItinItem((activityCategories[cat]||activityCategories['default']).emoji, a, item.day-1, 'act', i);
            }).join('')
          : '<div class="itin-placeholder">No activities — click Edit to add</div>';
        var foodHtml = item.food.length
          ? item.food.map(function(f, i) { var fname = typeof f === 'string' ? f : f.name; return makeItinItem('🍽️', fname, item.day-1, 'food', i); }).join('')
          : '<div class="itin-placeholder">No food planned — click Edit to add</div>';
        var transHtml = item.transport.length
          ? item.transport.map(function(t, i) {
              var label = (t.from||'') + (t.to ? ' → '+t.to : '') + (t.flightNum ? ' ('+t.flightNum+')' : '');
              return '<div class="itin-item"><span>✈️</span>' + label + '</div>';
            }).join('')
          : '<div class="itin-placeholder">No transport — click Edit to add</div>';

        return '<div class="itin-day">' +
          '<div class="itin-day-header" onclick="toggleItinDay(' + item.day + ')">' +
            '<span style="font-size:20px;">' + cityEmoji + '</span>' +
            '<div style="flex:1;"><div class="itin-day-num">Day ' + item.day + '</div><div class="itin-day-city">' + item.city + '</div></div>' +
            '<div class="itin-day-date">' + item.date + '</div>' +
            '<button onclick="event.stopPropagation();editItinDay(' + (item.day-1) + ')" style="margin-left:10px;font-family:inherit;font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;border:1px solid var(--sand-dark);background:var(--white);color:var(--ink-muted);cursor:pointer;">Edit</button>' +
          '</div>' +
          '<div class="itin-day-body" id="itin-day-' + item.day + '">' +
            '<div class="itin-section-label">Transport</div>' + transHtml +
            '<div class="itin-section-label">Accommodation</div>' + accomHtml +
            '<div class="itin-section-label">Activities</div>' + actHtml +
            '<div class="itin-section-label">Food</div>' + foodHtml +
          '</div>' +
        '</div>';
      }).join('');
      el.innerHTML = toggleBar + daysHtml;
    }

    function toggleAllItinDays() {
      var bodies = document.querySelectorAll('.itin-day-body');
      var btn = document.getElementById('itin-toggle-all');
      var anyOpen = Array.prototype.some.call(bodies, function(b) { return b.classList.contains('open'); });
      bodies.forEach(function(b) {
        if (anyOpen) { b.classList.remove('open'); }
        else { b.classList.add('open'); }
      });
      if (btn) { btn.textContent = anyOpen ? 'Expand All' : 'Collapse All'; }
    }

    function toggleItinItem(id) {
      var el = document.getElementById(id);
      if (el) { el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
    }

    function toggleItinNoteInput(detailId) {
      var el = document.getElementById('note-input-' + detailId);
      if (!el) return;
      el.style.display = el.style.display === 'none' ? 'flex' : 'none';
      var input = document.getElementById('note-val-' + detailId);
      if (input && el.style.display === 'flex') { input.focus(); }
    }

    function openItinNoteModal(dayIndex, actIndex) {
      var item = currentTrip.days[dayIndex];
      if (!item) return;
      if (!item.cardNotes) { item.cardNotes = {}; }
      var current = item.cardNotes[String(actIndex)] || '';
      showModal('Note for ' + item.activities[actIndex],
        '<div class="modal-field"><label>Note</label><input type="text" id="itin-note-modal-input" value="' + current.replace(/"/g, '&quot;') + '" placeholder="e.g. Book tickets in advance"></div>',
        function() {
          item.cardNotes[String(actIndex)] = document.getElementById('itin-note-modal-input').value.trim();
          saveToStorage();
          renderItinerary();
        }
      );
    }

    function saveItinNote(dayIndex, actIndex, value) {
      var item = currentTrip.days[dayIndex];
      if (!item) return;
      if (!item.cardNotes) { item.cardNotes = {}; }
      item.cardNotes[String(actIndex)] = value.trim();
      saveToStorage();
    }

    function editItinDay(index) {
      openDayPanel(currentTrip.days[index]);
    }

    function toggleCalEdit(dayIndex) {
      var editPanel = document.getElementById('cal-edit-panel-' + dayIndex);
      var detailBody = document.getElementById('cal-detail-body-' + dayIndex);
      var btn = document.getElementById('cal-edit-btn-' + dayIndex);
      if (!editPanel || !detailBody) return;
      var isOpen = editPanel.style.display !== 'none';
      if (isOpen) {
        editPanel.style.display = 'none';
        detailBody.style.display = 'block';
        btn.textContent = 'Edit';
        btn.style.background = 'none';
        btn.style.color = 'var(--accent)';

    function addCalAccom(dayIndex) {
      showModal('Add accommodation',
        '<div class="modal-field"><label>Name</label><input type="text" id="cal-accom-input" placeholder="e.g. Airbnb Bangkok"></div>',

          var name = document.getElementById('cal-accom-input').value.trim();

      currentTrip.days[dayIndex].accommodation.splice(i, 1);

      var el = document.getElementById('cal-edit-accom-' + dayIndex);
      if (el) { el.innerHTML = renderCalEditAccom(dayIndex); }
    }

      currentTrip.days[dayIndex].activities.splice(i, 1);

      saveToStorage();
      var el = document.getElementById('cal-edit-acts-' + dayIndex);
      if (el) { el.innerHTML = renderCalEditActs(dayIndex); }
    }

    function deleteCalFood(dayIndex, i) {
      currentTrip.days[dayIndex].food.splice(i, 1);

    // ===== KANBAN =====
    function renderKanban() {
      kanbanSortables.forEach(function(s) { s.destroy(); });
      kanbanSortables = [];
      var board = document.getElementById('kanban-board');
      board.innerHTML = '';
      currentTrip.days.forEach(function(item, dayIndex) {
        var col = document.createElement('div');
        col.className = 'kanban-col';
        var colHeader = document.createElement('div');
        colHeader.className = 'kanban-col-header';
        colHeader.innerHTML = '<span style="font-size:18px;">' + getCityEmoji(item.city) + '</span><div><div style="font-size:10px;color:var(--ink-muted);letter-spacing:0.07em;text-transform:uppercase;">Day ' + item.day + ' | ' + item.date + '</div><div style="font-size:13px;font-weight:700;">' + item.city + '</div></div>';
        col.appendChild(colHeader);
        var colBody = document.createElement('div');
        colBody.className = 'kanban-col-body';
        colBody.dataset.dayIndex = dayIndex;
        item.activities.forEach(function(activity, actIndex) { colBody.appendChild(buildKanbanCard(item, dayIndex, activity, actIndex)); });
        col.appendChild(colBody);
        board.appendChild(col);
      });
      if (!isMobile()) { initKanbanDragScroll(); }
    }

    function initKanbanDragScroll() {
      var board = document.getElementById('view-cards');
      var isDown = false, startX, scrollLeft;
      board.addEventListener('mousedown', function(e) {
        if (e.target.closest('button') || e.target.closest('a') || e.target.closest('input')) return;
        isDown = true; startX = e.pageX - board.offsetLeft; scrollLeft = board.scrollLeft;
        board.style.cursor = 'grabbing'; e.preventDefault();
      });
      document.addEventListener('mouseup', function() { isDown = false; board.style.cursor = ''; });
      board.addEventListener('mouseleave', function() { isDown = false; board.style.cursor = ''; });
      board.addEventListener('mousemove', function(e) {
        if (!isDown) return; e.preventDefault();
        board.scrollLeft = scrollLeft - (e.pageX - board.offsetLeft - startX) * 1.5;
      });
    }

    function buildKanbanCard(item, dayIndex, activity, actIndex) {
      var card = document.createElement('div');
      card.className = 'kanban-card';
      var cat = (item.activityCategories && item.activityCategories[actIndex]) || 'default';
      var catStyle = activityCategories[cat] || activityCategories['default'];
      var photoKey = 'day' + item.day + '_act' + actIndex;
      var savedPhoto = cardPhotos[photoKey];
      var photoId = 'kp-' + photoKey;
      if (!item.cardNotes) { item.cardNotes = {}; }
      var userNote = item.cardNotes[actIndex] || '';

      var photoHtml = savedPhoto
        ? '<img class="kanban-card-photo" src="' + savedPhoto + '">'
        : '<div class="kanban-card-photo-placeholder" id="' + photoId + '">' + catStyle.emoji + '</div>';

      var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(activity + ' ' + item.city.split('>').pop().trim() + ' Thailand');

      card.innerHTML = photoHtml +
        '<div class="kanban-card-body">' +
          '<div class="kanban-card-label">' + cat + '</div>' +
          '<div class="kanban-card-title">' + activity + '</div>' +
          '<div class="kanban-card-note">' + item.note + '</div>' +
          (userNote ? '<div class="kanban-card-user-note">' + userNote + '</div>' : '') +
        '</div>' +
        '<div class="kanban-card-footer">' +
          '<button class="kbtn" onclick="openKanbanNote(' + dayIndex + ',' + actIndex + ')">📝 Note</button>' +
          '<button class="kbtn" onclick="triggerPhotoUpload(\'' + photoKey + '\',' + dayIndex + ',' + actIndex + ')">📷</button>' +
          '<a href="' + mapsUrl + '" target="_blank" style="text-decoration:none;"><button class="kbtn">📍 Maps</button></a>' +
          '<button class="kbtn" onclick="editItinDay(' + dayIndex + ')">Edit</button>' +
        '</div>';

      if (!savedPhoto && cat !== 'default') { fetchKanbanPhoto(activity, item, photoId); }
      return card;
    }

    function openKanbanNote(dayIndex, actIndex) {
      var item = currentTrip.days[dayIndex];
      if (!item.cardNotes) { item.cardNotes = {}; }
      var current = item.cardNotes[actIndex] || '';
      showModal('Add note',
        '<div class="modal-field"><label>Note for ' + item.activities[actIndex] + '</label><input type="text" id="kanban-note-input" value="' + current + '" placeholder="e.g. Book tickets in advance"></div>',
        function() {
          item.cardNotes[actIndex] = document.getElementById('kanban-note-input').value.trim();
          saveToStorage(); renderKanban();
        }
      );
    }

    function fetchKanbanPhoto(activity, item, photoId) {
      var service = new google.maps.places.PlacesService(map);
      service.findPlaceFromQuery({ query: activity + ' ' + item.city.split('>').pop().trim() + ' Thailand', fields: ['place_id'] }, function(results, status) {
        if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) {
          service.getDetails({ placeId: results[0].place_id, fields: ['photos'] }, function(details, detailStatus) {
            if (detailStatus === google.maps.places.PlacesServiceStatus.OK && details.photos && details.photos.length > 0) {
              var el = document.getElementById(photoId);
              if (el) { el.outerHTML = '<img class="kanban-card-photo" src="' + details.photos[0].getUrl({ maxWidth: 270, maxHeight: 120 }) + '">'; }
            }
          });
        }
      });
    }

    function triggerPhotoUpload(photoKey, dayIndex, actIndex, type) {
      var input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('Please choose an image under 5MB.'); return; }
        uploadImageToFirebase(file, photoKey, dayIndex, actIndex, type);
      };
      input.click();
    }

    function openFoodNote(dayIndex, foodIndex) {
      var item = currentTrip.days[dayIndex];
      if (!item) return;
      if (!item.foodNotes) { item.foodNotes = {}; }
      var current = item.foodNotes[String(foodIndex)] || '';
      showModal('Note for ' + item.food[foodIndex],
        '<div class="modal-field"><label>Note</label><input type="text" id="food-note-input" value="' + current.replace(/"/g, '&quot;') + '" placeholder="e.g. Make a reservation"></div>',
        function() {
          item.foodNotes[String(foodIndex)] = document.getElementById('food-note-input').value.trim();
          saveToStorage();
          renderKanban();
        }
      );
    }

    function uploadImageToFirebase(file, photoKey, dayIndex, actIndex, type) {
      var fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.]/g, '_');
      var ref = storage.ref('images/' + fileName);

      var placeholderId = 'kp-' + photoKey;
      var placeholder = document.getElementById(placeholderId);
      if (placeholder) {
        placeholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80px;background:var(--sand);"><div style="width:20px;height:20px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;"></div></div>';
      }

      var uploadTask = ref.put(file);
      uploadTask.on('state_changed',
        null,
        function(error) {
          console.error('Upload error:', error);
          if (placeholder) { placeholder.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--danger);">Upload failed</div>'; }
        },
        function() {
          uploadTask.snapshot.ref.getDownloadURL().then(function(url) {
            cardPhotos[photoKey] = url;
            saveCardPhotos();
            renderKanban();
          });
        }
      );
    }

    function saveCardPhotos() {
      try {
        var urlsOnly = {};
        Object.keys(cardPhotos).forEach(function(key) {
          if (cardPhotos[key] && cardPhotos[key].startsWith('https://')) {
            urlsOnly[key] = cardPhotos[key];
          }
        });
        localStorage.setItem('card_photos', JSON.stringify(urlsOnly));
        db.collection('trips').doc(currentTripKey).set({
          cardPhotos: JSON.stringify(urlsOnly)
        }, { merge: true }).catch(function(e) { console.warn('Firestore photo save failed:', e); });
      } catch(e) {
        console.warn('localStorage save failed:', e);
      }
    }

    function loadCardPhotos() {
      var saved = localStorage.getItem('card_photos');
      if (saved) { cardPhotos = JSON.parse(saved); }
    }

    function loadCardPhotosFromFirestore(callback) {
      db.collection('trips').doc(currentTripKey).get().then(function(doc) {
        if (doc.exists && doc.data().cardPhotos) {
          var remote = JSON.parse(doc.data().cardPhotos);
          Object.keys(remote).forEach(function(key) { cardPhotos[key] = remote[key]; });
          try { localStorage.setItem('card_photos', JSON.stringify(cardPhotos)); } catch(e) {}
        }
        if (callback) { callback(); }
      }).catch(function(e) {
        console.warn('Firestore photo load failed:', e);
        if (callback) { callback(); }
      });
    }

    // ===== SPLIT VIEW =====

      document.getElementById('split-list').innerHTML = currentTrip.days.map(function(item, index) {
        normaliseAccom(item); normaliseDayTransport(item);
        return '<div class="split-day-item" id="split-item-' + index + '" onclick="selectSplitDay(' + index + ')">' +

        '<div id="split-detail-' + index + '" style="display:none;border-bottom:2px solid var(--sand-dark);"></div>';

      } else { google.maps.event.trigger(splitMap, 'resize'); }

    function showSplitFloatCard(name, photoUrl, note, mapsUrl, position, itemContext) {
      splitFloatCardItem = itemContext || null;
      var card = document.getElementById('split-float-card');
      var img = document.getElementById('split-float-card-img');
      var nameEl = document.getElementById('split-float-card-name');
      var noteEl = document.getElementById('split-float-card-note');
      var linkEl = document.getElementById('split-float-card-link');
      if (!card || !nameEl) { console.warn('Split float card elements not found'); return; }
      nameEl.textContent = name;
      noteEl.innerHTML = note
        ? '<span style="font-style:italic;">' + note + '</span> <span onclick="openSplitNoteModal()" style="font-size:10px;color:var(--ink-muted);cursor:pointer;margin-left:4px;">📝 Edit</span>'
        : '<span onclick="openSplitNoteModal()" style="font-size:11px;color:var(--ink-muted);cursor:pointer;">📝 Add note</span>';
      noteEl.style.display = 'block';
      linkEl.href = mapsUrl;
      if (photoUrl) { img.src = photoUrl; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
      card.classList.remove('open');
      void card.offsetWidth;
      card.classList.add('open');
      if (position && splitMap) { splitMap.panTo(position); }

      var found = false;

          found = true;
          splitMap.panTo(obj.marker.position);
          splitMap.setZoom(15);
          showSplitFloatCard(obj.name, obj.photo, obj.note, obj.mapsUrl, obj.marker.position, obj.itemContext);
        }
      });
      if (!found) {
        setTimeout(function() { openSplitPin(index, type); }, 300);
      }

      splitActivityMarkers.forEach(function(obj) { obj.marker.map = null; });
      splitActivityMarkers = [];
      if (splitOpenInfoWindow) { splitOpenInfoWindow.close(); splitOpenInfoWindow = null; }

    function selectSplitDay(index) {
      var wasActive = document.getElementById('split-item-' + index).classList.contains('active');
      document.querySelectorAll('.split-day-item').forEach(function(el) { el.classList.remove('active'); });
      document.querySelectorAll('[id^="split-detail-"]').forEach(function(d) { d.style.display = 'none'; d.innerHTML = ''; });
      clearSplitActivityMarkers();
      if (wasActive) { return; }

      var el = document.getElementById('split-item-' + index);
      if (el) { el.classList.add('active'); }
      var day = currentTrip.days[index];
      splitMap.panTo({ lat: day.lat, lng: day.lng }); splitMap.setZoom(12);

      if (!isMobile()) {
        normaliseAccom(day); normaliseDayTransport(day);
        var detail = document.getElementById('split-detail-' + index);

        var accomHtml = day.accommodation.length ? day.accommodation.map(function(a, i) {
          return '<div onclick="openSplitPin(' + i + ',\'accommodation\')" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.06);cursor:pointer;" onmouseover="this.style.background=\'rgba(255,255,255,0.5)\'" onmouseout="this.style.background=\'\'">' +
            '<span style="font-size:14px;">🏨</span>' +
            '<span style="font-size:12px;color:var(--ink);flex:1;">' + a.name + '</span>' +
            '<span style="font-size:10px;color:var(--accent);">📍</span>' +
          '</div>';
        }).join('') : '<div style="font-size:12px;color:var(--ink-muted);padding:6px 0;font-style:italic;">No accommodation</div>';

        var actsHtml = day.activities.length ? day.activities.map(function(a, i) {
          var cat = (day.activityCategories && day.activityCategories[i]) || 'default';
          var emoji = (activityCategories[cat]||activityCategories['default']).emoji;
          return '<div onclick="openSplitPin(' + i + ',\'activity\')" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.06);cursor:pointer;" onmouseover="this.style.background=\'rgba(255,255,255,0.5)\'" onmouseout="this.style.background=\'\'">' +
            '<span style="font-size:14px;">' + emoji + '</span>' +
            '<span style="font-size:12px;color:var(--ink);flex:1;">' + a + '</span>' +
            '<span style="font-size:10px;color:var(--accent);">📍</span>' +
          '</div>';
        }).join('') : '<div style="font-size:12px;color:var(--ink-muted);padding:6px 0;font-style:italic;">No activities</div>';

    function buildSearchBox(type) {
      return '<button class="add-btn" onclick="openSearch(\'' + type + '\')">+ Add to ' + type + '</button>' +
        '<div class="search-box" id="search-box-' + type + '"><input class="search-input" id="search-input-' + type + '" type="text" placeholder="Search for a place..." oninput="debounceSearch(\'' + type + '\')"><div class="search-results" id="search-results-' + type + '"></div></div>';
    }

    var searchTimers = {};
    function debounceSearch(type) { clearTimeout(searchTimers[type]); searchTimers[type] = setTimeout(function() { runSearch(type); }, 400); }

    function openSearch(type) {
      var box = document.getElementById('search-box-' + type);
      if (box) { box.classList.toggle('open'); if (box.classList.contains('open')) { document.getElementById('search-input-' + type).focus(); } }
    }

    function runSearch(type) {
      var query = document.getElementById('search-input-' + type).value.trim();
      if (!query) return;
      var city = currentDayItem.city.split('>').pop().trim();
      var service = new google.maps.places.PlacesService(map);
      service.textSearch({ query: query + ' ' + city + ' Thailand' }, function(results, status) {
        if (status === google.maps.places.PlacesServiceStatus.OK && results.length) {
          var resultsEl = document.getElementById('search-results-' + type);
          resultsEl.innerHTML = ''; resultsEl.classList.add('open');
          results.slice(0, 5).forEach(function(place) {
            var div = document.createElement('div');
            div.className = 'search-result-item';
            div.innerHTML = '<div class="search-result-name">' + place.name + '</div><div class="search-result-address">' + (place.formatted_address || '') + '</div>';
            div.addEventListener('click', function() { addFromSearch(type, place); resultsEl.classList.remove('open'); document.getElementById('search-input-' + type).value = ''; document.getElementById('search-box-' + type).classList.remove('open'); });
            resultsEl.appendChild(div);
          });
        }
      });
    }

    function addFromSearch(type, place) {
      if (type === 'activities') { currentDayItem.activities.push(place.name); currentDayItem.activityCategories.push('default'); }
      else if (type === 'food') { currentDayItem.food.push({ name: place.name, link: '', reservationRequired: false, reservationBooked: false, notes: '', mustOrder: '' }); }
      else if (type === 'accommodation') { normaliseAccom(currentDayItem); currentDayItem.accommodation.push({ name: place.name, notes: place.formatted_address || '', price: '' }); }
      saveToStorage(); refreshPanelTabs(currentDayItem);
    }

    function makeDeleteBtn(onclick) {
      return '<button onclick="' + onclick + '" style="margin-left:auto;flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1px solid var(--sand-dark);background:none;cursor:pointer;font-size:11px;color:var(--ink-muted);display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background=\'#C0392B\';this.style.color=\'#fff\';this.style.borderColor=\'#C0392B\';" onmouseout="this.style.background=\'none\';this.style.color=\'var(--ink-muted)\';this.style.borderColor=\'var(--sand-dark)\';">x</button>';
    }

    function deleteActivity(index) { currentDayItem.activities.splice(index, 1); if (currentDayItem.activityCategories) { currentDayItem.activityCategories.splice(index, 1); } saveToStorage(); refreshPanelTabs(currentDayItem); }
    function deleteFood(index) { currentDayItem.food.splice(index, 1); saveToStorage(); refreshPanelTabs(currentDayItem); }
    function updateActivityName(index, value) { if (!currentDayItem || !value.trim()) return; currentDayItem.activities[index] = value.trim(); saveToStorage(); rebuildTimeline(); }

            el.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:pointer;';

            var marker = new google.maps.marker.AdvancedMarkerElement({ position: place.geometry.location, map: map, title: task.name, content: el });
            var cardContent = '<div style="width:' + (isMobile() ? '150px' : '260px') + ';font-family:system-ui,sans-serif;font-size:' + (isMobile() ? '11px' : '13px') + ';">';
            if (details && detailStatus === google.maps.places.PlacesServiceStatus.OK) {
              if (details.photos && details.photos.length > 0) { cardContent += '<img src="' + details.photos[0].getUrl({ maxWidth: 260, maxHeight: 120 }) + '" style="width:calc(100% + 2px);height:' + (isMobile()?'65px':'120px') + ';object-fit:cover;border-radius:4px 4px 0 0;display:block;margin:-1px -1px 0 -1px;">'; }
              cardContent += '<div style="padding:' + (isMobile()?'6px 8px':'10px') + ';">';
              cardContent += '<div style="font-size:' + (isMobile()?'11px':'14px') + ';font-weight:700;margin-bottom:' + (isMobile()?'2px':'4px') + ';line-height:1.2;">' + details.name + '</div>';
              if (details.rating) { cardContent += '<div style="font-size:' + (isMobile()?'10px':'12px') + ';color:#666;margin-bottom:2px;">' + details.rating + '★ (' + details.user_ratings_total + ')</div>'; }
              if (details.formatted_address && !isMobile()) { cardContent += '<div style="font-size:11px;color:#888;margin-bottom:6px;">' + details.formatted_address + '</div>'; }
              if (details.opening_hours && details.opening_hours.isOpen) { var isOpen = details.opening_hours.isOpen(); cardContent += '<div style="font-size:12px;font-weight:600;color:' + (isOpen ? '#2D9E75' : '#C0392B') + ';margin-bottom:6px;">' + (isOpen ? 'Open now' : 'Closed now') + '</div>'; }
              if (details.url) { cardContent += '<a href="' + details.url + '" target="_blank" style="font-size:12px;color:#2D9E75;text-decoration:none;">View on Google Maps</a>'; }
              cardContent += '</div>';
            } else { cardContent += '<div style="padding:10px;"><div style="font-size:13px;font-weight:600;">' + task.name + '</div></div>'; }
            cardContent += '</div>';
            var photoUrl = (details && detailStatus === google.maps.places.PlacesServiceStatus.OK && details.photos && details.photos.length > 0)
              ? details.photos[0].getUrl({ maxWidth: 260, maxHeight: 120 }) : '';
            var mapsUrl = (details && details.url) ? details.url : 'https://www.google.com/maps/search/' + encodeURIComponent(task.name);
            var displayName = (details && details.name) ? details.name : task.name;
            if (task.type === 'activity') {
              var pk = 'day' + item.day + '_act' + task.index;
              if (cardPhotos[pk]) { photoUrl = cardPhotos[pk]; }
            }
            var userNote = (task.type === 'activity' && item.cardNotes && item.cardNotes[String(task.index)]) ? item.cardNotes[String(task.index)] : '';
            (function(dn, pu, un, mu, t, idx, dayIdx) {
              var handler = function(e) {
                if (e && e.stopPropagation) { e.stopPropagation(); }
                document.getElementById('panel').classList.remove('open');
                if (t === 'activity') { highlightPanelActivity(idx); }
                if (t === 'food') { highlightPanelFood(idx); }
                if (t === 'accommodation') { highlightPanelAccom(idx); }
                var di = (t === 'activity') ? dayIdx : undefined;
                var ai = (t === 'activity') ? idx : undefined;
                showMapFloatCard(dn, pu, un, mu, di, ai);
              };
              marker.addListener('gmp-click', handler);
              el.addEventListener('click', handler);
            })(displayName, photoUrl, userNote, mapsUrl, task.type, task.index, currentTrip.days.indexOf(item));
            activityMarkers.push({ marker: marker, index: task.index, type: task.type, position: place.geometry.location });
            if (callback) { callback(); }
          });
        } else { if (callback) { callback(); } }
      });
    }

    // ===== MOBILE DAY PILL =====
    var mobPillIndex = 0;

    var mobPillInited = false;

    function initMobPill() {
      if (!isMobile()) return;
      var pill = document.getElementById('mob-day-pill');
      if (pill) { pill.classList.add('active'); }
      mobPillIndex = 0;
      updateMobPill();

      if (mobPillInited) return;
      mobPillInited = true;

      document.getElementById('mob-pill-prev').addEventListener('click', function() {
        if (mobPillIndex > 0) {
          var summaryWasOpen = document.getElementById('mob-day-summary').classList.contains('open');
          mobPillIndex--; updateMobPill(); loadMobPillDay(); closeMapFloatCard();
          if (summaryWasOpen) { toggleMobDaySummary(); }
        }
      });
      document.getElementById('mob-pill-next').addEventListener('click', function() {
        if (mobPillIndex < currentTrip.days.length - 1) {
          var summaryWasOpen = document.getElementById('mob-day-summary').classList.contains('open');
          mobPillIndex++; updateMobPill(); loadMobPillDay(); closeMapFloatCard();
          if (summaryWasOpen) { toggleMobDaySummary(); }
        }
      });
      document.getElementById('mob-pill-center').addEventListener('click', function() {
        toggleMobDaySummary();
      });
    }

    function updateMobPill() {
      var day = currentTrip.days[mobPillIndex];
      if (!day) return;
      document.getElementById('mob-pill-day').textContent = 'Day ' + day.day + ' · ' + day.date;
      document.getElementById('mob-pill-city').textContent = getCityEmoji(day.city) + ' ' + day.city.split('>').pop().trim();
    }

    function loadMobPillDay() {
      closeMobDaySummary();
      closeMobPinSheet();
      var day = currentTrip.days[mobPillIndex];
      if (!day) return;
      clearActivityMarkers();
      cityMarkerObjs.forEach(function(obj) { obj.marker.map = null; });
      addActivityMarkers(day, function() {
        if (activityMarkers.length > 0) {
          var bounds = new google.maps.LatLngBounds();
          activityMarkers.forEach(function(obj) {
            if (obj.position) { bounds.extend(obj.position); }
          });
          if (!bounds.isEmpty()) { map.fitBounds(bounds, { padding: 60 }); }
        } else {
          map.panTo({ lat: day.lat, lng: day.lng });
          map.setZoom(13);
        }
      });
    }

    function toggleMobDaySummary() {
      closeMapFloatCard();
      var summary = document.getElementById('mob-day-summary');
      if (summary.classList.contains('open')) { closeMobDaySummary(); return; }
      var day = currentTrip.days[mobPillIndex];
      if (!day) return;
      normaliseAccom(day); normaliseDayTransport(day);
      document.getElementById('mob-day-summary-emoji').textContent = getCityEmoji(day.city);
      document.getElementById('mob-day-summary-daynum').textContent = 'Day ' + day.day + ' · ' + day.date;
      document.getElementById('mob-day-summary-city').textContent = day.city;
      var chips = '';
      var divider = function(label) {
        return '<div style="width:100%;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);padding:6px 2px 2px;flex-basis:100%;">' + label + '</div>';
      };
      if (day.accommodation.length) {
        chips += divider('Stay');
        chips += '<div class="mob-day-summary-chip">🏨 ' + day.accommodation[0].name + '</div>';
      }
      if (day.transport.length) {
        chips += divider('Transport');
        day.transport.forEach(function(t) { chips += '<div class="mob-day-summary-chip">✈️ ' + (t.from||'') + (t.to ? ' → ' + t.to : '') + (t.flightNum ? ' · ' + t.flightNum : '') + '</div>'; });
      }
      if (day.activities.length) {
        chips += divider('Activities');
        day.activities.forEach(function(a, i) { var cat = (day.activityCategories && day.activityCategories[i]) || 'default'; var emoji = (activityCategories[cat]||activityCategories['default']).emoji; var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(a + ' ' + day.city.split('>').pop().trim() + ' Thailand'); var photoKey = 'day' + day.day + '_act' + i; var photo = cardPhotos[photoKey] || ''; var note = (day.cardNotes && day.cardNotes[String(i)]) ? day.cardNotes[String(i)] : ''; var dIdx = currentTrip.days.indexOf(day); chips += '<div class="mob-day-summary-chip" style="cursor:pointer;" onclick="closeMobDaySummary();showMapFloatCard(\'' + a.replace(/'/g, "\\'") + '\',\'' + photo + '\',\'' + note.replace(/'/g, "\\'") + '\',\'' + mapsUrl + '\',' + dIdx + ',' + i + ')">' + emoji + ' ' + a + '</div>'; });
      }
      if (day.food.length) {
        chips += divider('Food & Drinks');
        day.food.forEach(function(f, i) { var fname = typeof f === 'string' ? f : f.name; var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(fname.split(' for ')[0].trim() + ' ' + day.city.split('>').pop().trim() + ' Thailand'); var photoKey = 'day' + day.day + '_food' + i; var photo = cardPhotos[photoKey] || ''; chips += '<div class="mob-day-summary-chip" style="cursor:pointer;" onclick="closeMobDaySummary();showMapFloatCard(\'' + fname.replace(/'/g, "\\'") + '\',\'' + photo + '\',\'\',\'' + mapsUrl + '\')">' + '\uD83C\uDF7D\uFE0F ' + fname + '</div>'; });
      }
      document.getElementById('mob-day-summary-body').innerHTML = chips;
      summary.classList.add('open');
    }

    function closeMobDaySummary() {
      document.getElementById('mob-day-summary').classList.remove('open');
    }

    function showMobPinSheet(name, photoUrl, note, mapsUrl) {
      closeMobDaySummary();
      var sheet = document.getElementById('mob-pin-sheet');
      var img = document.getElementById('mob-pin-sheet-img');
      document.getElementById('mob-pin-sheet-name').textContent = name;
      document.getElementById('mob-pin-sheet-note').textContent = note || '';
      document.getElementById('mob-pin-sheet-note').style.display = note ? 'block' : 'none';
      document.getElementById('mob-pin-sheet-maps').href = mapsUrl;
      if (photoUrl) { img.src = photoUrl; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
      sheet.classList.add('open');
    }

    function closeMobPinSheet() {
      document.getElementById('mob-pin-sheet').classList.remove('open');
    }

    // ===== MAP FLOAT CARD =====
    var mapFloatCardItem = null;

    function showMapFloatCard(name, photoUrl, note, mapsUrl, dayIndex, actIndex, itemType) {
      mapFloatCardItem = (dayIndex !== undefined && actIndex !== undefined) ? { dayIndex: dayIndex, actIndex: actIndex, type: itemType || 'activity' } : null;
      var card = document.getElementById('map-float-card');
      var img = document.getElementById('map-float-card-img');
      var nameEl = document.getElementById('map-float-card-name');
      var noteEl = document.getElementById('map-float-card-note');
      var linkEl = document.getElementById('map-float-card-link');
      var editBtn = document.getElementById('map-float-card-edit');
      nameEl.textContent = name;
      if (mapFloatCardItem) {
        noteEl.innerHTML = note
          ? '<span style="font-style:italic;">' + note + '</span> <span onclick="openMapFloatCardNoteModal()" style="font-size:10px;color:var(--ink-muted);cursor:pointer;margin-left:4px;">📝 Edit</span>'
          : '<span onclick="openMapFloatCardNoteModal()" style="font-size:11px;color:var(--ink-muted);cursor:pointer;">📝 Add note</span>';
        noteEl.style.display = 'block';
        if (editBtn) { editBtn.style.display = 'block'; }
      } else {
        noteEl.textContent = note || '';
        noteEl.style.display = note ? 'block' : 'none';
        if (editBtn) { editBtn.style.display = 'none'; }
      }
      linkEl.href = mapsUrl;
      if (photoUrl) { img.src = photoUrl; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
      card.classList.remove('open');
      void card.offsetWidth;
      card.classList.add('open');
    }

    function openFloatCardEdit() {
      if (!mapFloatCardItem) return;
      var dayIndex = mapFloatCardItem.dayIndex;
      var type = mapFloatCardItem.type;
      var tabMap = { activity: 'activities', food: 'food', accommodation: 'accommodation' };
      var targetTab = tabMap[type] || 'overview';
      closeMapFloatCard();
      openDayPanel(currentTrip.days[dayIndex]);
      setTimeout(function() {
        var tab = document.querySelector('.panel-tab[data-tab="' + targetTab + '"]');
        if (tab) { tab.click(); }
      }, 50);
    }

    function openMapFloatCardNoteModal() {
      if (!mapFloatCardItem) return;
      var item = currentTrip.days[mapFloatCardItem.dayIndex];
      var actIndex = mapFloatCardItem.actIndex;
      if (!item) return;
      if (!item.cardNotes) { item.cardNotes = {}; }
      var current = item.cardNotes[String(actIndex)] || '';
      showModal('Note for ' + item.activities[actIndex],
        '<div class="modal-field"><label>Note</label><input type="text" id="map-float-note-input" value="' + current.replace(/"/g, '&quot;') + '" placeholder="e.g. Book tickets in advance"></div>',
        function() {
          item.cardNotes[String(actIndex)] = document.getElementById('map-float-note-input').value.trim();
          saveToStorage();
          var newNote = item.cardNotes[String(actIndex)];
          var noteEl = document.getElementById('map-float-card-note');
          if (noteEl) {
            noteEl.innerHTML = newNote
              ? '<span style="font-style:italic;">' + newNote + '</span> <span onclick="openMapFloatCardNoteModal()" style="font-size:10px;color:var(--ink-muted);cursor:pointer;margin-left:4px;">📝 Edit</span>'
              : '<span onclick="openMapFloatCardNoteModal()" style="font-size:11px;color:var(--ink-muted);cursor:pointer;">📝 Add note</span>';
          }
        }
      );
    }

    function closeMapFloatCard() {
      document.getElementById('map-float-card').classList.remove('open');
    }

    // ===== DRAG SCROLL + PANEL CLOSE =====
    function initDragScroll() {
      var tl = document.getElementById('tl');
      var isDown = false, startX, scrollLeft;
      tl.addEventListener('mousedown', function(e) { isDown = true; tlDragged = false; tl.classList.add('dragging'); startX = e.pageX - tl.offsetLeft; scrollLeft = tl.scrollLeft; });
      tl.addEventListener('mouseleave', function() { isDown = false; tl.classList.remove('dragging'); });
      tl.addEventListener('mouseup', function() { isDown = false; tl.classList.remove('dragging'); });
      tl.addEventListener('mousemove', function(e) { if (!isDown) return; e.preventDefault(); tlDragged = true; tl.scrollLeft = scrollLeft - (e.pageX - tl.offsetLeft - startX) * 1.5; });
      document.getElementById('panel-close').addEventListener('click', function() {
        document.getElementById('panel').classList.remove('open');
        document.querySelectorAll('.day-card').forEach(function(c) { c.classList.remove('active'); });
        document.querySelectorAll('.mob-day-card').forEach(function(c) { c.classList.remove('active'); });
        clearActivityMarkers();
        cityMarkerObjs.forEach(function(obj) { obj.marker.map = map; });
        saveToStorage();
        if (currentView === 'itinerary') { renderItinerary(); }
        if (currentView === 'cards') { renderKanban(); }
        if (currentView === 'budget') { renderBudget(); }
      });

      map.addListener('click', function() {
        closeMapFloatCard();
        closeMobPinSheet();
        closeMobDaySummary();
        if (activityMarkers.length > 0) {
          clearActivityMarkers();
          document.querySelectorAll('.day-card').forEach(function(c) { c.classList.remove('active'); });
          document.querySelectorAll('.mob-day-card').forEach(function(c) { c.classList.remove('active'); });
          cityMarkerObjs.forEach(function(obj) { obj.marker.map = map; });
          document.getElementById('panel').classList.remove('open');
        }
      });
    }

    function initTabs() {
      var tabs = document.querySelectorAll('.panel-tab');
      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          tabs.forEach(function(t) { t.classList.remove('active'); });
          document.querySelectorAll('.panel-content').forEach(function(c) { c.classList.remove('active'); });
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
      });
    }

    // ===== STORAGE =====
    function saveToStorage() {
      db.collection('trips').doc(currentTripKey).set({
        data: JSON.stringify(trips[currentTripKey]),
        citySettings: JSON.stringify(citySettings),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(function(e) { console.warn('Firestore save failed:', e); });
      localStorage.setItem('current_trip_key', currentTripKey);
    }

    function loadFromStorage(callback) {
      var savedKey = localStorage.getItem('current_trip_key');
      if (savedKey && trips[savedKey]) { currentTripKey = savedKey; }
      db.collection('trips').doc(currentTripKey).get().then(function(doc) {
        if (doc.exists) {
          var data = doc.data();
          if (data.data) {
            var parsed = JSON.parse(data.data);
            trips[currentTripKey] = parsed;
          }
          if (data.citySettings) {
            var pc = JSON.parse(data.citySettings);
            Object.keys(pc).forEach(function(key) { citySettings[key] = pc[key]; });
          }
          if (data.cardPhotos) {
            var remote = JSON.parse(data.cardPhotos);
            Object.keys(remote).forEach(function(key) { cardPhotos[key] = remote[key]; });
            try { localStorage.setItem('card_photos', JSON.stringify(cardPhotos)); } catch(e) {}
          }
        }
        if (callback) { callback(); }
      }).catch(function(e) {
        console.warn('Firestore load failed, using defaults:', e);
        if (callback) { callback(); }
      });
    }

    function setupRealtimeSync() {
      db.collection('trips').doc(currentTripKey).onSnapshot(function(doc) {
        if (doc.exists) {
          var data = doc.data();
          if (data && data.data) {
            var parsed = JSON.parse(data.data);
            trips[currentTripKey] = parsed;
            currentTrip = trips[currentTripKey];
            if (data.cardPhotos) {
              var remote = JSON.parse(data.cardPhotos);
              Object.keys(remote).forEach(function(key) { cardPhotos[key] = remote[key]; });
              try { localStorage.setItem('card_photos', JSON.stringify(cardPhotos)); } catch(e) {}
            }
            rebuildTimeline();
            rebuildMobStrip();
            if (cityMarkerObjs.length === 0) {
              setTimeout(function() {
                map.panBy(1, 0);
                setTimeout(function() {
                  map.panBy(-1, 0);
                  addCityMarkers();
                }, 100);
              }, 500);
            }
            if (currentView === 'itinerary') { renderItinerary(); }
            if (currentView === 'cards') { renderKanban(); }
            if (currentView === 'split') { renderSplit(); }
            if (currentView === 'budget') { renderBudget(); }
            if (currentView === 'food') { renderFood(); }
            if (currentView === 'calendar') { renderCalendar(); }
          }
        }
      });
    }
  </script>

  <!-- MOBILE DAY PILL -->
  <div id="mob-day-pill">
    <button class="mob-pill-arrow" id="mob-pill-prev">‹</button>
    <div id="mob-pill-center">
      <div id="mob-pill-day">Day 1 · Sat May 9</div>
      <div id="mob-pill-city">🏙️ Bangkok</div>
    </div>
    <button class="mob-pill-arrow" id="mob-pill-next">›</button>
  </div>

  <!-- MOBILE DAY SUMMARY -->
  <div id="mob-day-summary">
    <div id="mob-day-summary-head">
      <div id="mob-day-summary-emoji">🏙️</div>
      <div id="mob-day-summary-title">
        <div id="mob-day-summary-daynum">Day 1 · Sat May 9</div>
        <div id="mob-day-summary-city">Bangkok</div>
      </div>
      <button onclick="closeMobDaySummary()" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--sand-dark);background:var(--sand);cursor:pointer;font-size:12px;color:var(--ink-muted);">×</button>
    </div>
    <div id="mob-day-summary-body"></div>
    <button id="mob-day-summary-edit" onclick="closeMobDaySummary();openDayPanel(currentTrip.days[mobPillIndex])">Edit day →</button>
  </div>

  <!-- MOBILE PIN BOTTOM SHEET -->
  <div id="mob-pin-sheet">
    <div id="mob-pin-sheet-handle"></div>
    <img id="mob-pin-sheet-img" src="" style="display:none;">
    <div id="mob-pin-sheet-body">
      <div id="mob-pin-sheet-name"></div>
      <div id="mob-pin-sheet-note"></div>
      <div id="mob-pin-sheet-actions">
        <a id="mob-pin-sheet-maps" href="" target="_blank" class="mob-pin-action primary">📍 Open in Maps</a>
        <button class="mob-pin-action" onclick="closeMobPinSheet()">✕ Close</button>
      </div>
    </div>
  </div>

  <div id="map-float-card">
    <button id="map-float-card-close" onclick="closeMapFloatCard()">×</button>
    <img id="map-float-card-img" src="" style="display:none;">
    <div id="map-float-card-body">
      <div id="map-float-card-name"></div>
      <div id="map-float-card-note"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <a id="map-float-card-link" href="" target="_blank" style="flex:1;">📍 Open in Maps</a>
        <button id="map-float-card-edit" onclick="openFloatCardEdit()" style="font-family:inherit;font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:none;color:var(--accent);cursor:pointer;white-space:nowrap;display:none;">✏️ Edit</button>
      </div>
    </div>
  </div>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXFs5TVkOdKJciflCTQmX2vH9FwWTqfz8&callback=initMap&loading=async&libraries=places,marker" async defer></script>
