<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shane &amp; Cheryl&#39;s Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #1C2A24; --sand-dark: #24332B; --ink: #E8F0EB; --ink-light: #B0C4B8;
      --ink-muted: #6B8A78; --white: #111A15; --accent: #2D9E75; --accent-light: #1A3D2E;
      --warn: #E67E22; --danger: #E05555;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.35);
      --card-shadow-hover: 0 6px 24px rgba(0,0,0,0.5);
      --radius: 14px; --radius-sm: 8px;
      --accent-h: 158; --accent-s: 56%; --accent-l: 40%;
    }
    body.theme-light {
      --sand: #F0EDE8; --sand-dark: #E0DDD6; --ink: #1A1A18; --ink-light: #4A4A45;
      --ink-muted: #9A9A92; --white: #FAFAF8; --accent: #2D9E75; --accent-light: #E1F5EE;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --card-shadow-hover: 0 6px 24px rgba(0,0,0,0.14);
    }
    body.theme-travel {
      --sand: #2A1F1A; --sand-dark: #352820; --ink: #F5EDE6; --ink-light: #D4B8A8;
      --ink-muted: #8A6A58; --white: #1A1210; --accent: #E07040; --accent-light: #3D2010;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.4);
      --card-shadow-hover: 0 6px 24px rgba(0,0,0,0.55);
    }

    html, body { height: 100%; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: var(--ink); overflow: hidden; background: var(--white); }

    /* ===== DESKTOP HEADER ===== */
    #hdr {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 3000;
      background: var(--white); border-bottom: 1px solid var(--sand-dark);
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
      backdrop-filter: blur(12px);
    }
    .brand { font-size: 14px; font-weight: 800; color: var(--ink); white-space: nowrap; flex-shrink: 0; letter-spacing: -0.02em; }
    .brand span { color: var(--accent); }
    .hdr-sep { width: 1px; height: 18px; background: var(--sand-dark); flex-shrink: 0; opacity: 0.6; }
    .trip-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .trip-wrap label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); white-space: nowrap; font-weight: 600; }
    #tripSel { font-family: inherit; font-size: 12px; font-weight: 600; border: 1px solid var(--sand-dark); background: var(--sand); border-radius: var(--radius-sm); padding: 5px 10px; color: var(--ink); cursor: pointer; outline: none; max-width: 160px; transition: border-color 0.15s; }
    #tripSel:focus { border-color: var(--accent); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .view-switcher { display: flex; align-items: center; gap: 2px; background: var(--sand); border: 1px solid var(--sand-dark); border-radius: 10px; padding: 3px; }
    .view-btn { font-family: inherit; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 7px; border: none; background: none; color: var(--ink-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; letter-spacing: -0.01em; }
    .view-btn:hover { color: var(--ink); background: var(--sand-dark); }
    .view-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .theme-switcher { display: flex; align-items: center; gap: 2px; background: var(--sand); border: 1px solid var(--sand-dark); border-radius: 10px; padding: 3px; }
    .theme-btn { font-family: inherit; font-size: 11px; font-weight: 600; padding: 5px 8px; border-radius: 7px; border: none; background: none; cursor: pointer; transition: all 0.2s; color: var(--ink-muted); }
    .theme-btn:hover { color: var(--ink); }
    .theme-btn.active { background: var(--white); box-shadow: 0 2px 6px rgba(0,0,0,0.15); color: var(--ink); }
    .hamburger-btn { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--sand-dark); background: var(--sand); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0; transition: all 0.15s; }
    .hamburger-btn span { display: block; width: 14px; height: 1.5px; background: var(--ink-muted); border-radius: 2px; transition: background 0.15s; }
    .hamburger-btn:hover { background: var(--sand-dark); }
    .hamburger-btn:hover span { background: var(--ink); }

    /* ===== CUSTOM THEME SLIDERS ===== */
    #custom-theme-panel {
      display: none; position: fixed; top: 62px; right: 14px; z-index: 4500;
      background: var(--white); border: 1px solid var(--sand-dark);
      border-radius: var(--radius); padding: 16px; width: 240px;
      box-shadow: var(--card-shadow-hover);
    }
    #custom-theme-panel.open { display: block; }
    .slider-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; display: block; }
    .slider-wrap { margin-bottom: 16px; }
    .slider-wrap:last-child { margin-bottom: 0; }
    .theme-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
    #slider-base { background: linear-gradient(to right, #FAFAF8, #111A15); }
    #slider-accent { background: linear-gradient(to right, #e74c3c, #e67e22, #f1c40f, #2ecc71, #1abc9c, #3498db, #9b59b6, #e74c3c); }
    .theme-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--white); border: 2px solid var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; }
    .theme-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--white); border: 2px solid var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; border: none; }
    .slider-preview { width: 100%; height: 28px; border-radius: var(--radius-sm); margin-top: 8px; border: 1px solid var(--sand-dark); }

    /* ===== MOBILE HEADER ===== */
    #mob-hdr {
      display: none; position: fixed; top: 0; left: 0; right: 0; height: 54px; z-index: 3000;
      background: var(--white); border-bottom: 1px solid var(--sand-dark);
      align-items: center; padding: 0 14px; gap: 10px;
      backdrop-filter: blur(12px);
    }
    .mob-brand { font-size: 13px; font-weight: 800; color: var(--ink); flex: 1; letter-spacing: -0.02em; white-space: nowrap; }
    .mob-brand span { color: var(--accent); }
    .mob-grid-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--sand-dark); background: var(--sand); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.15s; }
    .mob-grid-btn:hover { background: var(--sand-dark); }
    .mob-hamburger-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--sand-dark); background: var(--sand); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0; }
    .mob-hamburger-btn span { display: block; width: 14px; height: 1.5px; background: var(--ink-muted); border-radius: 2px; }

    /* ===== DROPDOWN MENUS ===== */
    #hamburger-menu, #mob-view-menu, #mob-hamburger-menu {
      display: none; position: fixed; z-index: 4000; background: var(--white);
      border: 1px solid var(--sand-dark); border-radius: var(--radius);
      box-shadow: var(--card-shadow-hover); min-width: 210px; overflow: hidden;
    }
    #hamburger-menu { top: 62px; right: 14px; }
    #mob-view-menu { top: 60px; right: 58px; min-width: 170px; }
    #mob-hamburger-menu { top: 60px; right: 14px; }
    #hamburger-menu.open, #mob-view-menu.open, #mob-hamburger-menu.open { display: block; animation: menuFadeIn 0.15s ease; }
    @keyframes menuFadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .menu-section { padding: 6px 0; border-bottom: 1px solid var(--sand-dark); }
    .menu-section:last-child { border-bottom: none; }
    .menu-section-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); padding: 8px 14px 4px; font-weight: 700; }
    .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; transition: background 0.12s; border: none; background: none; width: 100%; font-family: inherit; text-align: left; }
    .menu-item:hover { background: var(--sand); }
    .menu-item.active { color: var(--accent); font-weight: 700; }
    .menu-item.danger { color: var(--danger); }

    /* ===== DESKTOP LAYOUT ===== */
    #map { position: fixed; top: 56px; left: 0; right: 0; bottom: 100px; z-index: 1; height: calc(100vh - 56px - 100px); }
    #tl {
      position: fixed; bottom: 0; left: 0; right: 0; height: 100px; z-index: 3000;
      background: var(--white); border-top: 1px solid var(--sand-dark);
      overflow-x: auto; overflow-y: hidden; display: flex; align-items: stretch;
      scrollbar-width: thin; cursor: grab;
    }
    #tl.dragging { cursor: grabbing; }
    #tl::-webkit-scrollbar { height: 3px; }
    #tl::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; opacity: 0.4; }
    #tl-inner { display: flex; align-items: stretch; min-width: max-content; padding: 0; }
    .day-card {
      display: flex; flex-direction: column; justify-content: center;
      padding: 10px 16px; cursor: pointer; position: relative;
      border-right: 1px solid var(--sand-dark); width: 170px;
      transition: background 0.15s; user-select: none; flex-shrink: 0;
      background: var(--white);
    }
    .day-card:last-child { border-right: none; }
    .day-card:hover { background: var(--sand); }
    .day-card.active { background: var(--sand); }
    .day-card.active::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); border-radius: 0 0 2px 2px; }
    .dc-num { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 3px; font-weight: 700; }
    .dc-city { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 3px; letter-spacing: -0.01em; }
    .dc-note { font-size: 10px; color: var(--ink-muted); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ===== PANEL ===== */
    #panel {
      position: fixed; top: 56px; right: 0; width: 370px; bottom: 100px;
      background: var(--white); border-left: 1px solid var(--sand-dark);
      z-index: 2000; transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #panel.open { transform: translateX(0); }
    #panel-head { padding: 16px 16px 0; position: relative; flex-shrink: 0; }
    #panel-close {
      position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
      border-radius: 50%; border: 1px solid var(--sand-dark); background: var(--sand);
      cursor: pointer; font-size: 12px; color: var(--ink-muted);
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    #panel-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    #panel-body { overflow-y: auto; flex: 1; scrollbar-width: thin; }
    #panel-body::-webkit-scrollbar { width: 3px; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
    .panel-day-num { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; font-weight: 700; }
    .panel-city { font-size: 22px; font-weight: 800; color: var(--ink); margin-bottom: 2px; letter-spacing: -0.02em; }
    .panel-note { font-size: 13px; color: var(--ink-light); line-height: 1.6; }
    .panel-tabs { display: flex; border-bottom: 1px solid var(--sand-dark); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; margin-top: 12px; }
    .panel-tabs::-webkit-scrollbar { display: none; }
    .panel-tab { flex-shrink: 0; padding: 10px 12px; font-size: 11px; font-weight: 700; text-align: center; cursor: pointer; color: var(--ink-muted); border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; white-space: nowrap; letter-spacing: 0.01em; }
    .panel-tab:hover { color: var(--ink); }
    .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .panel-content { display: none; padding: 16px; }
    .panel-content.active { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ===== SPLIT FLOAT CARD ===== */
    #split-float-card {
      display: none; position: absolute; z-index: 2000;
      bottom: 20px; left: 16px; width: 230px;
      background: var(--white); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--card-shadow-hover); border: 1px solid var(--sand-dark);
      animation: fadeInUp 0.2s ease; pointer-events: all;
    }
    #split-float-card.open { display: block; }
    #split-float-card img { width:100%; height:120px; object-fit:cover; display:block; }
    #split-float-card-body { padding: 12px 14px; }
    #split-float-card-name { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.3; letter-spacing: -0.01em; }
    #split-float-card-note { font-size: 11px; color: var(--ink-muted); font-style: italic; margin-bottom: 8px; }
    #split-float-card-link { font-size: 11px; color: var(--accent); text-decoration: none; font-weight: 600; }
    #split-float-card-close { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.45); border: none; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ===== MAP FLOAT CARD ===== */
    #map-float-card {
      display: none; position: fixed; z-index: 2000;
      bottom: 110px; left: 16px; width: 240px;
      background: var(--white); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--card-shadow-hover); border: 1px solid var(--sand-dark);
      animation: fadeInUp 0.2s ease;
    }
    @media (max-width: 640px) {
      #map-float-card { bottom: 82px; left: 50%; transform: translateX(-50%); width: 280px; z-index: 2600; }
    }
    #map-float-card.open { display: block; }
    #map-float-card img { width:100%; height:120px; object-fit:cover; display:block; }
    #map-float-card-body { padding: 12px 14px; }
    #map-float-card-name { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.3; letter-spacing: -0.01em; }
    #map-float-card-note { font-size: 11px; color: var(--ink-muted); font-style: italic; margin-bottom: 8px; }
    #map-float-card-link { font-size: 11px; color: var(--accent); text-decoration: none; font-weight: 600; }
    #map-float-card-close { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.45); border: none; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1; }
    @media (min-width: 641px) {
      #map-float-card { bottom: 120px; width: 260px; }
    }

    /* ===== INLINE EDIT ===== */
    .inline-edit { border: none; background: transparent; font-family: inherit; color: inherit; outline: none; width: 100%; cursor: text; padding: 2px 6px; border-radius: var(--radius-sm); transition: background 0.15s; }
    .inline-edit:hover { background: var(--sand); }
    .inline-edit:focus { background: var(--sand); outline: 1px solid var(--accent); }

    /* ===== FORMS & BUTTONS ===== */
    .marker-edit-form { background: var(--sand); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; border: 1px solid var(--sand-dark); }
    .marker-edit-form label { display: block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; margin-top: 10px; font-weight: 700; }
    .marker-edit-form label:first-child { margin-top: 0; }
    .marker-edit-form input[type="text"] { width: 100%; font-family: inherit; font-size: 20px; padding: 8px 10px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--white); color: var(--ink); outline: none; text-align: center; }
    .marker-edit-form input[type="color"] { width: 100%; height: 38px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); cursor: pointer; padding: 2px; background: var(--white); }
    .save-marker-btn { width: 100%; margin-top: 12px; font-family: inherit; font-size: 12px; font-weight: 700; padding: 9px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s; }
    .save-marker-btn:hover { opacity: 0.85; }
    .edit-marker-toggle { font-family: inherit; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--sand-dark); background: var(--sand); color: var(--ink-muted); cursor: pointer; margin-top: 8px; display: inline-block; transition: all 0.15s; }
    .edit-marker-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .add-btn { display: flex; align-items: center; gap: 6px; font-family: inherit; font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px dashed var(--sand-dark); background: none; color: var(--ink-muted); cursor: pointer; width: 100%; margin-top: 10px; transition: all 0.15s; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* ===== SEARCH ===== */
    .search-box { display: none; margin-top: 10px; }
    .search-box.open { display: block; }
    .search-input { width: 100%; font-family: inherit; font-size: 13px; padding: 9px 12px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.15s; }
    .search-input:focus { border-color: var(--accent); background: var(--white); }
    .search-results { margin-top: 6px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); overflow: hidden; display: none; box-shadow: var(--card-shadow); }
    .search-results.open { display: block; }
    .search-result-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--sand-dark); background: var(--white); transition: background 0.12s; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--sand); }
    .search-result-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .search-result-address { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

    /* ===== TRANSPORT TAB ===== */
    .transport-card { background: var(--sand); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; border: 1px solid var(--sand-dark); position: relative; transition: box-shadow 0.15s; }
    .transport-card:hover { box-shadow: var(--card-shadow); }
    .transport-card-type { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
    .transport-card-route { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; }
    .transport-card-detail { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
    .transport-form { background: var(--sand); border-radius: var(--radius-sm); padding: 14px; border: 1px solid var(--sand-dark); margin-top: 10px; }
    .transport-form label { display: block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 3px; margin-top: 10px; font-weight: 700; }
    .transport-form label:first-child { margin-top: 0; }
    .transport-form input, .transport-form select { width: 100%; font-family: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--white); color: var(--ink); outline: none; transition: border-color 0.15s; }
    .transport-form input:focus, .transport-form select:focus { border-color: var(--accent); }
    .transport-row { display: flex; gap: 8px; }
    .transport-row > div { flex: 1; }

    /* ===== MODAL ===== */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    #modal-overlay.open { display: flex; animation: menuFadeIn 0.15s ease; }
    #modal { background: var(--white); border-radius: var(--radius); padding: 24px; width: 340px; max-width: 90vw; border: 1px solid var(--sand-dark); box-shadow: var(--card-shadow-hover); }
    #modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 16px; color: var(--ink); letter-spacing: -0.02em; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 5px; font-weight: 700; }
    .modal-field input { width: 100%; font-family: inherit; font-size: 13px; padding: 9px 12px; border: 1px solid var(--sand-dark); border-radius: var(--radius-sm); background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.15s; }
    .modal-field input:focus { border-color: var(--accent); background: var(--white); }
    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }

    // ===== KANBAN MOBILE =====
    function getInitialCardDay() {
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var months = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };
      var tripDates = currentTrip.days.map(function(day) {
        var parts = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var month = months[parts[0]]; var date = parseInt(parts[1]);
        var d = new Date(2026, month, date); d.setHours(0,0,0,0); return d;
      });
      var lastDate = tripDates[tripDates.length - 1];
      var twoDaysAfter = new Date(lastDate); twoDaysAfter.setDate(twoDaysAfter.getDate() + 2);
      if (today > twoDaysAfter) { return 0; }
      for (var i = 0; i < tripDates.length; i++) {
        if (tripDates[i].getTime() === today.getTime()) { return i; }
      }
      if (today < tripDates[0]) { return 0; }
      return 0;
    }

          return '<div style="background:var(--white);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--sand-dark);box-shadow:var(--card-shadow);">' +
            photoHtml +
            '<div style="padding:12px 14px;">' +
              '<div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;font-weight:700;">' + cat + '</div>' +
              '<div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;letter-spacing:-0.01em;">' + activity + '</div>' +

              '<button class="kbtn" onclick="openKanbanNote(' + dayIndex + ',' + actIndex + ')">📝 Note</button>' +
              '<button class="kbtn" onclick="triggerPhotoUpload(\'' + photoKey + '\',' + dayIndex + ',' + actIndex + ')">📷</button>' +
              '<button class="kbtn" onclick="editItinDay(' + dayIndex + ')">Edit</button>' +

        }).join('') : '<div style="padding:20px;text-align:center;color:var(--ink-muted);font-style:italic;font-size:13px;">No activities for this day</div>';

        var foodCardsHtml = item.food.length ? '<div style="margin-top:6px;"><div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;font-weight:700;padding:0 2px;">Food & Drinks</div>' + item.food.map(function(f, fi) {

            ? '<img style="width:100%;height:290px;object-fit:cover;display:block;" src="' + savedFoodPhoto + '">'

          var reservationBadge = f.reservationRequired
            ? '<div style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:6px;' + (f.reservationBooked ? 'background:#1A3D2E;color:#2D9E75;' : 'background:#3D1A1A;color:#E05555;') + '">' + (f.reservationBooked ? '✅ Reservation booked' : '⚠️ Reservation needed') + '</div>'
            : '';
          var linkBtn = f.link ? '<a href="' + f.link + '" target="_blank" style="text-decoration:none;"><button class="kbtn">🔗 Link</button></a>' : '';
          return '<div style="background:var(--white);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--sand-dark);box-shadow:var(--card-shadow);">' +
            foodPhotoHtml +
            '<div style="padding:12px 14px;">' +
              '<div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px;font-weight:700;">food</div>' +

    function mobCardsGoTo(index, animate) {
      var track = document.getElementById('mob-cards-track');
      if (!track) return;
      if (animate === false) {
        track.style.transition = 'none';
      } else {
        var currentIndex = mobCardsCurrentIndex;
        var distance = Math.abs(index - currentIndex);
        var duration = Math.min(150 + distance * 80, 480);
        track.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.25,0.46,0.45,0.94)';
      }
      track.style.transform = 'translateX(-' + (index * 100) + '%)';
      mobCardsCurrentIndex = index;
      var indicator = document.getElementById('mob-cards-indicator-text');
      var dateEl = document.getElementById('mob-cards-indicator-date');
      var day = currentTrip.days[index];
      if (indicator) { indicator.textContent = 'Day ' + day.day + ' of ' + currentTrip.days.length; }
      if (dateEl) { dateEl.textContent = day.date + ' · ' + day.city.split('>').pop().trim(); }
      document.querySelectorAll('.mob-cards-dot').forEach(function(dot, i) {
        dot.classList.toggle('active', i === index);
      });
    }

    function initMobDotsSwipe() {
      var dotsEl = document.getElementById('mob-cards-dots');
      if (!dotsEl) return;
      var startX, isDragging = false, lastIndex = -1;

      function getIndexFromTouch(clientX) {
        var rect = dotsEl.getBoundingClientRect();
        var total = currentTrip.days.length;
        var pct = (clientX - rect.left) / rect.width;
        var idx = Math.round(pct * (total - 1));
        return Math.max(0, Math.min(total - 1, idx));
      }

      dotsEl.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        isDragging = true;
        lastIndex = -1;
      }, { passive: true });

      dotsEl.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var idx = getIndexFromTouch(e.touches[0].clientX);
        if (idx !== lastIndex) {
          lastIndex = idx;
          mobCardsGoTo(idx, true);
        }
      }, { passive: true });

      dotsEl.addEventListener('touchend', function() {
        isDragging = false;
        lastIndex = -1;
      });

      dotsEl.addEventListener('click', function(e) {
        var idx = getIndexFromTouch(e.clientX);
        mobCardsGoTo(idx, true);
      });
    }

    function initMobCardsSwipe() {
      var wrap = document.getElementById('mob-cards-track-wrap');
      if (!wrap) return;
      var startX, startY, diffX = 0, isDragging = false, isHorizontal = null;
      var velocitySamples = [], lastX, lastTime;

      wrap.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        lastX = startX; lastTime = Date.now();
        diffX = 0; isDragging = true; isHorizontal = null;
        velocitySamples = [];
        var track = document.getElementById('mob-cards-track');
        track.style.transition = 'none';
      }, { passive: true });

      wrap.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var currentX = e.touches[0].clientX;
        diffX = currentX - startX;
        var diffY = e.touches[0].clientY - startY;
        if (isHorizontal === null) { isHorizontal = Math.abs(diffX) > Math.abs(diffY); }
        if (!isHorizontal) return;
        e.preventDefault();
        var now = Date.now();
        var dt = now - lastTime;
        if (dt > 0) {
          velocitySamples.push((currentX - lastX) / dt);
          if (velocitySamples.length > 5) { velocitySamples.shift(); }
        }
        lastX = currentX; lastTime = now;
        var track = document.getElementById('mob-cards-track');
        track.style.transform = 'translateX(calc(-' + (mobCardsCurrentIndex * 100) + '% + ' + diffX + 'px))';
      }, { passive: false });

      wrap.addEventListener('touchend', function() {
        if (!isDragging || !isHorizontal) { isDragging = false; return; }
        isDragging = false;
        var total = currentTrip.days.length;
        var slideWidth = wrap.offsetWidth;
        var threshold = slideWidth * 0.25;
        var avgVelocity = 0;
        if (velocitySamples.length > 0) {
          avgVelocity = velocitySamples.reduce(function(a, b) { return a + b; }, 0) / velocitySamples.length;
        }
        var delta = 0;
        if (Math.abs(avgVelocity) > 0.3 || Math.abs(diffX) > threshold) {
          delta = (avgVelocity < 0 || diffX < 0) ? 1 : -1;
        }
        var target = Math.max(0, Math.min(total - 1, mobCardsCurrentIndex + delta));
        mobCardsGoTo(target, true);
      });
    }

    document.addEventListener('click', function(e) {
      var triggers = ['hamburger-btn','mob-grid-btn','mob-ham-btn'];
      var menus = ['hamburger-menu','mob-view-menu','mob-hamburger-menu'];
      var clickedTrigger = triggers.some(function(id) {
        var el = document.getElementById(id);
        return el && el.contains(e.target);
      });
      var clickedMenu = menus.some(function(id) {
        var el = document.getElementById(id);
        return el && el.contains(e.target);
      });
      if (!clickedTrigger && !clickedMenu) {
        menus.forEach(function(id) { document.getElementById(id).classList.remove('open'); });
      }
    });

    function showMobTripSelector() {
      toggleMenu('mob-hamburger-menu');
      var opts = Object.keys(trips).map(function(key) {
        return '<option value="' + key + '"' + (key === currentTripKey ? ' selected' : '') + '>' + trips[key].name + '</option>';

    function showRenameTripModal() {

      var ratesInfo = '';

        function() {

    // ===== TRIP SELECTOR =====
    function populateTripSelector() {
      var sel = document.getElementById('tripSel');
      if (sel) {
        sel.innerHTML = '';
        Object.keys(trips).forEach(function(key) {
          var opt = document.createElement('option');
          opt.value = key; opt.textContent = trips[key].name;
          if (key === currentTripKey) { opt.selected = true; }
          sel.appendChild(opt);
        });
      }
      updateMobTripLabel();
    }

    function updateMobTripLabel() {
      var lbl = document.getElementById('mob-trip-label');
      if (lbl) { lbl.textContent = '🗺 ' + (currentTrip ? currentTrip.name : ''); }
    }

    function switchTrip(key) {
      if (!trips[key]) return;
      currentTripKey = key; currentTrip = trips[key]; currentDayItem = null;
      document.getElementById('panel').classList.remove('open');
      closeMobDaySummary();
      clearActivityMarkers();
      cityMarkerObjs.forEach(function(obj) { obj.marker.map = null; });
      cityMarkerObjs = [];
      rebuildTimeline(); rebuildMobStrip(); addCityMarkers();
      updateMobTripLabel();
      if (currentView === 'itinerary') { renderItinerary(); }
      if (currentView === 'cards') { renderKanban(); }
      if (currentView === 'split') { renderSplit(); }
      if (currentView === 'budget') { renderBudget(); }
    }

    // ===== TIMELINE (desktop) =====
    function rebuildTimeline() {
      var inner = document.getElementById('tl-inner');
      inner.innerHTML = '';
      currentTrip.days.forEach(function(item) {
        var d = document.createElement('div');
        d.className = 'day-card';
        d.innerHTML = '<div class="dc-num">Day ' + item.day + ' | ' + item.date + '</div>' +
          '<div class="dc-city">' + item.city + '</div><div class="dc-note">' + item.note + '</div>';
        inner.appendChild(d);
      });
      reattachCardListeners();
    }

    function reattachCardListeners() {
      var cards = document.querySelectorAll('.day-card');
      cards.forEach(function(card, index) {
        card.addEventListener('click', function() {
          if (tlDragged) return;
          cards.forEach(function(c) { c.classList.remove('active'); });
          card.classList.add('active');
          var item = currentTrip.days[index];
          currentDayItem = item;
          if (currentView === 'map') {
            clearActivityMarkers();
            cityMarkerObjs.forEach(function(obj) { obj.marker.map = null; });
            addActivityMarkers(item, function() {
              if (activityMarkers.length > 0) {
                var bounds = new google.maps.LatLngBounds();
                activityMarkers.forEach(function(obj) { bounds.extend(obj.marker.position); });
                map.fitBounds(bounds, { padding: 80 });
              }
            });
          }
          openDayPanel(item);
        });
      });
    }

    // ===== MOBILE DAY STRIP =====
    function rebuildMobStrip() {
      var strip = document.getElementById('mob-day-strip');
      strip.innerHTML = '';
      currentTrip.days.forEach(function(item, index) {
        var card = document.createElement('div');
        card.className = 'mob-day-card';
        card.dataset.index = index;
        card.innerHTML =
          '<div class="mob-day-card-num">Day ' + item.day + ' · ' + item.date + '</div>' +
          '<div class="mob-day-card-city">' + getCityEmoji(item.city) + ' ' + item.city + '</div>' +
          '<div class="mob-day-card-note">' + (item.note || 'Tap to view details') + '</div>';
        card.addEventListener('click', function() {
          document.querySelectorAll('.mob-day-card').forEach(function(c) { c.classList.remove('active'); });
          card.classList.add('active');
          openDayPanel(item);
          if (currentView === 'map') {
            clearActivityMarkers();
            cityMarkerObjs.forEach(function(obj) { obj.marker.map = null; });
            addActivityMarkers(item, function() {
              if (activityMarkers.length > 0) {
                var bounds = new google.maps.LatLngBounds();
                activityMarkers.forEach(function(obj) { bounds.extend(obj.marker.position); });
                map.fitBounds(bounds, { padding: 60 });
              }
            });
          }
        });
        strip.appendChild(card);
      });
    }

    function openDayPanel(item) {
      currentDayItem = item;
      renderPanelHead(item);
      refreshPanelTabs(item);
      document.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.panel-content').forEach(function(c) { c.classList.remove('active'); });
      document.querySelector('.panel-tab[data-tab="overview"]').classList.add('active');
      document.getElementById('tab-overview').classList.add('active');
      var deleteBtn = document.getElementById('panel-delete-day');
      if (deleteBtn) {
        deleteBtn.onclick = function() {
          var idx = currentTrip.days.indexOf(item);
          if (idx === -1) return;
          showModal('Delete Day ' + item.day,
            '<p style="font-size:13px;color:var(--ink-light);">Delete Day ' + item.day + ' · ' + item.city + '? This cannot be undone.</p>',
            function() {
              currentTrip.days.splice(idx, 1);
              currentTrip.days.forEach(function(d, i) { d.day = i + 1; });
              saveToStorage();
              rebuildTimeline();
              rebuildMobStrip();
              document.getElementById('panel').classList.remove('open');
              if (currentView === 'itinerary') { renderItinerary(); }
              if (currentView === 'cards') { renderKanban(); }
              if (currentView === 'budget') { renderBudget(); }
            }
          );
        };
      }
      document.getElementById('panel').classList.add('open');
    }

    // ===== DAY MANAGEMENT =====
    function addDay() {
      document.getElementById('hamburger-menu').classList.remove('open');
      var lastDay = currentTrip.days[currentTrip.days.length - 1];
      var base = currentTrip.baseCurrency || 'AUD';
      var baseSym = currentTrip.baseCurrencySymbol || '$';
      currentTrip.days.push({ day: lastDay.day + 1, date: 'New day', city: lastDay.city.split('>').pop().trim(), lat: lastDay.lat, lng: lastDay.lng, note: '', accommodation: [], activities: [], activityCategories: [], food: [], transport: [], currency: base, currencySymbol: baseSym });
      saveToStorage(); rebuildTimeline(); rebuildMobStrip();
    }

    function addDayMob() {
      document.getElementById('mob-hamburger-menu').classList.remove('open');

      var base = currentTrip.baseCurrency || 'AUD';

      currentTrip.days.push({ day: lastDay.day + 1, date: 'New day', city: lastDay.city.split('>').pop().trim(), lat: lastDay.lat, lng: lastDay.lng, note: '', accommodation: [], activities: [], activityCategories: [], food: [], transport: [], currency: base, currencySymbol: baseSym });

    function updateDayField(field, value) {
      if (!currentDayItem) return;
      if (field === 'currency') {
        var sel = currencyOptions.find(function(c) { return c.code === value; });
        if (sel) {
          currentDayItem.currency = sel.code;
          currentDayItem.currencySymbol = sel.symbol;
        }
      } else {
        currentDayItem[field] = value;
      }
      saveToStorage(); rebuildTimeline(); rebuildMobStrip();
      var idx = currentTrip.days.indexOf(currentDayItem);
      var cards = document.querySelectorAll('.day-card');
      if (cards[idx]) { cards[idx].classList.add('active'); }
    }

    // ===== VIEW SWITCHING =====
    function setView(view) {
      currentView = view;
      var pill = document.getElementById('mob-day-pill');
      if (pill) { 
        if (view === 'map' && isMobile()) { pill.classList.add('active'); }
        else { pill.classList.remove('active'); }
      }
      document.body.className = document.body.className.replace(/\bview-\S+/g, '').trim() + ' view-' + view;
      document.getElementById('map').style.display = view === 'map' ? 'block' : 'none';
      document.getElementById('view-itinerary').style.display = view === 'itinerary' ? 'block' : 'none';
      document.getElementById('view-cards').style.display = (view === 'cards' && !isMobile()) ? 'block' : 'none';
      document.getElementById('view-split').style.display = view === 'split' ? 'block' : 'none';
      document.getElementById('view-budget').style.display = view === 'budget' ? 'block' : 'none';
      document.getElementById('view-food').style.display = view === 'food' ? 'block' : 'none';
      document.getElementById('view-calendar').style.display = view === 'calendar' ? 'block' : 'none';
      var mobCards = document.getElementById('mob-cards-view');
      if (mobCards) { 
        if (view === 'cards' && isMobile()) { mobCards.classList.add('active'); renderMobCards(); }
        else { mobCards.classList.remove('active'); }
      }
      document.getElementById('panel').classList.remove('open');
      closeMobDaySummary();
      closeMapFloatCard();
      closeSplitFloatCard();

      document.querySelectorAll('.view-btn').forEach(function(btn) { btn.classList.remove('active'); });
      document.querySelectorAll('.view-btn').forEach(function(btn) {
        if (btn.textContent.toLowerCase().indexOf(view) !== -1) { btn.classList.add('active'); }
      });
      document.querySelectorAll('#mob-view-menu .menu-item').forEach(function(item) {
        item.classList.toggle('active', item.textContent.toLowerCase().indexOf(view) !== -1);
      });

      if (view === 'cards') { renderKanban(); }
      if (view === 'split') { renderSplit(); }
      if (view === 'budget') { renderBudget(); }
      if (view === 'food') { renderFood(); }
      if (view === 'calendar') { renderCalendar(); }

    function setTheme(theme) {
      var viewClass = 'view-' + currentView;
      document.body.className = 'theme-' + theme + ' ' + viewClass;
      document.querySelectorAll('.theme-btn').forEach(function(btn) { btn.classList.remove('active'); });

      if (activeBtn) { activeBtn.classList.add('active'); }
      localStorage.setItem('theme', theme);

    function resetMapView() {

      document.querySelectorAll('.day-card').forEach(function(c) { c.classList.remove('active'); });
      document.querySelectorAll('.mob-day-card').forEach(function(c) { c.classList.remove('active'); });
      cityMarkerObjs.forEach(function(obj) { obj.marker.map = map; });
      document.getElementById('panel').classList.remove('open');
      var bounds = new google.maps.LatLngBounds();
      bounds.extend({ lat: 19.9105, lng: 99.8406 });
      bounds.extend({ lat: 13.7563, lng: 100.5018 });

    function toggleCustomTheme() {
      document.getElementById('custom-theme-panel').classList.toggle('open');
    }

    function applyCustomTheme(base, hue) {
      // base: 0=dark, 100=light
      var isDark = base < 50;
      var bgL = isDark ? (5 + base * 0.3) : (88 + base * 0.12);
      var sandL = isDark ? (8 + base * 0.35) : (85 + base * 0.12);
      var sandDarkL = isDark ? (12 + base * 0.4) : (80 + base * 0.12);
      var inkL = isDark ? (85 + base * 0.1) : (10 + base * 0.1);
      var inkLightL = isDark ? (65 + base * 0.1) : (25 + base * 0.15);
      var inkMutedL = isDark ? (45 + base * 0.1) : (45 + base * 0.15);
      var accentL = isDark ? 55 : 40;
      var accentLightL = isDark ? 18 : 88;

      var r = document.documentElement;
      r.style.setProperty('--white', 'hsl(' + hue + ',12%,' + bgL + '%)');
      r.style.setProperty('--sand', 'hsl(' + hue + ',14%,' + sandL + '%)');
      r.style.setProperty('--sand-dark', 'hsl(' + hue + ',14%,' + sandDarkL + '%)');
      r.style.setProperty('--ink', 'hsl(' + hue + ',8%,' + inkL + '%)');
      r.style.setProperty('--ink-light', 'hsl(' + hue + ',8%,' + inkLightL + '%)');
      r.style.setProperty('--ink-muted', 'hsl(' + hue + ',8%,' + inkMutedL + '%)');
      r.style.setProperty('--accent', 'hsl(' + hue + ',56%,' + accentL + '%)');
      r.style.setProperty('--accent-light', 'hsl(' + hue + ',40%,' + accentLightL + '%)');
      r.style.setProperty('--card-shadow', isDark ? '0 2px 12px rgba(0,0,0,0.35)' : '0 2px 12px rgba(0,0,0,0.08)');
      r.style.setProperty('--card-shadow-hover', isDark ? '0 6px 24px rgba(0,0,0,0.5)' : '0 6px 24px rgba(0,0,0,0.14)');

      document.getElementById('preview-base').style.background = 'hsl(' + hue + ',12%,' + bgL + '%)';
      document.getElementById('preview-accent').style.background = 'hsl(' + hue + ',56%,' + accentL + '%)';

      localStorage.setItem('custom-base', base);
      localStorage.setItem('custom-hue', hue);
      localStorage.setItem('theme', 'custom');

      var viewClass = 'view-' + currentView;
      document.body.className = 'theme-custom ' + viewClass;
      document.querySelectorAll('.theme-btn').forEach(function(btn) { btn.classList.remove('active'); });
      var customBtn = document.getElementById('custom-theme-btn');
      if (customBtn) { customBtn.classList.add('active'); }
    }

    function initCustomThemeSliders() {
      var sliderBase = document.getElementById('slider-base');
      var sliderAccent = document.getElementById('slider-accent');
      if (!sliderBase || !sliderAccent) return;
      var savedBase = localStorage.getItem('custom-base');
      var savedHue = localStorage.getItem('custom-hue');
      if (savedBase !== null) { sliderBase.value = savedBase; }
      if (savedHue !== null) { sliderAccent.value = savedHue; }
      sliderBase.addEventListener('input', function() {
        applyCustomTheme(parseInt(sliderBase.value), parseInt(sliderAccent.value));
      });
      sliderAccent.addEventListener('input', function() {
        applyCustomTheme(parseInt(sliderBase.value), parseInt(sliderAccent.value));
      });
      // update previews on load
      var b = parseInt(sliderBase.value), h = parseInt(sliderAccent.value);
      var bgL = b < 50 ? (5 + b * 0.3) : (88 + b * 0.12);
      var accentL = b < 50 ? 55 : 40;
      document.getElementById('preview-base').style.background = 'hsl(' + h + ',12%,' + bgL + '%)';
      document.getElementById('preview-accent').style.background = 'hsl(' + h + ',56%,' + accentL + '%)';
    }

    // ===== TRANSPORT TAB =====
    function normaliseDayTransport(item) {
      if (!item.transport) { item.transport = []; }
    }

    function renderTransportTab(item) {
      normaliseDayTransport(item);
      var listHtml = item.transport.length
        ? item.transport.map(function(t, i) {
            return '<div class="transport-card">' +
              '<div class="transport-card-type">' + (t.type || 'Transport') + '</div>' +
              '<div class="transport-card-route">' +
                '<span>' + (t.from || '—') + '</span>' +
                '<span style="color:var(--ink-muted);font-size:12px;">→</span>' +
                '<span>' + (t.to || '—') + '</span>' +
              '</div>' +
              (t.carrier ? '<div class="transport-card-detail">' + t.carrier + (t.flightNum ? ' · ' + t.flightNum : '') + '</div>' : '') +

    function toggleTransportForm() {

    function saveTransport() {
      if (!currentDayItem) return;
      normaliseDayTransport(currentDayItem);
      currentDayItem.transport.push({
        type: document.getElementById('tf-type').value,
        from: document.getElementById('tf-from').value.trim(),
        to: document.getElementById('tf-to').value.trim(),
        carrier: document.getElementById('tf-carrier').value.trim(),
        flightNum: document.getElementById('tf-num').value.trim(),
        depart: document.getElementById('tf-depart').value.trim(),
        arrive: document.getElementById('tf-arrive').value.trim(),
        notes: document.getElementById('tf-notes').value.trim()
      });
      saveToStorage();
      document.getElementById('tab-transport').innerHTML = renderTransportTab(currentDayItem);

    function deleteTransport(index) {
      if (!currentDayItem) return;
      normaliseDayTransport(currentDayItem);

    // ===== CALENDAR VIEW =====
    function renderCalendar() {
      var el = document.getElementById('view-calendar');
      var today = new Date(); today.setHours(0,0,0,0);

      // build a map of date string -> day item
      var months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
      var dayMap = {};
      currentTrip.days.forEach(function(day) {
        var parts = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var m = months[parts[0]]; var d = parseInt(parts[1]);
        if (!isNaN(m) && !isNaN(d)) {
          var key = '2026-' + m + '-' + d;
          dayMap[key] = day;
        }
      });

      // find unique months in trip
      var tripMonths = [];
      var seen = {};
      currentTrip.days.forEach(function(day) {
        var parts = day.date.replace(/^[A-Za-z]+\s/, '').split(' ');
        var m = months[parts[0]];
        if (!isNaN(m) && !seen[m]) { seen[m] = true; tripMonths.push(m); }
      });

      var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var dowNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      var selectedKey = null;

      function renderAll() {
        var html = tripMonths.map(function(monthIdx) {
          var firstDay = new Date(2026, monthIdx, 1).getDay();
          var daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

          var cells = '';
          for (var i = 0; i < firstDay; i++) {
            cells += '<div class="cal-cell empty"><div class="cal-date"></div></div>';
          }
          for (var d = 1; d <= daysInMonth; d++) {
            var key = '2026-' + monthIdx + '-' + d;
            var tripDay = dayMap[key];
            var cellDate = new Date(2026, monthIdx, d); cellDate.setHours(0,0,0,0);
            var isToday = cellDate.getTime() === today.getTime();
            var isSelected = key === selectedKey;
            var cls = 'cal-cell';
            if (!tripDay && d) { cls += ' empty'; }
            if (tripDay) { cls += ' trip-day'; }
            if (isToday) { cls += ' today'; }
            if (isSelected) { cls += ' selected'; }

            var cityColor = '#2D9E75';
            var cityPill = '';
            if (tripDay) {
              var parts = tripDay.city.split('>');
              var isTransit = parts.length > 1;
              var baseName = parts.pop().trim();
              var fromName = isTransit ? parts[0].trim() : null;
              var cs = citySettings[baseName];
              var fromCs = fromName ? citySettings[fromName] : null;
              var codeMap = { "Bangkok": "BKK", "Chiang Rai": "CEI", "Koh Samui": "USM", "Sydney": "SYD" };
              if (isTransit) {
                cityColor = '#5B9BD5';
                var fromCode = codeMap[fromName] || (fromCs && fromCs.code) || (fromName ? fromName.substring(0,3).toUpperCase() : '');
                var toCode = codeMap[baseName] || (cs && cs.code) || baseName.substring(0,3).toUpperCase();
                cityPill = '<span class="cal-city-pill" style="background:' + cityColor + ';">' + fromCode + '→' + toCode + '</span>';
              } else {
                if (cs) { cityColor = cs.color; }
                var code = codeMap[baseName] || (cs && cs.code) || baseName.substring(0,3).toUpperCase();
                cityPill = '<span class="cal-city-pill" style="background:' + cityColor + ';">' + code + '</span>';
              }
            }

            cells += '<div class="' + cls + '" onclick="calSelectDay(\'' + key + '\')" data-key="' + key + '">' +
              '<div class="cal-date-num">' + d + '</div>' +
              cityPill +
            '</div>';
          }

          var detailHtml = '';
          if (selectedKey && dayMap[selectedKey]) {
            var parts = selectedKey.split('-');
            if (parseInt(parts[1]) === monthIdx) {
              var sd = dayMap[selectedKey];
              normaliseAccom(sd); normaliseDayTransport(sd);
              var accomHtml = sd.accommodation.length ? sd.accommodation.map(function(a) { return '<div class="cal-detail-item">🏨 ' + a.name + '</div>'; }).join('') : '<div class="cal-detail-item" style="color:var(--ink-muted);font-style:italic;">None added</div>';
              var actHtml = sd.activities.length ? sd.activities.map(function(a, i) { var cat = (sd.activityCategories && sd.activityCategories[i]) || 'default'; return '<div class="cal-detail-item">' + (activityCategories[cat]||activityCategories['default']).emoji + ' ' + a + '</div>'; }).join('') : '<div class="cal-detail-item" style="color:var(--ink-muted);font-style:italic;">None added</div>';
              var foodHtml = sd.food.length ? sd.food.map(function(f) { return '<div class="cal-detail-item">🍽️ ' + f + '</div>'; }).join('') : '<div class="cal-detail-item" style="color:var(--ink-muted);font-style:italic;">None added</div>';
              var dayIndex = sd.day - 1;
              var makeCalItinItem = function(emoji, text, type, itemIndex) {
                var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(text + ' ' + sd.city.split('>').pop().trim() + ' Thailand');
                var detailId = 'cal-detail-' + sd.day + '-' + type + '-' + itemIndex;
                var photoKey = 'day' + sd.day + '_act' + itemIndex;
                var photo = (type === 'act') ? (cardPhotos[photoKey] || '') : '';
                var note = (type === 'act' && sd.cardNotes && sd.cardNotes[String(itemIndex)]) ? sd.cardNotes[String(itemIndex)] : '';
                return '<div style="border-bottom:1px solid var(--sand-dark);">' +
                  '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer;" onclick="toggleItinItem(\'' + detailId + '\')">' +
                    '<span>' + emoji + '</span>' +
                    '<span style="flex:1;font-size:13px;color:var(--ink-light);font-weight:500;">' + text + '</span>' +
                    '<span style="font-size:10px;color:var(--ink-muted);">▾</span>' +
                  '</div>' +
                  '<div id="' + detailId + '" style="display:none;margin-bottom:8px;background:var(--sand);border-radius:8px;overflow:hidden;">' +
                    (photo ? '<img src="' + photo + '" style="width:100%;height:140px;object-fit:cover;display:block;">' : '') +
                    '<div style="padding:10px 12px;">' +
                      (note ? '<div style="font-size:12px;color:var(--ink-light);font-style:italic;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--sand-dark);">' + note + '</div>' : '') +
                      '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">' +
                        '<a href="' + mapsUrl + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--accent);text-decoration:none;">📍 Open in Maps</a>' +
                        '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(text + ' ' + sd.city.split('>').pop().trim()) + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--ink-muted);text-decoration:none;">🧭 Directions</a>' +
                        (type === 'act' ? '<span onclick="openItinNoteModal(' + dayIndex + ',' + itemIndex + ')" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--ink-muted);cursor:pointer;">📝 ' + (note ? 'Edit note' : 'Add note') + '</span>' : '') +
                      '</div>' +
                    '</div>' +
                  '</div>' +
                '</div>';
              };

              var accomItems = sd.accommodation.length
                ? sd.accommodation.map(function(a, i) { return makeCalItinItem('🏨', a.name, 'accom', i); }).join('')
                : '<div style="font-size:12px;color:var(--ink-muted);font-style:italic;padding:6px 0;">None added</div>';
              var actItems = sd.activities.length
                ? sd.activities.map(function(a, i) { var cat = (sd.activityCategories && sd.activityCategories[i]) || 'default'; return makeCalItinItem((activityCategories[cat]||activityCategories['default']).emoji, a, 'act', i); }).join('')
                : '<div style="font-size:12px;color:var(--ink-muted);font-style:italic;padding:6px 0;">None added</div>';
              var foodItems = sd.food.length
                ? sd.food.map(function(f, i) { var fname = typeof f === 'string' ? f : f.name; return makeCalItinItem('🍽️', fname, 'food', i); }).join('')
                : '<div style="font-size:12px;color:var(--ink-muted);font-style:italic;padding:6px 0;">None added</div>';

              detailHtml = '<div class="cal-detail-panel">' +
                '<div class="cal-detail-header">' +
                  '<span style="font-size:24px;">' + getCityEmoji(sd.city) + '</span>' +
                  '<div><div class="cal-detail-day-num">Day ' + sd.day + ' · ' + sd.date + '</div><div class="cal-detail-city">' + sd.city + '</div></div>' +
                  '<button onclick="toggleCalEdit(' + dayIndex + ')" id="cal-edit-btn-' + dayIndex + '" style="margin-left:auto;font-family:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:none;color:var(--accent);cursor:pointer;">Edit</button>' +
                '</div>' +
                '<div class="cal-detail-body" id="cal-detail-body-' + dayIndex + '">' +
                  '<div class="cal-detail-section"><div class="cal-detail-label">Accommodation</div>' + accomItems + '</div>' +
                  '<div class="cal-detail-section"><div class="cal-detail-label">Activities</div>' + actItems + '</div>' +
                  '<div class="cal-detail-section"><div class="cal-detail-label">Food</div>' + foodItems + '</div>' +
                '</div>' +
                '<div id="cal-edit-panel-' + dayIndex + '" style="display:none;"></div>' +
              '</div>';
            }
          }

          return '<div class="cal-month">' +
            '<div class="cal-month-header">' +
              '<div><div class="cal-month-title">' + monthNames[monthIdx] + ' 2026</div><div class="cal-month-sub">Shane &amp; Cheryl\'s Thailand Trip</div></div>' +
              '<div style="font-size:22px;">\uD83C\uDDF9\uD83C\uDDED</div>' +
            '</div>' +
            '<div class="cal-dow-row">' + dowNames.map(function(d) { return '<div class="cal-dow">' + d + '</div>'; }).join('') + '</div>' +
            '<div class="cal-grid">' + cells + '</div>' +
          '</div>' + detailHtml;
        }).join('');

        el.innerHTML = html;
      }

      window.calSelectDay = function(key) {
        if (!dayMap[key]) return;
        selectedKey = selectedKey === key ? null : key;
        renderAll();
        if (selectedKey) {
          setTimeout(function() {
            var panel = el.querySelector('.cal-detail-panel');
            if (panel) { panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
          }, 50);
        }
      };

      renderAll();
    }

              '<div style="margin-bottom:10px;">' +
