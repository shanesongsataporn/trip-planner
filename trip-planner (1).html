<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shane & Cheryl's Trip Planner</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#F5F0E8;--sand-dark:#E8E0D0;--ink:#1A1A18;--ink-light:#4A4A45;
  --ink-muted:#8A8A82;--white:#FDFCFA;--accent:#2D9E75;--accent-light:#E1F5EE;
  --warn:#E67E22;--danger:#C0392B;
  --header:58px;--timeline:118px;--panel:390px;
}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:var(--ink);background:#e8e4d8}

#hdr{position:fixed;top:0;left:0;right:0;height:var(--header);z-index:3000;
  background:var(--white);border-bottom:1px solid var(--sand-dark);
  display:flex;align-items:center;gap:12px;padding:0 16px}
.brand{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap;flex-shrink:0;letter-spacing:-.01em}
.brand span{color:var(--accent)}
.sep{width:1px;height:22px;background:var(--sand-dark);flex-shrink:0}
.trip-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0}
.trip-wrap label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);white-space:nowrap}
#tripSel{font-family:inherit;font-size:12px;font-weight:500;border:1px solid var(--sand-dark);
  background:var(--sand);border-radius:6px;padding:4px 8px;color:var(--ink);cursor:pointer;outline:none;max-width:180px}
#tripSel:focus{border-color:var(--accent)}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-hint{font-size:11px;color:var(--ink-muted);white-space:nowrap}
.hdr-btn{font-family:inherit;font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;
  cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid var(--sand-dark);
  background:var(--white);color:var(--ink-light)}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent)}
.hdr-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;display:none}
.hdr-btn.primary:hover{opacity:.85}
.hdr-btn.primary.show{display:block}

#map{position:fixed;top:var(--header);left:0;right:0;bottom:var(--timeline);z-index:1}

#tl{position:fixed;bottom:0;left:0;right:0;height:var(--timeline);z-index:3000;
  background:var(--white);border-top:1px solid var(--sand-dark);
  overflow-x:auto;overflow-y:hidden;display:flex;align-items:stretch;
  scrollbar-width:thin;scrollbar-color:var(--sand-dark) transparent}
#tl::-webkit-scrollbar{height:3px}
#tl::-webkit-scrollbar-thumb{background:var(--sand-dark);border-radius:2px}
#tl-inner{display:flex;align-items:stretch;min-width:max-content;padding:0 8px}
.day-card{display:flex;flex-direction:column;justify-content:center;padding:8px 13px;
  cursor:pointer;position:relative;border-right:1px solid var(--sand-dark);min-width:100px;
  transition:background .15s;user-select:none;flex-shrink:0}
.day-card:last-child{border-right:none}
.day-card:hover{background:var(--sand)}
.day-card.active::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.day-card.editing{background:#fffbf0}
.day-card.editing::before{background:var(--warn)!important}
.dc-edit{position:absolute;top:6px;right:6px;font-size:10px;color:var(--ink-muted);opacity:0;transition:opacity .15s}
.day-card:hover .dc-edit{opacity:1}
.dc-num{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:2px}
.dc-city{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:2px}
.dc-note{font-size:11px;color:var(--ink-muted);line-height:1.3}

#panel{position:fixed;top:var(--header);right:0;width:var(--panel);bottom:var(--timeline);
  background:var(--white);border-left:1px solid var(--sand-dark);z-index:2000;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden}
#panel.open{transform:translateX(0)}
#panel-head{padding:14px 16px 12px;border-bottom:1px solid var(--sand-dark);
  flex-shrink:0;position:relative;min-height:68px}
#panel-close{position:absolute;top:11px;right:11px;width:24px;height:24px;border-radius:50%;
  border:1px solid var(--sand-dark);background:var(--sand);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;color:var(--ink-muted);transition:all .15s}
#panel-close:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
#panel-body{overflow-y:auto;flex:1;padding:0 16px 28px}

.p-chip{display:inline-block;font-size:10px;letter-spacing:.09em;text-transform:uppercase;
  font-weight:500;padding:2px 7px;border-radius:4px;margin-bottom:7px}
.p-chip.green{background:var(--accent-light);color:var(--accent)}
.p-chip.amber{background:#fff3e0;color:var(--warn)}
.p-title{font-size:22px;font-weight:300;letter-spacing:-.01em;line-height:1.1;margin-bottom:2px}
.p-sub{font-size:12px;color:var(--ink-muted)}
.p-sec{margin-top:16px}
.p-sec-h{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-muted);
  font-weight:500;padding-bottom:5px;border-bottom:1px solid var(--sand-dark);margin-bottom:9px}
.p-vibe{font-size:13px;font-style:italic;color:var(--ink-light);line-height:1.6}
.p-list{list-style:none}
.p-list li{font-size:13px;color:var(--ink-light);padding:5px 0;display:flex;gap:7px;
  line-height:1.4;border-bottom:1px solid var(--sand-dark)}
.p-list li:last-child{border-bottom:none}
.p-list li::before{content:'—';color:var(--accent);flex-shrink:0}
.p-hl{background:var(--sand);border-radius:7px;padding:10px 12px;margin-top:12px;border-left:3px solid var(--accent)}
.p-hl-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:3px}
.p-hl-txt{font-size:13px;color:var(--ink-light);line-height:1.5}

.poi-view-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;
  cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:4px;text-decoration:none}
.poi-view-item:hover{background:var(--sand);border-color:var(--sand-dark)}
.poi-view-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.poi-view-info{flex:1;min-width:0}
.poi-view-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poi-view-day{font-size:11px;color:var(--ink-muted)}
.poi-view-arrow{font-size:11px;color:var(--ink-muted);flex-shrink:0}

.edit-wrap{padding:14px 0}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ink-muted);font-weight:500;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;font-family:inherit;font-size:13px;
  padding:7px 9px;border:1px solid var(--sand-dark);border-radius:6px;
  background:var(--white);color:var(--ink);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:52px;line-height:1.5}

.poi-edit-row{display:flex;align-items:center;gap:6px;padding:7px 9px;
  border:1px solid var(--sand-dark);border-radius:6px;margin-bottom:5px;background:var(--white)}
.poi-edit-num{width:18px;height:18px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.poi-edit-name{flex:1;font-family:inherit;font-size:13px;border:none;outline:none;
  background:transparent;color:var(--ink);min-width:0}
.poi-edit-name::placeholder{color:var(--ink-muted)}
.poi-maps-link{font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap;flex-shrink:0}
.poi-maps-link:hover{text-decoration:underline}
.poi-del{width:22px;height:22px;border-radius:50%;border:1px solid var(--sand-dark);
  background:none;cursor:pointer;color:var(--ink-muted);font-size:11px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.poi-del:hover{background:var(--danger);border-color:var(--danger);color:#fff}

.maps-import{background:var(--sand);border:1px dashed var(--sand-dark);border-radius:7px;padding:10px 11px;margin-bottom:10px}
.maps-import-lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:500;color:var(--ink-muted);margin-bottom:6px}
.maps-row{display:flex;gap:6px}
.maps-input{flex:1;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--sand-dark);
  border-radius:5px;background:var(--white);color:var(--ink);outline:none;min-width:0}
.maps-input:focus{border-color:var(--accent)}
.maps-input::placeholder{color:var(--ink-muted)}
.maps-btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 11px;
  border-radius:5px;border:none;background:var(--accent);color:#fff;cursor:pointer;flex-shrink:0}
.maps-btn:hover{opacity:.85}
.maps-status{font-size:11px;margin-top:5px;min-height:15px}
.maps-status.ok{color:#27AE60}
.maps-status.err{color:var(--danger)}
.add-poi-btn{width:100%;font-family:inherit;font-size:12px;padding:7px;border-radius:6px;
  border:1px dashed var(--sand-dark);background:none;color:var(--ink-muted);
  cursor:pointer;text-align:center;transition:all .15s;margin-top:2px}
.add-poi-btn:hover{border-color:var(--accent);color:var(--accent)}
.edit-actions{display:flex;gap:7px;margin-top:14px}
.btn-save{flex:1;font-family:inherit;font-size:13px;font-weight:500;padding:8px;
  border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.btn-save:hover{opacity:.85}
.btn-save.ok{background:#27AE60}
.btn-cancel{font-family:inherit;font-size:13px;padding:8px 13px;border-radius:6px;
  border:1px solid var(--sand-dark);background:none;color:var(--ink-muted);cursor:pointer}
.btn-cancel:hover{border-color:var(--ink-muted);color:var(--ink)}
.tip{font-size:11px;color:var(--ink-muted);margin-top:10px;line-height:1.6}
.tip a{color:var(--accent);text-decoration:none}
.tip a:hover{text-decoration:underline}

#modal-bg{display:none;position:fixed;inset:0;z-index:5000;
  background:rgba(0,0,0,.45);align-items:center;justify-content:center}
#modal-bg.show{display:flex}
#modal{background:var(--white);border-radius:12px;padding:24px;width:340px;
  box-shadow:0 8px 32px rgba(0,0,0,.2)}
#modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}

/* Leaflet custom markers */
.city-marker{display:flex;flex-direction:column;align-items:center;cursor:pointer;filter:drop-shadow(0 2px 5px rgba(0,0,0,.3))}
.city-pin{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.city-pin-inner{transform:rotate(45deg);font-size:13px;line-height:1}
.city-lbl{font-size:10px;font-weight:600;color:var(--ink);background:rgba(255,255,255,.95);
  padding:2px 6px;border-radius:3px;margin-top:4px;white-space:nowrap;border:1px solid var(--sand-dark)}
.poi-marker{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.poi-ball{width:20px;height:20px;border-radius:50%;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;
  color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.poi-lbl{font-size:9px;font-weight:500;color:var(--ink);background:rgba(255,255,255,.93);
  padding:1px 4px;border-radius:3px;margin-top:2px;white-space:nowrap;
  border:1px solid var(--sand-dark);max-width:100px;overflow:hidden;text-overflow:ellipsis}

.leaflet-popup-content-wrapper{border-radius:8px;border:1px solid var(--sand-dark);
  box-shadow:0 4px 16px rgba(0,0,0,.12);padding:0}
.leaflet-popup-content{margin:0;font-family:inherit}
.lp-inner{padding:10px 14px}
.lp-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.lp-day{font-size:11px;color:var(--ink-muted);margin-bottom:8px}
.lp-link{display:inline-block;font-size:11px;font-weight:500;padding:4px 10px;
  border-radius:5px;background:var(--accent);color:#fff;text-decoration:none}
.lp-link:hover{opacity:.85}
.leaflet-popup-close-button{top:6px!important;right:8px!important;font-size:16px!important;color:var(--ink-muted)!important}
</style>
</head>
<body>

<div id="hdr">
  <div class="brand">Shane & Cheryl's <span>Trip Planner</span></div>
  <div class="sep"></div>
  <div class="trip-wrap">
    <label>Trip</label>
    <select id="tripSel"></select>
  </div>
  <div class="hdr-actions">
    <span class="hdr-hint">Click a day to edit</span>
    <button class="hdr-btn" id="addTripBtn">+ Add trip</button>
    <button class="hdr-btn primary" id="exportBtn">Export JSON</button>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <div id="panel-head">
    <button id="panel-close">✕</button>
    <div id="panel-head-content"></div>
  </div>
  <div id="panel-body"></div>
</div>

<div id="tl"><div id="tl-inner"></div></div>

<div id="modal-bg">
  <div id="modal">
    <h3>Add a new trip</h3>
    <div class="field"><label>Trip name</label><input id="m-name" type="text" placeholder="e.g. Japan — Oct 2026"></div>
    <div class="field"><label>Accent colour</label><input id="m-color" type="color" value="#E74C3C" style="height:36px;padding:2px 4px;cursor:pointer;width:100%"></div>
    <div class="field"><label>Number of days</label><input id="m-days" type="number" min="1" max="60" value="7"></div>
    <div class="modal-actions">
      <button class="btn-save" id="m-create">Create trip</button>
      <button class="btn-cancel" id="m-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Leaflet loads first, then app script immediately after -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

// ═══════════════════════════════
//  DATA
// ═══════════════════════════════
const trips = {
  thailand_may_2026: {
    name:"Thailand — May 2026", accent:"#2D9E75",
    locations:[
      {id:"bangkok",name:"Bangkok",coords:[13.7563,100.5018],emoji:"🏙️",
       dates:"May 1–4, 2026",cats:["Temples","Food","Nightlife"],highlight:null,
       vibe:"Chaotic, golden, electric — temples rising above tuk-tuks and the best street food on earth.",
       todo:["Wat Phra Kaew & Grand Palace — arrive before 9am","Khao San Road then Phra Athit riverside","Evening river cruise on the Chao Phraya","Chatuchak Weekend Market if timing allows"],
       food:["Pad see ew & mango sticky rice at Or Tor Kor Market","Rooftop dinner at a Silom sky bar — splurge night"]},
      {id:"chiangrai",name:"Chiang Rai",coords:[19.9105,99.8406],emoji:"⛩️",
       dates:"May 5–8, 2026",cats:["Temples","Culture"],
       highlight:{label:"Cultural highlight",text:"The White Temple at golden hour — surreal and unlike anything else in Southeast Asia."},
       vibe:"Cool mountain air, slow mornings, dreamlike artistic temples.",
       todo:["Wat Rong Khun (White Temple) — before 9am for best light","Baan Dam Museum (Black House)","Wat Rong Suea Ten (Blue Temple)","Long-tail boat to the Golden Triangle"],
       food:["Khao soi — the northern Thai curry noodle soup","Night Bazaar for grilled meats and smoothies"]},
      {id:"kohphangan",name:"Koh Phangan",coords:[9.7380,100.0136],emoji:"🌴",
       dates:"May 9–12, 2026",cats:["Beaches","Nightlife"],highlight:null,
       vibe:"Salt air, hammocks, turquoise water — the island slows everything down beautifully.",
       todo:["Haad Rin beach — Full Moon Party strip, quieter in May","Thong Nai Pan — secluded east coast beach","Snorkelling at Sail Rock","Yoga at Agama or Orion Healing Centre"],
       food:["Fresh seafood BBQ at Haad Yao beach","Smoothie bowls near Srithanu village"]},
      {id:"kohsamui",name:"Koh Samui",coords:[9.5120,100.0136],emoji:"🌺",
       dates:"May 13–15, 2026",cats:["Beaches","Food"],
       highlight:{label:"Cheryl's pick ✦",text:"Trip finale — beachfront villa, upscale dinner, and a proper celebration before flying home."},
       vibe:"A step up in polish — lush, sophisticated, celebratory. The perfect close.",
       todo:["Chaweng Beach — lively and beautiful","Ang Thong Marine Park day trip","Big Buddha (Wat Phra Yai) at sunset","Maenam for a quieter local beach"],
       food:["Fine dining at Dining on the Rocks — splurge night","Coconut ice cream at the Fisherman's Village night market"]}
    ],
    itinerary:[
      {day:1,loc:"bangkok",   note:"Arrive BKK, check in, recover",      pois:[{name:"Suvarnabhumi Airport",c:[13.6900,100.7501]},{name:"Khao San Road",c:[13.7580,100.4977]}]},
      {day:2,loc:"bangkok",   note:"Grand Palace & temple morning",       pois:[{name:"Wat Phra Kaew",c:[13.7516,100.4927]},{name:"Wat Pho",c:[13.7465,100.4930]},{name:"Chao Phraya River",c:[13.7434,100.4920]}]},
      {day:3,loc:"bangkok",   note:"Markets & evening river cruise",      pois:[{name:"Or Tor Kor Market",c:[13.8009,100.5503]},{name:"MBK Center",c:[13.7450,100.5298]},{name:"Asiatique Riverfront",c:[13.7076,100.4981]}]},
      {day:4,loc:"bangkok",   note:"Fly to Chiang Rai afternoon",         pois:[{name:"Don Mueang Airport",c:[13.9126,100.6067]}]},
      {day:5,loc:"chiangrai", note:"White Temple morning, settle in",     pois:[{name:"Wat Rong Khun",c:[19.8245,99.7633]},{name:"Baan Dam Museum",c:[19.9335,99.8286]}]},
      {day:6,loc:"chiangrai", note:"Blue Temple & Night Bazaar",          pois:[{name:"Wat Rong Suea Ten",c:[19.9507,99.8332]},{name:"Chiang Rai Night Bazaar",c:[19.9075,99.8326]}]},
      {day:7,loc:"chiangrai", note:"Golden Triangle boat trip",           pois:[{name:"Golden Triangle",c:[20.3493,100.0850]},{name:"Hall of Opium Museum",c:[20.3509,100.0820]}]},
      {day:8,loc:"chiangrai", note:"Fly south to the islands",            pois:[{name:"Chiang Rai Airport",c:[19.9523,99.8829]}]},
      {day:9,loc:"kohphangan",note:"Arrive, beach afternoon",             pois:[{name:"Thong Sala Pier",c:[9.6856,100.0144]},{name:"Haad Rin Beach",c:[9.6656,100.0623]}]},
      {day:10,loc:"kohphangan",note:"Snorkelling at Sail Rock",           pois:[{name:"Sail Rock Dive Site",c:[9.8669,100.1246]},{name:"Thong Nai Pan Beach",c:[9.8143,100.0762]}]},
      {day:11,loc:"kohphangan",note:"East coast & yoga day",              pois:[{name:"Agama Yoga",c:[9.7516,100.0062]},{name:"Srithanu Village",c:[9.7563,100.0012]}]},
      {day:12,loc:"kohsamui", note:"Ferry to Koh Samui, check in",        pois:[{name:"Lomprayah Ferry Terminal",c:[9.5332,100.0586]},{name:"Chaweng Beach",c:[9.5345,100.0614]}]},
      {day:13,loc:"kohsamui", note:"Island explore, Big Buddha sunset",   pois:[{name:"Big Buddha Wat Phra Yai",c:[9.5691,100.0603]},{name:"Fisherman's Village",c:[9.5528,100.0284]}]},
      {day:14,loc:"kohsamui", note:"Ang Thong Marine Park day trip",      pois:[{name:"Ang Thong Marine Park",c:[9.7612,100.0048]},{name:"Dining on the Rocks",c:[9.5310,100.0580]}]},
      {day:15,loc:"kohsamui", note:"Final beach morning, fly home",       pois:[{name:"Samui Airport",c:[9.5479,100.0622]},{name:"Maenam Beach",c:[9.5620,100.0205]}]}
    ]
  }
};

// ═══════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════
const POI_COLORS=['#E74C3C','#9B59B6','#3498DB','#E67E22','#1ABC9C','#F39C12','#2980B9','#8E44AD','#E91E63','#16A085'];
let currentTrip='thailand_may_2026';
let panelMode=null, activeDayIdx=null;
let cityMarkers=[], poiMarkers=[];

// ═══════════════════════════════
//  MAP — Leaflet, tiles from OSM
//  Works on GitHub Pages (https)
// ═══════════════════════════════
const map = L.map('map',{zoomControl:false,attributionControl:false})
  .setView([13.5,101],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,
  attribution:'© OpenStreetMap contributors'
}).addTo(map);

L.control.zoom({position:'bottomright'}).addTo(map);
L.control.attribution({position:'bottomleft',prefix:false}).addTo(map);

// Invalidate size after layout settles
setTimeout(()=>map.invalidateSize(),300);

// ═══════════════════════════════
//  TRIP SELECTOR
// ═══════════════════════════════
function buildTripSelector(){
  const sel=document.getElementById('tripSel');
  sel.innerHTML='';
  Object.entries(trips).forEach(([k,t])=>{
    const o=document.createElement('option');
    o.value=k; o.textContent=t.name;
    if(k===currentTrip) o.selected=true;
    sel.appendChild(o);
  });
}
document.getElementById('tripSel').addEventListener('change',e=>{
  currentTrip=e.target.value; closePanel(); loadTrip();
});

// ═══════════════════════════════
//  LOAD TRIP
// ═══════════════════════════════
function loadTrip(){
  const trip=trips[currentTrip];
  document.documentElement.style.setProperty('--accent',trip.accent);
  clearAllMarkers();
  placeCityMarkers(trip);
  placeAllPois(trip);
  buildTimeline(trip);
  const coords=trip.locations.map(l=>l.coords);
  if(coords.length) map.flyToBounds(L.latLngBounds(coords),{padding:[70,70],duration:1});
}

function clearAllMarkers(){
  cityMarkers.forEach(m=>m.remove()); cityMarkers=[];
  poiMarkers.forEach(m=>m.remove());  poiMarkers=[];
}

// ═══════════════════════════════
//  CITY MARKERS
// ═══════════════════════════════
function placeCityMarkers(trip){
  trip.locations.forEach(loc=>{
    const el=document.createElement('div');
    el.className='city-marker';
    el.innerHTML=`<div class="city-pin" style="background:${trip.accent}"><div class="city-pin-inner">${loc.emoji}</div></div><div class="city-lbl">${loc.name}</div>`;
    const icon=L.divIcon({className:'',html:el.outerHTML,iconSize:[90,58],iconAnchor:[45,52]});
    const m=L.marker(loc.coords,{icon,zIndexOffset:1000}).addTo(map);
    m.on('click',e=>{L.DomEvent.stopPropagation(e);openCityPanel(loc);});
    cityMarkers.push(m);
  });
}

// ═══════════════════════════════
//  POI MARKERS
// ═══════════════════════════════
function placeAllPois(trip){
  trip.itinerary.forEach((item,dayIdx)=>{
    (item.pois||[]).forEach((poi,pi)=>placePoi(poi,pi,dayIdx,item));
  });
}

function placePoi(poi,pi,dayIdx,item){
  const color=POI_COLORS[pi%POI_COLORS.length];
  const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(poi.name)}`;
  const el=document.createElement('div');
  el.className='poi-marker';
  el.innerHTML=`<div class="poi-ball" style="background:${color}">${pi+1}</div><div class="poi-lbl">${poi.name}</div>`;
  const icon=L.divIcon({className:'',html:el.outerHTML,iconSize:[110,34],iconAnchor:[10,10]});
  const popup=L.popup({closeButton:true,offset:[0,-6],maxWidth:220})
    .setContent(`<div class="lp-inner"><div class="lp-name">${poi.name}</div><div class="lp-day">Day ${item.day} · ${item.note}</div><a class="lp-link" href="${mapsUrl}" target="_blank">View on Google Maps ↗</a></div>`);
  const m=L.marker(poi.c||poi.coords,{icon}).bindPopup(popup).addTo(map);
  m.on('click',e=>{L.DomEvent.stopPropagation(e);});
  poiMarkers.push(m);
}

function refreshPois(){
  poiMarkers.forEach(m=>m.remove()); poiMarkers=[];
  placeAllPois(trips[currentTrip]);
}

// ═══════════════════════════════
//  TIMELINE
// ═══════════════════════════════
function buildTimeline(trip){
  const inner=document.getElementById('tl-inner');
  inner.innerHTML='';
  trip.itinerary.forEach((item,idx)=>{
    const loc=trip.locations.find(l=>l.id===item.loc);
    const d=document.createElement('div');
    d.className='day-card'; d.dataset.idx=idx;
    d.innerHTML=`<span class="dc-edit">✎</span>
      <div class="dc-num">Day ${item.day}</div>
      <div class="dc-city">${loc?loc.name:item.loc||'—'}</div>
      <div class="dc-note">${item.note}</div>`;
    d.addEventListener('click',()=>openDayPanel(idx));
    inner.appendChild(d);
  });
}

function setDayActive(idx){
  document.querySelectorAll('.day-card').forEach(d=>{
    const i=parseInt(d.dataset.idx);
    d.classList.toggle('active',i===idx);
    d.classList.toggle('editing',i===idx);
  });
  const el=document.querySelector(`.day-card[data-idx="${idx}"]`);
  if(el) el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}
function clearDayActive(){ document.querySelectorAll('.day-card').forEach(d=>d.classList.remove('active','editing')); }

// ═══════════════════════════════
//  CITY PANEL
// ═══════════════════════════════
function openCityPanel(loc){
  panelMode='city'; activeDayIdx=null; clearDayActive();
  const trip=trips[currentTrip];
  const locDays=trip.itinerary.filter(i=>i.loc===loc.id);
  const allPois=locDays.flatMap(item=>(item.pois||[]).map((p,pi)=>({...p,day:item.day,note:item.note,color:POI_COLORS[pi%POI_COLORS.length]})));

  document.getElementById('panel-head-content').innerHTML=`
    <div class="p-chip green">${loc.cats.join(' · ')}</div>
    <div class="p-title">${loc.name}</div>
    <div class="p-sub">${loc.dates}</div>`;

  const poisBlock=allPois.length?`
    <div class="p-sec"><div class="p-sec-h">Points of interest — tap to open in Google Maps</div>
    ${allPois.map(p=>{
      const url=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name+' '+loc.name)}`;
      return `<a class="poi-view-item" href="${url}" target="_blank">
        <div class="poi-view-dot" style="background:${p.color}"></div>
        <div class="poi-view-info"><div class="poi-view-name">${p.name}</div><div class="poi-view-day">Day ${p.day} · ${p.note}</div></div>
        <div class="poi-view-arrow">↗</div></a>`;
    }).join('')}</div>`:'';

  document.getElementById('panel-body').innerHTML=`
    ${loc.highlight?`<div class="p-hl"><div class="p-hl-lbl">${loc.highlight.label}</div><div class="p-hl-txt">${loc.highlight.text}</div></div>`:''}
    <div class="p-sec"><div class="p-sec-h">Vibe</div><p class="p-vibe">${loc.vibe}</p></div>
    <div class="p-sec"><div class="p-sec-h">Things to do</div><ul class="p-list">${loc.todo.map(t=>`<li>${t}</li>`).join('')}</ul></div>
    <div class="p-sec"><div class="p-sec-h">Food & drink</div><ul class="p-list">${loc.food.map(f=>`<li>${f}</li>`).join('')}</ul></div>
    ${poisBlock}`;

  openPanel();
  map.flyTo(loc.coords,11,{duration:0.8});
}

// ═══════════════════════════════
//  DAY EDIT PANEL
// ═══════════════════════════════
function openDayPanel(idx){
  panelMode='day'; activeDayIdx=idx;
  const trip=trips[currentTrip];
  const item=trip.itinerary[idx];
  const loc=trip.locations.find(l=>l.id===item.loc);
  setDayActive(idx);
  document.getElementById('panel-head-content').innerHTML=`
    <div class="p-chip amber">✎ Editing</div>
    <div class="p-title">Day ${item.day}</div>
    <div class="p-sub">${loc?loc.name:item.loc||'No location set'} · ${item.note}</div>`;
  renderEditForm(idx);
  openPanel();
  const coords=(item.pois&&item.pois.length)?(item.pois[0].c||item.pois[0].coords):loc?loc.coords:null;
  if(coords) map.flyTo(coords, loc&&coords===loc.coords?10:13, {duration:0.7});
}

function renderEditForm(idx){
  const trip=trips[currentTrip];
  const item=trip.itinerary[idx];
  const locOpts=trip.locations.map(l=>`<option value="${l.id}"${l.id===item.loc?' selected':''}>${l.name}</option>`).join('');
  const poisHtml=(item.pois||[]).map((p,pi)=>{
    const color=POI_COLORS[pi%POI_COLORS.length];
    const coords=p.c||p.coords||[];
    const url=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}`;
    return `<div class="poi-edit-row">
      <div class="poi-edit-num" style="background:${color}">${pi+1}</div>
      <input class="poi-edit-name pname" type="text" value="${p.name}" placeholder="Place name" data-lat="${coords[0]||''}" data-lng="${coords[1]||''}">
      <a class="poi-maps-link" href="${url}" target="_blank">Maps ↗</a>
      <button class="poi-del" title="Remove">✕</button>
    </div>`;
  }).join('');

  document.getElementById('panel-body').innerHTML=`
    <div class="edit-wrap">
      <div class="field"><label>City</label><select id="ed-loc">${locOpts}</select></div>
      <div class="field"><label>Day note</label><textarea id="ed-note">${item.note}</textarea></div>
      <div class="field">
        <label>Points of interest</label>
        <div class="maps-import">
          <div class="maps-import-lbl">📍 Paste a Google Maps link</div>
          <div class="maps-row">
            <input class="maps-input" id="maps-in" type="text" placeholder="Paste Google Maps link…">
            <button class="maps-btn" id="maps-add">Add</button>
          </div>
          <div class="maps-status" id="maps-status"></div>
        </div>
        <div id="poi-list">${poisHtml}</div>
        <button class="add-poi-btn" id="add-poi-btn">+ Add manually</button>
      </div>
      <div class="edit-actions">
        <button class="btn-save" id="ed-save">Save day</button>
        <button class="btn-cancel" id="ed-cancel">Cancel</button>
      </div>
      <p class="tip">
        <strong>Phone:</strong> tap a place in Google Maps → Share → copy the long google.com/maps URL (not goo.gl).<br>
        <strong>Desktop:</strong> right-click any pin → "Copy link to this place".
      </p>
    </div>`;

  document.getElementById('poi-list').addEventListener('click',e=>{
    if(e.target.classList.contains('poi-del')) e.target.closest('.poi-edit-row').remove();
  });

  document.getElementById('add-poi-btn').addEventListener('click',()=>{
    const pi=document.getElementById('poi-list').querySelectorAll('.poi-edit-row').length;
    const color=POI_COLORS[pi%POI_COLORS.length];
    const div=document.createElement('div'); div.className='poi-edit-row';
    div.innerHTML=`<div class="poi-edit-num" style="background:${color}">${pi+1}</div>
      <input class="poi-edit-name pname" type="text" placeholder="Place name" data-lat="" data-lng="">
      <span style="font-size:11px;color:var(--ink-muted);flex-shrink:0">Maps ↗</span>
      <button class="poi-del" title="Remove">✕</button>`;
    document.getElementById('poi-list').appendChild(div);
  });

  document.getElementById('maps-add').addEventListener('click',doImport);
  document.getElementById('maps-in').addEventListener('keydown',e=>{if(e.key==='Enter')doImport();});
  document.getElementById('ed-save').addEventListener('click',()=>saveDay(idx));
  document.getElementById('ed-cancel').addEventListener('click',()=>{clearDayActive();closePanel();});
}

function doImport(){
  const raw=document.getElementById('maps-in').value.trim();
  const status=document.getElementById('maps-status');
  if(!raw){status.className='maps-status err';status.textContent='Paste a link first.';return;}
  const p=parseMapsUrl(raw);
  if(!p){status.className='maps-status err';status.textContent='No coordinates found — use a full google.com/maps link, not a short goo.gl link.';return;}
  const pi=document.getElementById('poi-list').querySelectorAll('.poi-edit-row').length;
  const color=POI_COLORS[pi%POI_COLORS.length];
  const url=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}`;
  const div=document.createElement('div'); div.className='poi-edit-row';
  div.innerHTML=`<div class="poi-edit-num" style="background:${color}">${pi+1}</div>
    <input class="poi-edit-name pname" type="text" value="${p.name}" data-lat="${p.lat}" data-lng="${p.lng}">
    <a class="poi-maps-link" href="${url}" target="_blank">Maps ↗</a>
    <button class="poi-del" title="Remove">✕</button>`;
  document.getElementById('poi-list').appendChild(div);
  status.className='maps-status ok'; status.textContent=`✓ Added: ${p.name}`;
  document.getElementById('maps-in').value='';
  map.flyTo([p.lat,p.lng],14,{duration:0.7});
  setTimeout(()=>{status.textContent='';},3500);
}

// ═══════════════════════════════
//  SAVE DAY
// ═══════════════════════════════
function saveDay(idx){
  const trip=trips[currentTrip];
  const item=trip.itinerary[idx];
  item.loc=document.getElementById('ed-loc').value;
  item.note=document.getElementById('ed-note').value.trim()||item.note;
  item.pois=[];
  document.querySelectorAll('#poi-list .poi-edit-row').forEach(row=>{
    const nameEl=row.querySelector('.pname');
    const name=nameEl.value.trim();
    const lat=parseFloat(nameEl.dataset.lat);
    const lng=parseFloat(nameEl.dataset.lng);
    if(!name) return;
    if(!isNaN(lat)&&!isNaN(lng)) item.pois.push({name,c:[lat,lng]});
    else {
      const loc=trip.locations.find(l=>l.id===item.loc);
      if(loc) item.pois.push({name,c:loc.coords});
    }
  });
  buildTimeline(trip);
  setDayActive(idx);
  refreshPois();
  const loc=trip.locations.find(l=>l.id===item.loc);
  document.getElementById('panel-head-content').innerHTML=`
    <div class="p-chip amber">✎ Editing</div>
    <div class="p-title">Day ${item.day}</div>
    <div class="p-sub">${loc?loc.name:item.loc} · ${item.note}</div>`;
  const btn=document.getElementById('ed-save');
  if(btn){btn.textContent='Saved ✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Save day';btn.classList.remove('ok');},2000);}
  document.getElementById('exportBtn').classList.add('show');
}

// ═══════════════════════════════
//  GOOGLE MAPS URL PARSER
// ═══════════════════════════════
function parseMapsUrl(url){
  try{url=decodeURIComponent(url);}catch(e){}
  let lat=null,lng=null,name='New place',m;
  m=url.match(/\/place\/([^/]+)\/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if(m){name=decodePlace(m[1]);lat=parseFloat(m[2]);lng=parseFloat(m[3]);}
  if(!lat){m=url.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);}}
  if(!lat){m=url.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/);if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);}}
  if(!lat){m=url.match(/!3d(-?\d+\.?\d*).*?!4d(-?\d+\.?\d*)/);if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);}}
  if(!lat||isNaN(lat)||isNaN(lng)) return null;
  if(name==='New place'){m=url.match(/\/place\/([^/@]+)/);if(m)name=decodePlace(m[1]);}
  return{lat:Math.round(lat*1e4)/1e4,lng:Math.round(lng*1e4)/1e4,name};
}
function decodePlace(s){return s.replace(/\+/g,' ').replace(/%20/g,' ').replace(/,.*$/,'').trim()||'New place';}

// ═══════════════════════════════
//  ADD TRIP MODAL
// ═══════════════════════════════
document.getElementById('addTripBtn').addEventListener('click',()=>document.getElementById('modal-bg').classList.add('show'));
document.getElementById('m-cancel').addEventListener('click',()=>document.getElementById('modal-bg').classList.remove('show'));
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')document.getElementById('modal-bg').classList.remove('show');});
document.getElementById('m-create').addEventListener('click',()=>{
  const name=document.getElementById('m-name').value.trim();
  const accent=document.getElementById('m-color').value;
  const days=Math.max(1,Math.min(60,parseInt(document.getElementById('m-days').value)||7));
  if(!name){document.getElementById('m-name').focus();return;}
  const key='trip_'+Date.now();
  trips[key]={name,accent,locations:[],itinerary:Array.from({length:days},(_,i)=>({day:i+1,loc:'',note:'Day '+(i+1),pois:[]}))};
  currentTrip=key;
  buildTripSelector();
  document.getElementById('tripSel').value=key;
  document.getElementById('modal-bg').classList.remove('show');
  document.getElementById('m-name').value='';
  clearAllMarkers();
  document.getElementById('tl-inner').innerHTML='';
  buildTimeline(trips[key]);
  closePanel();
  alert(`"${name}" created with ${days} days.\nClick any day in the timeline to add locations and points of interest.`);
});

// ═══════════════════════════════
//  PANEL HELPERS
// ═══════════════════════════════
function openPanel(){document.getElementById('panel').classList.add('open');}
function closePanel(){document.getElementById('panel').classList.remove('open');panelMode=null;activeDayIdx=null;}
document.getElementById('panel-close').addEventListener('click',closePanel);
map.on('click',()=>{if(panelMode==='city')closePanel();});

// ═══════════════════════════════
//  EXPORT
// ═══════════════════════════════
document.getElementById('exportBtn').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(trips,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${currentTrip}.json`;a.click();
});

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
buildTripSelector();
loadTrip();

</script>
</body>
</html>
